# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: DataTrove
prefix: datatrove
description: >-
  Studyflow extension for the datatrove library's own pipeline blocks - the
  Reader and Writer IO steps (`datatrove.pipeline.readers` /
  `datatrove.pipeline.writers` classes, with datatrove's
  `data_folder`/`output_folder` as `path`) and presets that bind its
  processing blocks (e.g. the PII formatter). The generic functional
  operations these specialize live in the `functional` schema; corpus
  building (extract, stats, tokenize, dedup) is the library's own business -
  bind its blocks directly when a study needs one, e.g. a `functional:Map`
  running `python://datatrove.pipeline.extractors.Trafilatura`.
uri: https://w3id.org/studyflow/datatrove
icon: iconify tabler--hexagon-letter-d
xml:
  tagAlias: lowerCase
version: 26.0717
associations: []
enumerations:
  - name: ReaderClassEnum
    isAbstract: true
    description: Reader class from `datatrove.pipeline.readers`, importable as named.
    literalValues:
      - name: CSV
        value: CsvReader
      - name: HuggingFace Dataset
        value: HuggingFaceDatasetReader
      - name: IPC (Apache Arrow)
        value: IpcReader
      - name: JSONL (JSON Lines)
        value: JsonlReader
      - name: Parquet
        value: ParquetReader
      - name: WARC
        value: WarcReader
  - name: WriterClassEnum
    isAbstract: true
    description: Writer class from `datatrove.pipeline.writers`, importable as named.
    literalValues:
      - name: HuggingFace Dataset
        value: HuggingFaceDatasetWriter
      - name: JSONL (JSON Lines)
        value: JsonlWriter
      - name: Parquet
        value: ParquetWriter
types:
  - name: Reader
    description: Read data from different formats and yield documents/rows.
    superClass:
      - functional:Transform
    meta:
      icon: iconify mdi--input
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: read
        redefines: functional:Transform#operationType
      - name: className
        type: ReaderClassEnum
        isAttr: true
        description: |
          Specific reader class to use for reading data.
          It is determined by the format of the input.
        meta:
          categories:
            - DataTrove
      - name: path
        description: Source location to read from - datatrove's `data_folder` argument (a folder path, glob pattern, URL, or dataset identifier).
        isAttr: true
        type: String
        meta:
          categories:
            - DataTrove
  - name: Writer
    description: Write documents/rows to different formats.
    superClass:
      - functional:Transform
    meta:
      icon: iconify mdi--output
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: write
        redefines: functional:Transform#operationType
      - name: path
        description: Destination location to write to - datatrove's `output_folder` argument (a folder path, URL, or dataset identifier).
        isAttr: true
        type: String
        meta:
          categories:
            - DataTrove
      - name: className
        type: WriterClassEnum
        isAttr: true
        description: |
          Specific writer class to use for writing data.
          It is determined by the format of the output.
        meta:
          categories:
            - DataTrove
templates:
  - description: Remove or pseudonymize identifying fields (datatrove's PII formatter).
    object:
      bpmn:name: Anonymize Data
      type: functional:Map
      bpmn:documentation: |
        Remove or pseudonymize identifying fields before sharing or further
        processing. Bound to the datatrove library's `PIIFormatter` block,
        which scrubs emails and IP addresses from each document's text.
      icon: iconify mdi--incognito
      keywords:
        - anonymize
        - pseudonymize
        - deidentify
        - privacy
      operationType: anonymizeData
      implementation: python://datatrove.pipeline.formatters.PIIFormatter
      arguments: "remove_emails: true\nremove_ips: true"
