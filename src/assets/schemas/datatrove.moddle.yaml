name: DataTrove
prefix: datatrove
description: A studyflow extension for data transformation activities in the DataTrove ecosystem.
uri: https://w3id.org/studyflow/datatrove
icon: iconify tabler--hexagon-letter-d
xml:
  tagAlias: lowerCase
associations: []
enumerations:
  - name: ReaderClassEnum
    isAbstract: true
    description: Specific class for the reader.
    literalValues:
      # - name: Disk
      #   value: BaseDiskReader
      - name: CSV
        value: CSVReader
      - name: HuggingFace Dataset
        value: HuggingFaceDatasetReader
      - name: IPC (Apache Arrow)
        value: IpcReader
      - name: JSONL (JSON Lines)
        value: JsonlReader
      - name: Parquet
        value: ParquetReader
      - name: WARC
        value: WarcReader
  - name: WriterClassEnum
    isAbstract: true
    description: Specific class for the writer.
    literalValues:
      # - name: Disk
      #   value: DiskWriter
      - name: HuggingFace Dataset
        value: HuggingFaceDatasetWriter
      - name: JSONL (JSON Lines)
        value: JsonlWriter
      - name: Parquet
        value: ParquetWriter
types:
  - name: Document
    description:
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--file-document-outline
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: text
        type: String
        meta:
          categories:
            - DataTrove
      # - name: id  # NOTE same as bpmn:id
      #   type: String
      - name: media
        type: String
        isMany: true
        meta:
          categories:
            - DataTrove
      - name: metadata
        type: studyflow:YAMLString
        meta:
          categories:
            - DataTrove
  - name: DataFolder
    description: a folder that contains multiple Documents. It can be used to represent a dataset or a collection of data.
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--folder-outline
      bpmnType: bpmn:DataObjectReference
    properties:
  - name: Reader
    description: read data from different formats and yield Document.
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--input
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniprocess:Transform#operationType
      - name: className
        type: ReaderClassEnum
        isAttr: true
        description: |
          Specific reader class to use for reading data.
          It is determined by the format of the input.
        meta:
          categories:
            - DataTrove
  - name: Writer
    description: write Document to different formats.
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--output
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniprocess:Transform#operationType
      - name: className
        type: WriterClassEnum
        isAttr: true
        description: |
          Specific writer class to use for writing data.
          It is determined by the format of the output.
        meta:
          categories:
            - DataTrove
  - name: Extractor
    description: extract text content from raw formats (such as webpage html).
    superClass:
      - omniprocess:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniprocess:Transform#operationType
  - name: Filter
    description: filter out (remove) some Documents based on specific rules/criteria.
    extends:
      - omniprocess:Filter
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: filter
        redefines: omniprocess:Filter#operationType
  - name: Stats
    description: blocks to collect statistics on the dataset.
    superClass:
      - omniprocess:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniprocess:Transform#operationType
  - name: Tokens
    description: blocks to tokenize data or count tokens.
    superClass:
      - omniprocess:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniprocess:Transform#operationType
  - name: Dedup
    description: blocks for deduplication.
    superClass:
      - omniprocess:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniprocess:Transform#operationType
