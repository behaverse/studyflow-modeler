# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: OmniProcess
prefix: omniprocess
description: Studyflow extension for data processing pipelines - functional operations (map, filter, flatMap, group, reduce, compose), data hygiene tasks (anonymize, split), and prefilled neuroimaging preprocessing templates (fMRIPrep, EEGPrep).
uri: https://w3id.org/omniprocess
icon: iconify tabler--hexagon-letter-o
xml:
  tagAlias: lowerCase
version: 26.0610
associations: []
enumerations: []
types:
  - name: Transform
    description: Apply a function to each element in a data stream.
    superClass:
      - bpmn:ServiceTask
      - bpmn:BaseElement
    meta:
      bpmnType: bpmn:ServiceTask
    properties:
      - name: isDataOperation
        isAttr: true
        type: Boolean
        default: true
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
      - name: operationType
        isAttr: true
        default: transform
        type: String
        meta:
          pinned: true
  - name: Map
    description: Map a function over a data stream, producing a new data stream.
    superClass:
      - omniprocess:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: map
        redefines: omniprocess:Transform#operationType
  - name: FlatMap
    description: Map a one-to-many function over a data stream and flatten the results (e.g., unnest, expand events per trial, explode arrays).
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--arrow-expand-all
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: flatMap
        redefines: omniprocess:Transform#operationType
  - name: Group
    description: Partition a data stream into named groups by a key (e.g., participant, condition, block).
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--group
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: group
        redefines: omniprocess:Transform#operationType
      - name: key
        description: Name of the variable(s) used as the grouping key.
        isAttr: true
        type: String
        meta:
          categories:
            - Execution
  - name: Reduce
    description: Reduce a data stream to a single value.
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--sigma
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: reduce
        redefines: omniprocess:Transform#operationType
  - name: Filter
    description: |
      Filter a data stream based on a condition. Elements that satisfy the predicate are kept; those that don't are removed.
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--filter-variant
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: filter
        redefines: omniprocess:Transform#operationType
  - name: Compose
    description: Compose two or more transformations into a single pipeline step.
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--function-variant
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: compose
        redefines: omniprocess:Transform#operationType
  - name: AnonymizeData
    description: Remove or pseudonymize identifying fields.
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--incognito
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: anonymizeData
        redefines: omniprocess:Transform#operationType
  - name: SplitData
    description: Partition data items into named subsets (e.g., train/test).
    superClass:
      - omniprocess:Transform
    meta:
      icon: iconify mdi--call-split
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: splitData
        redefines: omniprocess:Transform#operationType
  - name: PreprocessfMRI
    description: Preprocess fMRI data, including filtering, artifact removal, and normalization. Requires BIDS-formatted input.
    superClass:
      - omniprocess:Map
    meta:
      icon: iconify streamline--brain
      # Surface this type only via its `templates:` entry; never list it as a
      # standalone palette element so users always see the prefilled template.
      templateScopedType: true
    properties:
      - name: output_spaces
        description: Standard and/or non-standard spaces for normalized outputs (e.g. MNI152NLin2009cAsym).
        isAttr: true
        type: String
        default: MNI152NLin2009cAsym
        meta:
          categories:
            - fMRIPrep
      - name: skull_strip_t1w
        description: Skull-stripping strategy for the T1w anatomical image (auto, force, or skip).
        isAttr: true
        type: String
        default: force
        meta:
          categories:
            - fMRIPrep
      - name: use_aroma
        description: Run ICA-AROMA-based denoising on the BOLD series.
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - fMRIPrep
      - name: use_syn_sdc
        description: Use fieldmap-less susceptibility distortion correction (SyN).
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - fMRIPrep
  - name: PreprocessEEG
    description: Preprocess EEG data, including filtering, artifact removal, and normalization.
    superClass:
      - omniprocess:Map
    meta:
      icon: iconify fluent--pulse-20-filled
      bpmnType: bpmn:SubProcess
      # never list it as a standalone palette element so users always see the prefilled template.
      templateScopedType: true
    properties:
      - name: flatline_criterion
        description: Flatline detection threshold, passed to clean_artifacts
        isAttr: true
        type: Real
        default: 5
        meta:
          categories:
            - EEGPrep
      - name: highpass
        description: High-pass filter at 1 Hz, passed to clean_artifacts
        isAttr: true
        type: Real
        default: 1
        meta:
          categories:
            - EEGPrep
      - name: lowpass
        description: Low-pass filter at 100 Hz, passed to clean_artifacts
        isAttr: true
        type: Real
        default: 100
        meta:
          categories:
            - EEGPrep
      - name: asr_criterion
        description: ASR threshold passed to clean_artifacts
        isAttr: true
        type: Real
        default: 20
        meta:
          categories:
            - EEGPrep
      - name: ica
        description: Enable ICA, passed to clean_artifacts
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - EEGPrep
      - name: iclabel
        description: Enable ICLabel classification, passed to clean_artifacts
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - EEGPrep
templates:
  - description: Preprocess fMRI data for a single subject.
    object:
      bpmn:name: fMRIPrep
      type: PreprocessfMRI
      bpmn:documentation: "Preprocess fMRI data: filtering, artifact removal, and normalization. Requires BIDS-formatted input."
      icon: iconify streamline--brain
      output_spaces: MNI152NLin2009cAsym
      skull_strip_t1w: force
      use_aroma: false
      use_syn_sdc: false
  - description: "Preprocess EEG data: filtering, artifact removal, and normalization."
    object:
      bpmn:name: EEGPrep
      type: PreprocessEEG
      bpmn:documentation: Preprocess EEG data, including filtering, artifact removal, and normalization.
      icon: iconify fluent--pulse-20-filled
      flatline_criterion: 5
      highpass: 1
      lowpass: 100
      asr_criterion: 20
      ica: true
      iclabel: true
      flowElements:
        - id: eeg_start
          type: bpmn:StartEvent
          bpmn:name: Start
          x: 140
          y: 162
        - id: eeg_filter
          type: omniprocess:Filter
          bpmn:name: Filter signal
          icon: iconify bi--funnel
          isDataOperation: true
          x: 240
          y: 140
        - id: eeg_clean
          type: omniprocess:Map
          bpmn:name: Remove artifacts
          icon: iconify bi--eraser
          isDataOperation: true
          x: 390
          y: 140
        - id: eeg_end
          type: bpmn:EndEvent
          bpmn:name: End
          x: 540
          y: 162
        - type: bpmn:SequenceFlow
          sourceRef: eeg_start
          targetRef: eeg_filter
        - type: bpmn:SequenceFlow
          sourceRef: eeg_filter
          targetRef: eeg_clean
        - type: bpmn:SequenceFlow
          sourceRef: eeg_clean
          targetRef: eeg_end
