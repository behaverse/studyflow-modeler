# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: OmniProcess
prefix: omniprocess
description: |
  Brain and brain-data processing presets - modality-specific neuroimaging
  preprocessing (fMRIPrep, EEGPrep). These are not element types: they are
  templates over the generic `functional` operations, binding a container
  image via `implementation` and its parameters via `with`. A preprocessing
  pipeline is data (a template), not metamodel - the same rule the exec/ml
  layers follow. Generic function-composition operations live in `functional`.
uri: https://w3id.org/omniprocess
icon: iconify tabler--hexagon-letter-o
xml:
  tagAlias: lowerCase
version: 26.0717
associations: []
enumerations: []
types: []
templates:
  - description: Preprocess fMRI data for a single subject (fMRIPrep in a container).
    object:
      bpmn:name: fMRIPrep
      type: functional:Map
      bpmn:documentation: "Preprocess fMRI data: filtering, artifact removal, and normalization. Requires BIDS-formatted input."
      icon: iconify streamline--brain
      keywords:
        - fmri
        - fmriprep
        - preprocess
        - bids
        - neuroimaging
      implementation: docker://nipreps/fmriprep@23.2.0
      with: |
        output_spaces: MNI152NLin2009cAsym   # normalized-output space(s)
        skull_strip_t1w: force               # auto | force | skip
        use_aroma: false                     # ICA-AROMA denoising
        use_syn_sdc: false                   # fieldmap-less SDC (SyN)

  - description: "Preprocess EEG data (EEGPrep / clean_artifacts) as a sub-process of filter + artifact removal."
    object:
      bpmn:name: EEGPrep
      type: bpmn:SubProcess
      bpmn:documentation: |
        Preprocess EEG data: filtering, artifact removal, and normalization.
        `clean_artifacts` parameters (edit on the child steps or in `with`):
        flatline_criterion 5, highpass 1 Hz, lowpass 100 Hz, asr_criterion 20,
        ICA on, ICLabel on.
      icon: iconify fluent--pulse-20-filled
      keywords:
        - eeg
        - eegprep
        - preprocess
        - cleanartifacts
        - neuroimaging
      isDataOperation: true
      flowElements:
        - id: eeg_start
          type: bpmn:StartEvent
          bpmn:name: Start
          x: 140
          y: 162
        - id: eeg_filter
          type: functional:Filter
          bpmn:name: Filter signal
          icon: iconify bi--funnel
          isDataOperation: true
          x: 240
          y: 140
        - id: eeg_clean
          type: functional:Map
          bpmn:name: Remove artifacts
          icon: iconify bi--eraser
          isDataOperation: true
          x: 390
          y: 140
        - id: eeg_end
          type: bpmn:EndEvent
          bpmn:name: End
          x: 540
          y: 162
        - type: bpmn:SequenceFlow
          sourceRef: eeg_start
          targetRef: eeg_filter
        - type: bpmn:SequenceFlow
          sourceRef: eeg_filter
          targetRef: eeg_clean
        - type: bpmn:SequenceFlow
          sourceRef: eeg_clean
          targetRef: eeg_end
