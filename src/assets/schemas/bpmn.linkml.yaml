    permissible_values:
      None: null
      Public: null
      Private: null
  GatewayDirection:
    permissible_values:
      Unspecified: null
      Converging: null
      Diverging: null
      Mixed: null
  EventBasedGatewayType:
    permissible_values:
      Parallel: null
      Exclusive: null
  RelationshipDirection:
    permissible_values:
      None: null
      Forward: null
      Backward: null
      Both: null
  ItemKind:
    permissible_values:
      Physical: null
      Information: null
  ChoreographyLoopType:
    permissible_values:
      None: null
      Standard: null
      MultiInstanceSequential: null
      MultiInstanceParallel: null
  AssociationDirection:
    permissible_values:
      None: null
      One: null
      Both: null
  MultiInstanceBehavior:
    permissible_values:
      None: null
      One: null
      All: null
      Complex: null
  AdHocOrdering:
    permissible_values:
      Parallel: null
      Sequential: null
