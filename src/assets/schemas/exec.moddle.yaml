# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Exec
prefix: exec
description: The minimal executable layer of Studyflow - just enough for a small Python engine to run a diagram. A step is one Python call - BPMN's own `implementation` names the importable callable, `studyflow:with` carries its keyword arguments, and the data associations drawn on the canvas are its inputs and outputs; the engine imports, calls, and binds. Branching is a native gateway's `conditionExpression`; loops are BPMN's own standard-loop child; schedules, sensors, and delays are native BPMN events with their expressions flattened to plain attributes. One data noun (`Parameters`, a named configuration group) and one artifact field (`uri`, where an artifact's bytes live) - nothing an engine would not read. (Fan-out over a collection - map/reduce over activities - lives in the `functional` schema.)
uri: https://w3id.org/studyflow/exec
icon: iconify tabler--hexagon-letter-e
xml:
  tagAlias: lowerCase
version: 26.0717

associations: []

enumerations: []

types:

  # ===========================================================================
  # The implementation reference. BPMN's own `implementation` attribute
  # ("the technology implementing this task") is redefined once, here, with
  # the versioned reference grammar every executable step uses. The engine
  # imports the callable it names and calls it with `with` plus the wired
  # inputs; there is no other step contract.
  # ===========================================================================
  - name: Implementation
    description: |
      Surfaces BPMN's own `implementation` attribute on every service-style
      step, holding a versioned reference in one grammar:
      `<scheme>://<ref>[@<version-or-digest>]`. Declared once so the reference
      grammar is the same for every step that runs something.
    extends:
      - bpmn:ServiceTask
    isAbstract: true
    properties:
      - name: implementation
        description: |
          Function or executable this step runs - BPMN's own attribute for
          "the technology implementing this task", holding a versioned
          reference: `<scheme>://<ref>[@<version-or-digest>]`. Schemes:
          `python://` (importable callable), `docker://` (image), `https://`
          (script URL).
        isAttr: true
        type: String
        redefines: bpmn:ServiceTask#implementation
        meta:
          order: 1
          categories:
            - Execution

  # ===========================================================================
  # Triggers, sensors, and delays are native BPMN, not studyflow concepts: a
  # timer start event is a schedule, a message start event an external event,
  # a conditional catch event a sensor, a timer catch event a delay, and a
  # plain start event a manual run. The one accommodation, as for
  # `loopCondition` and `completionCondition`, is flattening the event
  # definitions' expressions to plain attributes.
  # ===========================================================================
  - name: Timer
    description: |
      Flattens the timer event definition's expressions from elements to plain
      attributes, so schedules and delays are authored as strings. BPMN
      semantics unchanged. On a start event, `timeCycle` launches runs on a
      schedule; on an intermediate catch event, `timeDuration` is a delay and
      `timeDate` a fixed wake-up.
    extends:
      - bpmn:TimerEventDefinition
    isAbstract: true
    properties:
      - name: timeCycle
        description: |
          When to fire, repeatedly: a cron five-field expression (e.g.
          `0 6 * * 1`, Mondays at 06:00) or an ISO 8601 repeating interval
          (e.g. `R/PT24H`).
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:TimerEventDefinition#timeCycle
        meta:
          categories:
            - Trigger
      - name: timeDuration
        description: How long to wait, as an ISO 8601 duration (e.g. `PT1H`).
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:TimerEventDefinition#timeDuration
        meta:
          categories:
            - Trigger
      - name: timeDate
        description: Fire once, at a fixed time (ISO 8601, e.g. `2026-09-01T06:00Z`).
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:TimerEventDefinition#timeDate
        meta:
          categories:
            - Trigger

  - name: Condition
    description: |
      Flattens the conditional event definition's `condition` to a plain
      attribute. A conditional catch event is the workflow sensor: the token
      waits here until the condition over the run's variables holds - data
      arrived, a metric crossed a line - then passes.
    extends:
      - bpmn:ConditionalEventDefinition
    isAbstract: true
    properties:
      - name: condition
        description: |
          Expression over the run's variables; the event fires when it holds
          (e.g. `raw_sessions.rowCount > 0`).
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:ConditionalEventDefinition#condition
        meta:
          categories:
            - Trigger

  # Cycles use BPMN's own standard-loop child (`loopCharacteristics` with
  # `testBefore`, `loopCondition`, `loopMaximum`), which is also what makes
  # the loop marker render. The one accommodation is below - `loopCondition`
  # is flattened to a string attribute, the same treatment the core gives
  # `conditionExpression`. Always set `loopMaximum`: it is the only
  # guaranteed termination bound in a language with cycles. Same flattening
  # for the ad-hoc sub-process's own exit test (an Agent's stop rule).
  - name: CompletionCondition
    description: |
      Flattens the ad-hoc sub-process's own `completionCondition` to a plain
      attribute, so an agent's exit test is authored as a string
      (e.g. `answer is not null`).
    extends:
      - bpmn:AdHocSubProcess
    isAbstract: true
    properties:
      - name: completionCondition
        description: |
          BPMN's own exit test: the ad-hoc sub-process (an Agent) is complete
          when this holds, evaluated over the run's variables after each turn.
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:AdHocSubProcess#completionCondition
        meta:
          categories:
            - Agent

  - name: LoopCondition
    description: |
      Flattens the standard-loop marker's `loopCondition` from an expression
      element to a plain attribute (as the core does for `conditionExpression`),
      so it can be authored as a string. BPMN semantics unchanged: the loop
      *continues while* it holds, and stops at `loopMaximum` regardless.
    extends:
      - bpmn:StandardLoopCharacteristics
    isAbstract: true
    properties:
      - name: loopCondition
        description: |
          Continue-while expression over the run's variables (e.g.
          `score < 0.9` keeps refining until the score clears 0.9). Evaluated
          after each turn, or before it with `testBefore`.
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:StandardLoopCharacteristics#loopCondition
        meta:
          categories:
            - Repeat

  # ===========================================================================
  # Artifacts. One field on every BPMN data element: where the bytes live.
  # The engine passes wired data in memory and loads/saves an artifact at its
  # `uri` when one is set - nothing more.
  # ===========================================================================
  - name: Artifact
    description: |
      Storage location, mixed onto every BPMN data element. Unset means the
      value only flows in memory between steps; set, the engine reads/writes
      the artifact there.
    extends:
      - bpmn:ItemAwareElement
    isAbstract: true
    properties:
      - name: uri
        description: Where the bytes live (`results/model.joblib`, `s3://...`, a URL).
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Artifact

  # ===========================================================================
  # The one concrete element: a named configuration group the engine passes
  # to steps like any other wired data.
  # ===========================================================================
  - name: Parameters
    description: |
      A named configuration group - a dict of values wired to the steps that
      read it, so a study varies by editing data, not the flow.
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--tune
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: values
        description: The configuration itself, as a YAML mapping.
        isAttr: false
        type: studyflow:YAMLString
        meta:
          order: 1
          categories:
            - Parameters
          editor: yaml

templates:
  - description: Launch the flow on a schedule - BPMN's own timer start event, with a cron or ISO 8601 cycle.
    object:
      bpmn:name: Scheduled start
      type: bpmn:StartEvent
      bpmn:documentation: |
        A native BPMN timer start event. `timeCycle` holds a cron five-field
        expression (`0 6 * * *`) or an ISO 8601 repeating interval (`R/PT24H`).
        The other launch conditions are also native BPMN: a message start
        event for external events, a conditional start event for data arrival,
        a plain start event for manual runs.
      icon: iconify mdi--clock-start
      keywords:
        - schedule
        - cron
        - trigger
        - timer
        - nightly
        - periodic
      eventDefinitions:
        - type: bpmn:TimerEventDefinition
          timeCycle: "0 6 * * *"

  - description: Wait for data - a sensor that holds the token until a condition over the variables holds.
    object:
      bpmn:name: Wait for data
      type: bpmn:IntermediateCatchEvent
      bpmn:documentation: |
        A native BPMN conditional catch event: the run pauses here until the
        `condition` holds (data arrived, a metric crossed a line), then
        continues.
      icon: iconify mdi--radar
      keywords:
        - sensor
        - wait
        - condition
        - data
        - poll
      eventDefinitions:
        - type: bpmn:ConditionalEventDefinition
          condition: raw_sessions.rowCount > 0

  - description: Wait for a duration - a drawn delay (cooldown, rate limit, settling time).
    object:
      bpmn:name: Wait
      type: bpmn:IntermediateCatchEvent
      bpmn:documentation: |
        A native BPMN timer catch event holding the token for `timeDuration`
        (ISO 8601, e.g. `PT1H`). The drawn form of a delay, for when the wait
        is part of the protocol rather than an implementation detail.
      icon: iconify mdi--timer-sand
      keywords:
        - wait
        - delay
        - timer
        - cooldown
        - backoff
      eventDefinitions:
        - type: bpmn:TimerEventDefinition
          timeDuration: PT1H

  - description: Retry-until-good loop - run the body until a criterion holds or the turn budget runs out.
    object:
      bpmn:name: Repeat until
      type: bpmn:SubProcess
      bpmn:documentation: |
        Re-enters the body while BPMN's own `loopCondition` holds. Give every
        loop a `loopMaximum` - it is the only guaranteed termination bound.
      icon: iconify mdi--repeat-variant
      keywords:
        - loop
        - repeat
        - until
        - cycle
      loopCharacteristics:
        type: bpmn:StandardLoopCharacteristics
        loopCondition: score < 0.9
        loopMaximum: 5

  - description: Gate - continue only when a measured value clears the criterion.
    object:
      bpmn:name: Gate
      type: bpmn:ExclusiveGateway
      bpmn:documentation: |
        A decision on a measured value: promotion gates ("keep the model only
        if accuracy clears the bar"), data-quality gates, and safety gates are
        all a native exclusive gateway. The rule is BPMN's own: type it as the
        pass flow's `conditionExpression` - the field the engine's branch rule
        reads - and mark the reject flow as the gateway's native `default`.
        Write the rationale for the threshold here in `documentation`, where
        reviewers read it; there is no second place to write the rule.
      icon: iconify mdi--gate-arrow-right
      keywords:
        - gate
        - threshold
        - promote
        - policy
        - quality
