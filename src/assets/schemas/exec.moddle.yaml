# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Exec
prefix: exec
description: The executable layer of Studyflow - the step contract (runtime target, caching, determinism, retries) that turns any activity into a runnable step, plus the scope constructs (fan-out, sweep, repeat) that BPMN's multi-instance and loop markers stand for. A step's interface is not declared here - it is the typed data elements wired to it by BPMN's own data associations. Domain-neutral - it makes cognitive tasks, data operations, ML steps, and agents run under one semantics.
uri: https://w3id.org/studyflow/exec
icon: iconify tabler--hexagon-letter-e
xml:
  tagAlias: lowerCase
version: 26.0715

associations: []

enumerations:
  - name: RuntimeTargetEnum
    isAbstract: true
    description: |
      Where a step executes. `inherit` (the default) falls back to the enclosing
      scope and finally to `studyflow:Study#runtime`. The target selects an
      executor; it never changes what the step means.
    literalValues:
      - name: Inherit from parent
        value: inherit
      - name: Browser (participant device)
        value: browser
        description: Runs in the runner tab. Human-facing steps live here.
      - name: Local process
        value: local
        description: Runs in the worker's own process (in-band Python/JS callable).
      - name: Container
        value: container
        description: Runs in the OCI image named by the activity's `uses` reference.
      - name: HPC cluster
        value: hpc
        description: Submitted to a batch scheduler; the step suspends until the job reports back.
      - name: Cloud
        value: cloud
      - name: Human
        value: human
        description: Suspends the run and waits for a person. The default for BPMN user tasks.

  - name: SchedulerEnum
    isAbstract: true
    description: Batch scheduler used when `runsOn` is `hpc`.
    literalValues:
      - name: Slurm
        value: slurm
      - name: PBS/Torque
        value: pbs
      - name: SGE
        value: sge
      - name: Kubernetes
        value: kubernetes

  - name: CachePolicyEnum
    isAbstract: true
    description: |
      Whether a completed execution with the same cache key may be reused
      instead of re-running the step. The key is a hash of the step identity,
      the resolved `uses` digest, the resolved arguments, the input artifact
      digests, and the scope-derived seed.
    literalValues:
      - name: Reuse if unchanged
        value: reuse
        description: Skip the step when a successful execution with the same key exists.
      - name: Always re-run
        value: refresh
        description: Re-run and overwrite the cached execution.
      - name: Never cache
        value: never
        description: Re-run and do not record a reusable execution (side-effecting steps).

  - name: IterationKindEnum
    isAbstract: true
    description: |
      What a multi-instance marker expands over. Every kind opens one scope
      frame per instance, so a fold, a sweep point, a shard, and a participant
      are the same construct with different frame kinds.
    literalValues:
      - name: None (single instance)
        value: none
      - name: Items in a collection
        value: items
        description: One instance per element of the collection named by `over` (map / fan-out).
      - name: Cross-validation folds
        value: folds
        description: One instance per fold; the split is described by `folds`.
      - name: Points in a config grid
        value: grid
        description: One instance per point of the space described by `grid` (hyperparameter sweep).
      - name: Participants
        value: participants
        description: One instance per participant in the pool (a cohort run).
      - name: Shards
        value: shards
        description: One instance per shard of the input; the classic HPC array job.

  - name: CollectPolicyEnum
    isAbstract: true
    description: How instance outputs are joined back into the parent scope.
    literalValues:
      - name: List
        value: list
        description: Collect one entry per instance, in instance order.
      - name: Concatenate
        value: concat
        description: Concatenate tabular/streaming outputs into one artifact.
      - name: Reduce
        value: reduce
        description: Fold the outputs with the function named in `reducer` (e.g. mean of fold metrics).
      - name: None
        value: none
        description: Discard instance outputs; the step ran for its side effects.

  - name: OnLimitEnum
    isAbstract: true
    description: What happens when a repeat block hits `maxTurns` without its exit condition holding.
    literalValues:
      - name: Stop and continue
        value: stop
      - name: Fail the run
        value: fail

  - name: PersistPolicyEnum
    isAbstract: true
    description: Where an artifact's bytes live between steps.
    literalValues:
      - name: Store (content-addressed)
        value: store
        description: Written to the artifact store and addressable by digest. Cacheable and citable.
      - name: In memory
        value: memory
        description: Passed between steps in the worker; never persisted. Not cacheable.

types:

  # ===========================================================================
  # The step contract. A trait on every BPMN activity, so a cognitive task, a
  # data operation, an ML step, and an agent are all executable under the same
  # six questions: what runs (studyflow:uses), with what arguments
  # (studyflow:with), over what interface (the data associations drawn on the
  # canvas - native BPMN, nothing declared here), where (runsOn), under what
  # reuse and failure policy (cache/retry/timeout), and with what source of
  # randomness (seed/deterministic).
  # ===========================================================================
  - name: Step
    description: |
      Execution contract mixed onto every BPMN activity. `studyflow:uses` and
      `studyflow:with` already say *what* runs and *with what arguments*; the
      interface is not declared here at all - a step's inputs and outputs are
      the typed data elements wired to it by BPMN's own data associations, and
      the callable named by `uses` carries its own parameter list. This trait
      adds only what neither the diagram nor the callable can say: the runtime
      target, the reuse policy, the failure policy, and the randomness source.
    extends:
      - bpmn:Activity
    isAbstract: true
    properties:
      - name: runsOn
        description: |
          Runtime target for this step. `inherit` resolves against the enclosing
          sub-process and finally `studyflow:Study#runtime`.
        isAttr: true
        type: RuntimeTargetEnum
        default: inherit
        meta:
          order: 2
          categories:
            - Compute

      - name: scheduler
        description: Batch scheduler to submit to. Only meaningful when `runsOn` is `hpc`.
        isAttr: true
        type: SchedulerEnum
        default: slurm
        meta:
          order: 3
          categories:
            - Compute
          condition:
            language: json
            body:
              runsOn: hpc

      - name: compute
        description: |
          Compute request, as a YAML mapping. Interpreted by the executor for the
          chosen `runsOn`; unknown keys pass through to the scheduler. (Named
          `compute` rather than `resources` because BPMN's Activity already owns
          `resources` for resource-role assignment.)

              cpus: 8
              gpus: 1
              memory: 32G
              walltime: 04:00:00
              partition: gpu
              array: 128        # shard count when iterating over shards
        isAttr: false
        type: studyflow:YAMLString
        meta:
          order: 4
          categories:
            - Compute
          editor: yaml

      - name: cache
        description: |
          Reuse policy. With `reuse`, a step whose cache key matches a recorded
          successful execution is skipped and its outputs are rebound - the
          `dvc repro` / Flyte behaviour that makes re-running a pipeline cheap.
        isAttr: true
        type: CachePolicyEnum
        default: reuse
        meta:
          order: 5
          categories:
            - Execution

      - name: deterministic
        description: |
          Asserts that the step is a pure function of its inputs, arguments, and
          seed. Non-deterministic steps (a human response, an LLM call at
          temperature > 0, a wall-clock read) must set this to `false`; the
          engine then records their outcome in the run log so a replay reproduces
          it rather than re-drawing it.
        isAttr: true
        type: Boolean
        default: true
        meta:
          order: 6
          categories:
            - Execution

      - name: seed
        description: |
          Root seed for this step. Leave unset to derive it from the run seed and
          the current scope - which is what makes a fold, a sweep point, and a
          participant each reproducible on their own.
        isAttr: true
        type: Integer
        meta:
          order: 7
          categories:
            - Execution
          optional: true

      - name: retry
        description: |
          Failure policy, as a YAML mapping. Retries re-enter the step in a fresh
          `retry` scope frame, so each attempt is recorded separately.

              max: 3
              backoff: exponential   # fixed | linear | exponential
              on: [TransientError, Timeout]
        isAttr: false
        type: studyflow:YAMLString
        meta:
          order: 8
          categories:
            - Execution
          editor: yaml

      - name: timeout
        description: |
          Wall-clock budget for one attempt (e.g. `30s`, `2h`, `PT4H`). The
          shorthand for a boundary timer's `timeDuration`; draw the boundary
          event instead when the timeout path deserves to be visible.
        isAttr: true
        type: String
        meta:
          order: 9
          categories:
            - Execution
          optional: true

      - name: when
        description: |
          Guard expression over the scope's bindings; the step runs only when it
          holds (e.g. `scope.turn > 1`). A skipped step is recorded as skipped,
          leaves its outputs unbound, and passes the token on - the step-level
          form of a `Gate`, for skips that do not deserve a branch on the diagram
          (CWL `when`, Nextflow `when`). Unset means always run.
        isAttr: true
        type: String
        meta:
          order: 10
          categories:
            - Execution
          optional: true

  # ===========================================================================
  # Scope expansion. These two traits carry the parameters behind BPMN's
  # multi-instance and standard-loop markers. The marker stays native BPMN, so
  # bpmn-js renders it and other BPMN tools read it; the parameters live here.
  # ===========================================================================
  - name: Iteration
    description: |
      Parameters behind the BPMN multi-instance marker. Expanding an activity
      opens one scope frame per instance; instances are independent, may run in
      parallel, and are joined by `collect` when they all finish. Folds, sweep
      points, shards, participants, and items are the same construct with
      different frame kinds.
    extends:
      - bpmn:Activity
    isAbstract: true
    properties:
      - name: iterate
        description: What to expand over. `none` leaves the activity single-instance.
        isAttr: true
        type: IterationKindEnum
        default: none
        meta:
          order: 1
          categories:
            - Iteration

      - name: over
        description: |
          Name of the input port (or variable) holding the collection to expand
          over. Required when `iterate` is `items`. (BPMN: `loopDataInputRef`.)
        isAttr: true
        type: String
        meta:
          order: 2
          categories:
            - Iteration
          condition:
            language: json
            body:
              iterate: items

      - name: itemVar
        description: Name the current instance's element is bound to inside the scope (BPMN's `inputDataItem`).
        isAttr: true
        type: String
        default: item
        meta:
          order: 3
          categories:
            - Iteration
          condition:
            language: json
            body:
              iterate: items

      - name: folds
        description: |
          Cross-validation split, as a YAML mapping. The fold assignment is drawn
          from the scope-derived seed, so it is reproducible without pinning a
          global seed.

              k: 5
              stratifyBy: label
              groupBy: participant_id    # keeps a participant's rows in one fold
              shuffle: true
        isAttr: false
        type: studyflow:YAMLString
        meta:
          order: 4
          categories:
            - Iteration
          editor: yaml
          condition:
            language: json
            body:
              iterate: folds

      - name: grid
        description: |
          Sweep space, as a YAML mapping. `strategy` picks how points are drawn;
          `objective` names the metric an adaptive strategy optimizes and lets the
          engine report the winning point.

              strategy: grid
              space:
                lr: [0.001, 0.01, 0.1]
                max_depth: [2, 4, 8]
              samples: 20              # random search only
              objective: {metric: val_auc, goal: max}
        isAttr: false
        type: studyflow:YAMLString
        meta:
          order: 5
          categories:
            - Iteration
          editor: yaml
          condition:
            language: json
            body:
              iterate: grid

      - name: sequential
        description: |
          Run instances one at a time. Mirrors BPMN's `isSequential` on the
          multi-instance marker (the stacked bars are drawn horizontally when set).
        isAttr: true
        type: Boolean
        default: false
        meta:
          order: 6
          categories:
            - Iteration

      - name: maxConcurrency
        description: Cap on instances in flight at once. Unset means the executor decides.
        isAttr: true
        type: Integer
        meta:
          order: 7
          categories:
            - Iteration
          optional: true

      - name: collect
        description: How instance outputs are joined back into the parent scope.
        isAttr: true
        type: CollectPolicyEnum
        default: list
        meta:
          order: 8
          categories:
            - Iteration

      - name: collectAs
        description: Output port the joined result is bound to in the parent scope (BPMN's `loopDataOutputRef`).
        isAttr: true
        type: String
        meta:
          order: 9
          categories:
            - Iteration
          optional: true

      - name: reducer
        description: |
          Function used to fold instance outputs when `collect` is `reduce`,
          in `uses` grammar (e.g. `python://numpy.mean`).
        isAttr: true
        type: String
        meta:
          order: 10
          categories:
            - Iteration
          condition:
            language: json
            body:
              collect: reduce

      - name: failFast
        description: |
          Abort the remaining instances as soon as one fails. When false, failed
          instances are recorded and excluded from the collected result.
        isAttr: true
        type: Boolean
        default: false
        meta:
          order: 11
          categories:
            - Iteration

  - name: Repetition
    description: |
      Parameters behind the BPMN standard-loop marker. The body re-enters in a
      fresh `turn` scope frame until `until` holds or `maxTurns` is reached. This
      is the one construct behind agent turn loops, evaluator-optimizer refinement,
      and retraining-on-drift - the cycles a plain DAG cannot express.
    extends:
      - bpmn:Activity
    isAbstract: true
    properties:
      - name: until
        description: |
          Exit condition, evaluated against the scope's bindings after each turn.
          The loop ends on the first turn where it holds (e.g. `score >= 0.9`).
          The native twin is the standard-loop marker's `loopCondition`, negated:
          BPMN's loop *continues while* its condition holds, `until` stops when
          it does. On an Agent, the native twin is `completionCondition`.
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Repeat

      - name: maxTurns
        description: Hard ceiling on turns (BPMN's `loopMaximum`). Always set one - it is the only guaranteed termination bound.
        isAttr: true
        type: Integer
        default: 10
        meta:
          order: 2
          categories:
            - Repeat

      - name: onMaxTurns
        description: What to do when the ceiling is reached without `until` holding.
        isAttr: true
        type: OnLimitEnum
        default: stop
        meta:
          order: 3
          categories:
            - Repeat

      - name: testBefore
        description: |
          Evaluate `until` before the first turn (a while-loop) rather than after
          it (a do-while). Mirrors BPMN's `testBefore`.
        isAttr: true
        type: Boolean
        default: false
        meta:
          order: 4
          categories:
            - Repeat

  # ===========================================================================
  # Artifacts. A trait on every BPMN data element, so the Dataset, Table,
  # Timeseries, and EventMarker that already exist - and the Model and Metric
  # the ML layer adds - all become content-addressed, versioned, and traceable
  # to the execution that produced them (W3C PROV: entity <- wasGeneratedBy).
  # ===========================================================================
  - name: Artifact
    description: |
      Content-addressing and lineage, mixed onto every BPMN data element. `digest`
      is what the cache keys on and what a citation pins; `producedBy` is written
      by the engine at run time, so the as-run file is the spec plus these fields.
    extends:
      - bpmn:ItemAwareElement
    isAbstract: true
    properties:
      - name: uri
        description: Where the bytes live (`s3://`, `file://`, a registry URI, a DOI).
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Artifact

      - name: digest
        description: |
          Content hash, `sha256:<hex>`. Identity of the artifact: two artifacts with
          the same digest are the same artifact, wherever they live.
        isAttr: true
        type: String
        meta:
          order: 2
          categories:
            - Artifact

      - name: version
        description: Human-facing version or tag (a git ref, a registry version, a DOI version).
        isAttr: true
        type: String
        meta:
          order: 3
          categories:
            - Artifact

      - name: persist
        description: Whether the bytes are stored, held in memory, or streamed.
        isAttr: true
        type: PersistPolicyEnum
        default: store
        meta:
          order: 4
          categories:
            - Artifact

      - name: producedBy
        description: |
          Cache key of the execution that generated this artifact. Left empty in a
          spec; written by the engine on the as-run record. This is PROV's
          `wasGeneratedBy` edge.
        isAttr: true
        type: String
        meta:
          order: 5
          categories:
            - Provenance
          optional: true

  # ===========================================================================
  # Concrete elements.
  # ===========================================================================
  - name: ForEach
    description: |
      Fan out over a collection: one instance of the body per item, joined when
      all finish. Sharding a large input across an HPC array job and mapping a
      preprocessing step over subjects are the same element with different
      `iterate` values.
    superClass:
      - bpmn:SubProcess
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--arrow-split-vertical
      bpmnType: bpmn:SubProcess
    properties:
      - name: iterate
        description: Fixed to `items`; switch to `shards` to expand over input shards instead.
        isAttr: true
        type: IterationKindEnum
        default: items
        redefines: exec:Iteration#iterate
        meta:
          categories:
            - Iteration

  - name: Sweep
    description: |
      Fan out over a configuration space: one instance of the body per point.
      The experiment-variation construct ML research actually uses - and the same
      element as `cognitive:RandomGateway`, one scope level up: that assigns a
      participant to a cell of the design, this assigns a run to one.
    superClass:
      - bpmn:SubProcess
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--tune-variant
      bpmnType: bpmn:SubProcess
    properties:
      - name: iterate
        description: Fixed to `grid`; the space and strategy are set in `grid`.
        isAttr: true
        type: IterationKindEnum
        default: grid
        redefines: exec:Iteration#iterate
        meta:
          pinned: true
          categories:
            - Iteration

  - name: Repeat
    description: |
      Run the body until a condition holds or a turn ceiling is hit. The cyclic
      construct: refinement loops, retraining on drift, and any
      generate-check-revise pattern.
    superClass:
      - bpmn:SubProcess
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--repeat-variant
      bpmnType: bpmn:SubProcess

  - name: Block
    description: |
      A named group of steps that runs as one unit. The encapsulation primitive:
      a block hides its internals behind the data elements wired to it, so a
      reader sees "preprocess" and an author can open it. Nest freely - a
      block's steps are steps.
    superClass:
      - bpmn:SubProcess
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--group
      bpmnType: bpmn:SubProcess

  - name: Component
    description: |
      A call to a sub-flow defined elsewhere. The reusability primitive: a
      preprocessing pipeline, a scoring protocol, or an agent published once and
      called from many studies. Sets BPMN's `calledElement` to the target flow;
      its interface is the data elements wired to it, like any other step.
    superClass:
      - bpmn:CallActivity
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--package-variant-closed
      bpmnType: bpmn:CallActivity
    properties:
      - name: source
        description: |
          Where the called flow comes from, in `uses` grammar - a registry entry,
          a URL, or a path (e.g. `https://registry.behaverse.org/flows/eegprep@2.1`).
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Component

      - name: digest
        description: |
          Content hash of the exact called flow, resolved at first run. Pinning a
          component is what keeps a study reproducible when the component moves on.
        isAttr: true
        type: String
        meta:
          order: 2
          categories:
            - Component
          optional: true

  - name: Gate
    description: |
      A decision on a measured value: continue only when the criterion holds.
      Promotion gates ("deploy only if AUC exceeds the baseline"), data-quality
      gates, and safety gates are all this element - the point being that the
      criterion is visible in the diagram rather than buried in a script.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--gate-arrow-right
      bpmnType: bpmn:ExclusiveGateway
      branching: condition
    properties:
      - name: criterion
        description: |
          Expression over the scope's bindings that must hold to take the pass
          branch (e.g. `metrics.auc >= 0.80 and metrics.auc >= baseline.auc`).
          This is the authoring spelling of the pass flow's native
          `conditionExpression` - the field the engine's branch rule reads -
          and is mirrored onto it, so there is one rule, not two.
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Gate

      - name: rationale
        description: Why this threshold. Reviewers read this; the engine does not.
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          order: 2
          categories:
            - Gate

  - name: Parameters
    description: |
      A named configuration group. Composing these - a base config plus the
      overrides a variant needs - is how a study or an experiment varies without
      duplicating the flow (the role Hydra's config groups play in ML research).
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--tune
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: values
        description: The configuration itself, as a YAML mapping.
        isAttr: false
        type: studyflow:YAMLString
        meta:
          order: 1
          categories:
            - Parameters
          editor: yaml

      - name: basedOn
        description: |
          Id of a `Parameters` element this one overrides, forming a defaults
          chain. Later entries win, key by key.
        isAttr: true
        type: String
        meta:
          order: 2
          categories:
            - Parameters
          optional: true

  - name: Blob
    description: |
      A typed artifact with no more specific type - a file, a checkpoint, a
      figure, an archive. Use `Dataset`, `Table`, `Model`, or `Metric` when the
      shape is known; use this when it is not.
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--file-outline
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: contentType
        description: Media type of the content (e.g. `image/png`, `application/octet-stream`).
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Artifact

templates:
  - description: Shard a large input across an HPC array job - one task per shard, results concatenated.
    object:
      bpmn:name: Shard across cluster
      type: ForEach
      bpmn:documentation: |
        Fan out over input shards, one scheduler array task per shard. Set the
        shard count in `resources.array`; the body runs once per shard with the
        shard index bound in scope.
      icon: iconify mdi--server-network
      keywords:
        - shard
        - array
        - hpc
        - slurm
        - parallel
      iterate: shards
      runsOn: hpc
      scheduler: slurm
      compute: "cpus: 4\nmemory: 16G\nwalltime: 02:00:00\narray: 128"
      collect: concat
      collectAs: results

  - description: Sweep a hyperparameter grid and keep the point that maximizes the objective.
    object:
      bpmn:name: Hyperparameter sweep
      type: Sweep
      bpmn:documentation: |
        One instance of the body per point of the space. The engine records every
        point's metrics and reports the winner under `objective`.
      icon: iconify mdi--tune-variant
      keywords:
        - sweep
        - grid
        - search
        - hyperparameter
        - multirun
      grid: "strategy: grid\nspace:\n  lr: [0.001, 0.01, 0.1]\n  max_depth: [2, 4, 8]\nobjective:\n  metric: val_auc\n  goal: max"
      collect: list
      collectAs: trials

  - description: Retry-until-good loop - run the body until a criterion holds or the turn budget runs out.
    object:
      bpmn:name: Repeat until
      type: Repeat
      bpmn:documentation: |
        Re-enters the body in a fresh `turn` scope until `until` holds. Give every
        loop a `maxTurns` - it is the only guaranteed termination bound.
      icon: iconify mdi--repeat-variant
      keywords:
        - loop
        - repeat
        - until
        - cycle
      until: score >= 0.9
      maxTurns: 5
      onMaxTurns: stop
