# yaml-language-server: $schema=https://linkml.io/linkml-model/linkml_model/jsonschema/meta.schema.json

id: https://behaverse.org/schemas/studyflow.linkml
name: studyflow
title: Studyflow Core Schema (LinkML source of truth)
description: |
  Authoritative LinkML schema for the Studyflow language. This file is the single
  source of truth for element types, attribute constraints, and validation rules;
  the moddle YAML mirrors (studyflow.moddle.yaml, cognitive.moddle.yaml) carry the
  same definitions in the format the bpmn-moddle runtime expects.

  Optional domain extensions (behaverse, omniprocess, datatrove, galea) are
  authored as additional moddle schemas; their LinkML mirrors are out of scope
  for this core file.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  studyflow: https://behaverse.org/schemas/studyflow/
  cognitive: https://behaverse.org/schemas/studyflow/cognitive/
  bpmn: http://www.omg.org/spec/BPMN/20100524/MODEL/
  bids: https://bids-specification.readthedocs.io/
  psychds: https://psych-ds.github.io/
  bdm: https://behaverse.org/data-model/
  csvw: http://www.w3.org/ns/csvw#

default_prefix: studyflow

imports:
  - linkml:types

types:
  MarkdownString:
    uri: xsd:string
    base: str
    description: A string containing Markdown formatting.

  YAMLString:
    uri: xsd:string
    base: str
    description: A string containing YAML-formatted content.

enums:
  DatasetFormatEnum:
    description: Format of a dataset.
    permissible_values:
      bdm:       {title: BDM (Behaverse Data Model)}
      bids:      {title: BIDS (Brain Imaging Data Structure)}
      psych-ds:  {title: Psych-DS}
      kedro:     {title: Kedro}
      undefined: {title: Undefined}

  TableFormatEnum:
    description: On-disk format of a tabular dataset.
    permissible_values:
      csv:       {title: CSV}
      tsv:       {title: TSV}
      parquet:   {title: Parquet}
      arrow:     {title: Arrow}
      jsonl:     {title: JSON Lines}
      undefined: {title: Undefined}

  TimeseriesFormatEnum:
    description: On-disk format of a time-series recording.
    permissible_values:
      edf:       {title: EDF (European Data Format)}
      bdf:       {title: BDF (Biosemi Data Format)}
      fif:       {title: FIF (MNE/Elekta)}
      set:       {title: SET (EEGLAB)}
      parquet:   {title: Parquet}
      zarr:      {title: Zarr}
      undefined: {title: Undefined}

  BDMDataLevelEnum:
    description: Behaverse Data Model level.
    permissible_values:
      events: {title: Events}
      trials: {title: Trials}
      models: {title: Models}

  CompletionCodeTypeEnum:
    description: How a study issues a completion code at end-of-run.
    permissible_values:
      none:    {title: None}
      static:  {title: Static (fixed code)}
      dynamic: {title: Dynamic (resolved from URL pattern)}

  RuntimeEnum:
    description: Execution environment in which the study runs.
    permissible_values:
      cloud: {title: Cloud}
      local: {title: Local}
      hpc:   {title: HPC}

  AssignmentAlgorithmEnum:
    description: Scheduling algorithm used for participant assignment.
    permissible_values:
      probabilistic: {title: Probabilistic}
      round-robin:   {title: Round Robin}

  DataOperationTypeEnum:
    description: |
      Studyflow data-operator marker for tasks. Operators describe how data is
      manipulated as it flows through the process.
    permissible_values:
      transform:     {title: Transform}
      map:           {title: Map}
      filter:        {title: Filter}
      reduce:        {title: Reduce}
      group:         {title: Group}
      compose:       {title: Compose}
      flatMap:       {title: FlatMap}
      loadData:      {title: Load Data}
      saveData:      {title: Save Data}
      exportData:    {title: Export Data}
      anonymizeData: {title: Anonymize Data}
      validateData:  {title: Validate Data}
      controlAccess: {title: Control Access}
      randomSample:  {title: Random Sample}
      shuffle:       {title: Shuffle}
      bootstrap:     {title: Bootstrap Resample}
      jitter:        {title: Jitter}
      splitData:     {title: Split}
      cleanData:     {title: Clean}
      joinTables:    {title: Join Tables}
      pivot:         {title: Pivot}
      selectColumns: {title: Select Columns}
      mutate:        {title: Mutate}
      summarize:     {title: Summarize}

  ActorTypeEnum:
    description: Kind of actor represented by a participant pool.
    permissible_values:
      human:      {title: Human}
      llm:        {title: Large Language Model}
      agent:      {title: Software Agent (non-LLM)}
      instrument: {title: Instrument / Apparatus}

classes:

  # -------------------------------------------------------------------------
  # Mixins
  # -------------------------------------------------------------------------

  Element:
    description: |
      Extends BPMN's BaseElement with documentation and checklist attributes
      shared by every Studyflow element.
    mixin: true
    abstract: true
    class_uri: bpmn:BaseElement
    attributes:
      documentation:
        description: Human-readable description for the element.
        range: MarkdownString
      checklist:
        description: |
          List of items to be checked off when completing the element,
          formatted as a Markdown list.
        range: MarkdownString
      start:
        description: Optional start time of the element.
        range: string
      end:
        description: Optional end time of the element.
        range: string
      duration:
        description: Optional duration of the element.
        range: string
      progress:
        description: Optional progress indicator (percentage or label).
        range: string
      resourceAllocation:
        description: Optional resource allocation (personnel, equipment, budget).
        range: string

  # -------------------------------------------------------------------------
  # Top-level container
  # -------------------------------------------------------------------------

  Study:
    description: A Studyflow study definition; the root container.
    class_uri: bpmn:Process
    mixins: [Element]
    tree_root: true
    attributes:
      name:
        description: Study name.
        range: string
        required: true
      version:
        description: Study version (semver recommended).
        range: string
      authors:
        description: Authors of the study.
        range: string
        multivalued: true
      runtime:
        description: Execution runtime in which the study runs.
        range: RuntimeEnum

  # -------------------------------------------------------------------------
  # Activities
  # -------------------------------------------------------------------------

  Activity:
    description: Base class for all Studyflow activities.
    abstract: true
    class_uri: bpmn:Activity
    mixins: [Element]
    attributes:
      uri:
        description: Optional link to an external resource describing the activity.
        range: uri

  DataOperationActivity:
    description: |
      Augments any BPMN Activity with a data-operation marker and explicit
      input/output variable lists. Subtypes (e.g. CognitiveTask, Questionnaire)
      pin `isDataOperation` to false; data operators pin it to true.
    abstract: true
    is_a: Activity
    attributes:
      isDataOperation:
        description: Marks the activity as a data operation (transform/filter/reduce/...).
        range: boolean
        ifabsent: "false"
      operation:
        description: Specific data-operation kind (when isDataOperation is true).
        range: DataOperationTypeEnum
      inputs:
        description: Names of variables consumed by this activity.
        range: string
        multivalued: true
      outputs:
        description: Names of variables produced by this activity.
        range: string
        multivalued: true

  CognitiveTask:
    description: A cognitive test administered to a participant.
    is_a: DataOperationActivity
    class_uri: cognitive:CognitiveTask
    slot_usage:
      isDataOperation:
        ifabsent: "false"
        equals_string: "false"
    attributes:
      instrument:
        description: Software used to deliver the task (psychopy, jspsych, labjs, opensesame, or custom).
        range: string
        required: true
      configurations:
        description: Instrument-specific configuration in YAML format.
        range: YAMLString

  Questionnaire:
    description: A questionnaire instrument administered to a participant.
    is_a: DataOperationActivity
    class_uri: cognitive:Questionnaire
    attributes:
      instrument:
        description: Standardized instrument identifier (e.g., PHQ-9, GAD-7, BDI-II) or a custom name.
        range: string
        required: true

  Instruction:
    description: A passive information display.
    is_a: Questionnaire
    class_uri: cognitive:Instruction
    attributes:
      content:
        description: Instruction content in Markdown.
        range: MarkdownString

  Rest:
    description: A rest period of inactivity or minimal activity.
    is_a: DataOperationActivity
    class_uri: cognitive:Rest
    attributes:
      configurations:
        description: Rest configuration in YAML (duration, eyes-open/closed, etc.).
        range: YAMLString

  VideoGame:
    description: An interactive video game used as an experimental paradigm.
    is_a: DataOperationActivity
    class_uri: cognitive:VideoGame
    attributes:
      instrument:
        description: Identifier of the engine or library running the game.
        range: string
        required: true
      configurations:
        range: YAMLString

  # -------------------------------------------------------------------------
  # Gateways
  # -------------------------------------------------------------------------

  RandomGateway:
    description: Randomly assigns participants to one of the outgoing branches.
    class_uri: bpmn:ExclusiveGateway
    mixins: [Element]
    attributes:
      algorithm:
        description: Assignment algorithm.
        range: AssignmentAlgorithmEnum
        ifabsent: "string(probabilistic)"
      probabilityFunction:
        description: Probability mass function for the random assignment.
        range: string

  StratifiedAllocationGateway:
    description: |
      Stratified random assignment. Participants are partitioned by a
      stratification variable, and assignment is performed within each stratum.
    class_uri: bpmn:ExclusiveGateway
    mixins: [Element]
    attributes:
      stratificationVariable:
        description: Variable name used to partition into strata.
        range: string
        required: true
      strata:
        description: One Markdown entry per stratum.
        range: MarkdownString
        multivalued: true
      algorithm:
        range: AssignmentAlgorithmEnum
        ifabsent: "string(probabilistic)"
      probabilityFunction:
        range: string

  EligibilityGateway:
    description: Decision gateway encoding inclusion/exclusion criteria.
    class_uri: bpmn:ExclusiveGateway
    mixins: [Element]
    attributes:
      inclusionCriteria:
        description: Inclusion criteria (one Markdown entry per criterion).
        range: MarkdownString
        multivalued: true
      exclusionCriteria:
        description: Exclusion criteria (one Markdown entry per criterion).
        range: MarkdownString
        multivalued: true

  # -------------------------------------------------------------------------
  # Events
  # -------------------------------------------------------------------------

  StartEvent:
    class_uri: bpmn:StartEvent
    mixins: [Element]
    attributes:
      consentFormUri:
        description: Link to the consent form. Omit to skip the consent step.
        range: uri

  EndEvent:
    class_uri: bpmn:EndEvent
    mixins: [Element]
    attributes:
      redirectTo:
        description: URL to redirect the participant to upon completion.
        range: uri
      completionCodeType:
        range: CompletionCodeTypeEnum
        ifabsent: "string(none)"
      completionCode:
        description: Fixed completion code (when completionCodeType is static).
        range: string

  # -------------------------------------------------------------------------
  # Data infrastructure
  # -------------------------------------------------------------------------

  DataCatalog:
    description: A persistent repository or registry of datasets.
    class_uri: bpmn:BaseElement
    mixins: [Element]
    attributes:
      url:
        description: Base URL of the catalog.
        range: uri

  DataStorage:
    description: Persistent physical storage of data.
    class_uri: bpmn:DataStoreReference
    mixins: [Element]

  Schema:
    description: |
      Formal description of the structure of a named collection of types
      (e.g., CSVW for tables, dimensions/types for arrays).
    class_uri: bpmn:DataObjectReference
    mixins: [Element]
    attributes:
      format:
        description: Schema format identifier (csvw, linkml, jsonschema, ...).
        range: string
      body:
        description: Inline schema content (or a URI to it).
        range: YAMLString

  Dataset:
    description: |
      Collection of data registered in a DataCatalog and stored in a DataStorage.
      Generic container that does not commit to row/column structure; use Table
      for tabular data and Array for tensor data.
    class_uri: bpmn:DataStoreReference
    mixins: [Element]
    attributes:
      catalog:
        range: DataCatalog
      storage:
        range: DataStorage
      schema:
        range: Schema
      format:
        range: DatasetFormatEnum
        ifabsent: "string(undefined)"
      bdmDataLevel:
        description: BDM level of the data (when format is bdm).
        range: BDMDataLevelEnum

  Table:
    description: |
      Tabular data element (rows + columns). Schema is typically described via
      CSVW or LinkML and may be inline or referenced.
    class_uri: bpmn:DataObjectReference
    mixins: [Element]
    attributes:
      format:
        range: TableFormatEnum
        ifabsent: "string(csv)"
      schema:
        range: Schema
      rowCount:
        range: integer

  Array:
    description: Multi-dimensional array/tensor (e.g., images, videos, fMRI).
    class_uri: bpmn:BaseElement
    mixins: [Element]
    attributes:
      dataset:
        description: Identifier of the parent Dataset.
        range: string
      schema:
        description: URL/path/identifier of the array schema (dimensions/types/units).
        range: string

  Timeseries:
    description: |
      Continuous physiological or behavioural recording sampled over time
      (EEG, EMG, eye-tracking gaze stream, accelerometer, ...).
    class_uri: bpmn:DataObjectReference
    mixins: [Element]
    attributes:
      samplingRate:
        description: Sampling rate in Hz.
        range: float
      channelCount:
        range: integer
      units:
        description: Physical units of the recorded values (e.g., uV, mV, deg).
        range: string
      duration:
        description: Duration in seconds.
        range: float
      format:
        range: TimeseriesFormatEnum
        ifabsent: "string(undefined)"

  Event:
    description: |
      Sparse, time-stamped occurrences within a recording session (stimulus
      onsets, button presses, artifact markers, ...).
    class_uri: bpmn:DataObjectReference
    mixins: [Element]
    attributes:
      eventType:
        range: string
      onset:
        description: Onset time in seconds, relative to recording start.
        range: float
      offset:
        description: Offset time in seconds, relative to recording start.
        range: float
      eventCount:
        range: integer

  Snapshot:
    description: Immutable version of a dataset/table/array at a point in the workflow.
    class_uri: bpmn:BaseElement
    mixins: [Element]
    attributes:
      source:
        description: Identifier of the dataset/table/array being snapshotted.
        range: string
      version:
        description: Version identifier (tag, checksum, commit hash).
        range: string

  # -------------------------------------------------------------------------
  # Multi-actor extension
  # -------------------------------------------------------------------------

  Actor:
    description: |
      A participant pool tagged with actor-type metadata so it can be flagged
      as human, LLM, software agent, or instrument. Subclasses bpmn:Participant
      and renders as a BPMN Pool; choreography tasks use the standard BPMN
      ParticipantRef without modification.
    class_uri: bpmn:Participant
    mixins: [Element]
    attributes:
      actorType:
        range: ActorTypeEnum
        ifabsent: "string(human)"
      model:
        description: Model identifier when actorType is llm.
        range: string
      promptTemplate:
        description: Optional prompt template for the LLM actor.
        range: MarkdownString
      agentSpec:
        description: Optional spec identifier when actorType is agent.
        range: string
      instrumentSpec:
        description: Optional spec identifier when actorType is instrument.
        range: string
