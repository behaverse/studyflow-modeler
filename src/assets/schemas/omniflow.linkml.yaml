id: https://w3id.org/omniflow
name: omniflow
prefixes:
  omniflow: https://w3id.org/omniflow/
  studyflow: https://w3id.org/studyflow/
  linkml: https://w3id.org/linkml/
  bpmn: https://w3id.org/bpmn/
imports:
  - linkml:types
  - studyflow:types
default_range: string
default_prefix: omniflow

enums:

types:

classes:
  TransformData:
    is_a: bpmn:Task
    description: Apply a function to each element in a data stream.
    attributes:
      isDataOperation:
        extensions:
          moddle:
            default: true
          studyflow:
            hidden: true
      operationType:
        extensions:
          moddle:
            default: "transform"
          studyflow:
            hidden: true
  MapData:
    is_a: TransformData
    description: Map a function over a data stream, producing a new data stream.
    attributes:
      operationType:
        extensions:
          moddle:
            default: "map"
          studyflow:
            hidden: true
  ReduceData:
    is_a: TransformData
    description: Reduce a data stream to a single value.
    attributes:
      operationType:
        extensions:
          moddle:
            default: "map"
          studyflow:
            hidden: true
  FilterData:
    is_a: TransformData
    description: Filter a data stream based on a condition. Elements that satisfy the predicate are kept; those that don't are removed.
    attributes:
      operationType:
        extensions:
          moddle:
            default: "filter"
          studyflow:
            hidden: true

examples:
  - description: Preprocess EEG data for a single subject.
    object:
      class: MapData
      bpmn:name: Preprocess EEG (subject)
      bpmn:documentation: Preprocess EEG data, including filtering, artifact removal, and normalization.
      isDataOperation: true
      icon: iconify icon-park--eeg
  - description: Preprocess EEG data for a group of subjects.
    object:
      class: ReduceData
      bpmn:name: Preprocess EEG (group)
      bpmn:documentation: Preprocess EEG data, including filtering, artifact removal, and normalization.
      isDataOperation: true
      icon: iconify icon-park--eeg
  - description: Preprocess fMRI data for a single subject.
    object:
      class: MapData
      bpmn:name: Preprocess fMRI (subject)
      bpmn:width: 120
      bpmn:documentation: Preprocess fMRI data, including filtering, artifact removal, and normalization. Requires BIDS-formatted input.
      isDataOperation: true
      icon: iconify hugeicons--brain-02
  - description: Preprocess fMRI data for a group of subjects.
    object:
      class: ReduceData
      bpmn:name: Preprocess fMRI (group)
      bpmn:width: 120
      isDataOperation: true
      bpmn:documentation: Preprocess fMRI data, including filtering, artifact removal, and normalization. Requires BIDS-formatted input.
      icon: iconify hugeicons--brain-02