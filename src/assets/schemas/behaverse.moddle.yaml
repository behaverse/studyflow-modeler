# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Behaverse
prefix: behaverse
description: Studyflow extension for modeling Behaverse cognitive tasks in studyflow diagrams. Defines a `BehaverseTask` type with properties for selecting a Behaverse scene and a timeline.
uri: http://behaverse.org/schemas/studyflow/behaverse
icon: https://raw.githubusercontent.com/behaverse/schemas/main/assets/img/schema_B.png
xml:
  tagAlias: lowerCase
associations: []
enumerations:
  - name: BehaverseSceneEnum
    literalValues:
      - name: Undefined
        value: undefined
      - name: Belval Card Sorting (BCS)
        value: BCS
      - name: Belval Matrices (BM)
        value: BM
      - name: Button Spatial Attention Cueing (BSAC)
        value: BSAC
      - name: Digit Span (DS)
        value: DS
      - name: Monkey Ladder (ML)
        value: ML
      - name: Multiple Object Tracking (MOT)
        value: MOT
      - name: N-Back (NB)
        value: NB
      - name: Ordered Click (OC)
        value: OC
      - name: Odd One Out (OOO)
        value: OOO
      - name: Polygon Comparison (PC)
        value: PC
      - name: Regular Expression (RE)
        value: RE
      - name: Reflexive Spatial Attention Cueing (RSAC)
        value: RSAC
      - name: Sustained Attention to Response Task (SART)
        value: SART
      - name: Symbolic Matrix Comparison (SMC)
        value: SMC
      - name: Self-Ordered Search (SOS)
        value: SOS
      - name: Stimulus-Response Mapping (SRM)
        value: SRM
      - name: Serial Reaction Time (SRT)
        value: SRT
      - name: Spatial Span (SS)
        value: SS
      - name: Target Hit (TH)
        value: TH
      - name: Test of Variable Attention (TOVA)
        value: TOVA
      - name: Useful Field of View (UFOV)
        value: UFOV
      - name: Which One (WO)
        value: WO
  - name: ConfigModeEnum
    description: |
      How a `BehaverseTask` resolves its runtime configuration. `builtin`
      sends a `timelineId` to Unity referencing a timeline shipped with the
      build. `inline` embeds a full `GameConfig` (timeline + blocks + trials)
      in the diagram and sends it as a parsed JSON object — `timelineId` is
      then ignored. The two modes are mutually exclusive.
    literalValues:
      - name: Built-in timeline
        value: builtin
      - name: Inline
        value: inline
  - name: AgentModeEnum
    description: |
      Whether the task is driven by a human participant or by an automated bot. When `bot`, the runtime applies the overrides in the `botConfig` body to the loaded task's `Bot` agent component.
    literalValues:
      - name: Human
        value: human
      - name: Bot
        value: bot
types:
  - name: BehaverseTask
    description: |
      Specialized `CognitiveTask` for the Behaverse battery. It behaves like a
      normal studyflow task, but its `instrument` is fixed to `behaverse` and
      pinned (not editable in the inspector). At runtime, `scene` maps to the Behaverse
      assessment task ID (e.g., `NB`, `UFOV`). When `configMode` is `builtin`,
      `timelineId` selects a timeline shipped with the build and `configurations`
      is ignored. When `configMode` is `inline`, `configurations` carries the
      full `GameConfig` (timeline + blocks + trials) as YAML — the modeler
      parses it to a JSON object and sends it nested inside the runtime payload.
      The two modes are mutually exclusive.
    superClass:
      - studyflow:CognitiveTask
    meta:
      icon: iconify bi--hexagon
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        default: behaverse
        type: String
        isAttr: true
        redefines: studyflow:CognitiveTask#instrument
        meta:
          order: 0
          pinned: true
      - name: scene
        description: |
          Behaverse scene that delivers this task (e.g., `NB`, `UFOV`, `DS`). Maps to a task ID in the Behaverse at runtime.
        isAttr: true
        type: BehaverseSceneEnum
        default: undefined
        meta:
          order: 1
          categories:
            - Behaverse
      - name: agentMode
        description: |
          Whether the task is driven by a human participant or by an automated bot. When `bot`, the runtime applies the overrides in the `botConfig` body to the loaded task's `Bot` agent component.
        isAttr: true
        type: AgentModeEnum
        default: human
        meta:
          order: 2
          categories:
            - Behaverse
      - name: botConfig
        description: |
          Flat YAML map of bot field overrides applied per task at scene-load time, e.g. `autoAnswer: Valid`, `Speed: 100`, `SkipInstructions: true`. Only used when `agentMode` is `bot`.
        isAttr: true
        type: studyflow:YAMLString
        default: |
          autoAnswer: Valid
          Speed: 100
          SkipInstructions: true
          AutoClickInstructions: true
          SkipFocusArea: true
          overrideTemporalParameters: true
          stimulusDisplayDuration: 0.3
          interStimulusInterval: 0.3
          trialForeperiod: 0.1
        meta:
          order: 3
          categories:
            - Behaverse
          widget: textarea
          condition:
            language: json
            body:
              agentMode: bot
      - name: configMode
        description: |
          How this task resolves its runtime configuration. `builtin` sends `timelineId` to Unity (configurations is ignored); `inline` sends the full `GameConfig` parsed from `configurations` as a nested JSON object (timelineId is ignored). Mutually exclusive.
        isAttr: true
        type: ConfigModeEnum
        default: builtin
        meta:
          order: 4
          categories:
            - Behaverse
      - name: timelineId
        description: |
          Identifier of a timeline shipped with the Behaverse assessment build
          (e.g., `XCIT_NB_01`, `Demo`). The runtime validates this against the
          build's manifest before starting the study. Only used when `configMode` is `builtin`.
        isAttr: true
        type: String
        meta:
          order: 5
          categories:
            - Behaverse
          condition:
            language: json
            body:
              configMode: builtin
      - name: configurations
        description: |
          Full `GameConfig` (timeline + blocks + trials) as YAML, embedded inline in the diagram. Parsed to a JSON object on the modeler side and sent to Unity as a nested object. Only used when `configMode` is `inline`.
        isBody: true
        type: studyflow:YAMLString
        redefines: studyflow:CognitiveTask#configurations
        meta:
          order: 5
          categories:
            - Behaverse
          condition:
            language: json
            body:
              configMode: inline
templates:
  - description: N-Back task referencing a built-in timeline shipped with the Behaverse build
    object:
      type: BehaverseTask
      bpmn:name: N-Back (XCIT_NB_01)
      scene: NB
      configMode: builtin
      timelineId: XCIT_NB_01
  - description: N-Back task with a fully inline configs
    object:
      type: BehaverseTask
      bpmn:name: N-Back (inline)
      scene: NB
      configMode: inline
      configurations: |
        Id: NB
        Scene: NBack
        EnumDefinitions:
          HudWidgetPosition: [Hidden, StatusBarLeft, StatusBarCenter, StatusBarRight, InformationPanel]
          ProgressElementStyle: [Continuous, Discrete, ColoredDiscrete, Circular, Counter]
          TimerElementStyle: [Linear, Circular, TimeOnly]
          ShowAccuracyCheckFeedback: [Never, Always]
          ShowCorrectTrialResponseFeedback: [Never, OnError, Always]
        ParameterInfos:
          NValue: { Type: Int, Min: 1, Max: 200 }
          Streams: { Type: Object }
          Feature: { Type: Enum, Values: [Letters, Digits, Colors, GridPosition8, GridPosition4, Symbols] }
          StimulusValue: { Type: Int, Min: 1, Max: 100 }
          StreamSize: { Type: Int, Min: 1, Max: 200 }
          FeatureValuesCount: { Type: Int, Min: 1, Max: 100 }
          UseNonMatchButton: { Type: Bool }
          PlayerPaced: { Type: Bool }
          MaxResponseTime: { Type: Float, Min: 0 }
          ShowAccuracyOnButtonFeedback: { Type: Bool }
          ShowMissedTrialFeedback: { Type: Bool }
          ErrorTimeOutDuration: { Type: Float, Min: 0 }
          ShowSequenceComparison: { Type: Bool }
          StimulusDisplayDuration: { Type: Float, Min: 0.01 }
          InterStimulusInterval: { Type: Float, Min: 0 }
          TrialForeperiod: { Type: Float, Min: 0 }
          StimulusMovingAnimationDuration: { Type: Float, Min: 0 }
          RevealBoxContent: { Type: Enum, Values: [StimulusOnly, StimulusAndCompared, All] }
          RevealNBackBoxContentFeedback: { Type: Enum, Values: [Never, OnError, Always] }
          ShowAccuracyCheckFeedback: { Type: Enum, Name: ShowAccuracyCheckFeedback }
          ShowCorrectTrialResponseFeedback: { Type: Enum, Name: ShowCorrectTrialResponseFeedback }
          ScoreLabel_Position: { Type: Enum, Name: HudWidgetPosition }
          TaskName_Position: { Type: Enum, Name: HudWidgetPosition }
          TrialResults_Position: { Type: Enum, Name: HudWidgetPosition }
          TrialResults_Style: { Type: Enum, Name: ProgressElementStyle }
          BlockCounter_Position: { Type: Enum, Name: HudWidgetPosition }
          BlockCounter_Style: { Type: Enum, Name: ProgressElementStyle }
          TrialCounter_Position: { Type: Enum, Name: HudWidgetPosition }
          TrialCounter_Style: { Type: Enum, Name: ProgressElementStyle }
          LevelLabel_Position: { Type: Enum, Name: HudWidgetPosition }
          UserInputTimer_Position: { Type: Enum, Name: HudWidgetPosition }
          UserInputTimer_Style: { Type: Enum, Name: TimerElementStyle }
          UserInputTimer_CountUp: { Type: Bool }
          UserInputTimer_DisplayTime: { Type: Bool }
        Rules: {}
        Blocks:
          LabLink_InlineBlock:
            Name: LabLink_InlineBlock
            Parameters:
              NValue: 1
              Feature: Letters
              Streams:
                - Feature:
                    Reference: Feature
                  StimulusValue:
                    Generate: OncePerBlock
                    Sequence:
                      Type: Ordered
                      Values: [3, 1, 2, 1, 3, 2, 3, 2]
              StreamSize: 8
              FeatureValuesCount: 3
              UseNonMatchButton: true
              PlayerPaced: false
              MaxResponseTime: 3
              ShowAccuracyOnButtonFeedback: false
              ShowMissedTrialFeedback: false
              ErrorTimeOutDuration: 0
              ShowSequenceComparison: false
              StimulusDisplayDuration: 0.5
              InterStimulusInterval: 2.2
              TrialForeperiod: 0
              StimulusMovingAnimationDuration: 0.3
              RevealBoxContent: StimulusOnly
              RevealNBackBoxContentFeedback: Never
              ShowAccuracyCheckFeedback: Never
              ShowCorrectTrialResponseFeedback: Never
              ScoreLabel_Position: Hidden
              TaskName_Position: StatusBarLeft
              TrialResults_Position: InformationPanel
              TrialResults_Style: ColoredDiscrete
              BlockCounter_Position: StatusBarLeft
              BlockCounter_Style: Counter
              TrialCounter_Position: Hidden
              TrialCounter_Style: Counter
              LevelLabel_Position: Hidden
              UserInputTimer_Position: Hidden
              UserInputTimer_Style: Circular
              UserInputTimer_CountUp: true
              UserInputTimer_DisplayTime: false
        Timelines:
          LabLink_Inline:
            Name: LabLink_Inline
            blocks:
              - name: LabLink_InlineBlock
