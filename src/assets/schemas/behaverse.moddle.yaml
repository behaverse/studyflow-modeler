# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Behaverse
prefix: behaverse
description: Studyflow extension for modeling Behaverse cognitive tasks in studyflow diagrams. Defines a `Task` type with properties for selecting a Behaverse scene and a timeline.
uri: http://behaverse.org/schemas/studyflow/behaverse
icon: https://raw.githubusercontent.com/behaverse/schemas/main/assets/img/schema_B.png
xml:
  tagAlias: lowerCase
version: 26.0610
associations: []
enumerations:
  - name: BehaverseSceneEnum
    isAbstract: true
    literalValues:
      - name: Belval Card Sorting (BCS)
        value: BCS
      - name: Belval Matrices (BM)
        value: BM
      - name: Button Spatial Attention Cueing (BSAC)
        value: BSAC
      - name: Digit Span (DS)
        value: DS
      - name: Monkey Ladder (ML)
        value: ML
      - name: Multiple Object Tracking (MOT)
        value: MOT
      - name: N-Back (NB)
        value: NB
      - name: Ordered Click (OC)
        value: OC
      - name: Odd One Out (OOO)
        value: OOO
      - name: Polygon Comparison (PC)
        value: PC
      - name: Regular Expression (RE)
        value: RE
      - name: Reflexive Spatial Attention Cueing (RSAC)
        value: RSAC
      - name: Sustained Attention to Response Task (SART)
        value: SART
      - name: Symbolic Matrix Comparison (SMC)
        value: SMC
      - name: Self-Ordered Search (SOS)
        value: SOS
      - name: Stimulus-Response Mapping (SRM)
        value: SRM
      - name: Serial Reaction Time (SRT)
        value: SRT
      - name: Spatial Span (SS)
        value: SS
      - name: Target Hit (TH)
        value: TH
      - name: Test of Variable Attention (TOVA)
        value: TOVA
      - name: Useful Field of View (UFOV)
        value: UFOV
      - name: Which One (WO)
        value: WO
  - name: AgentTypeEnum
    isAbstract: true
    description: |
      Whether the task is driven by a human participant or by an automated bot. When `bot`, the runtime applies the overrides in the `botConfigurations` body to the loaded task's `Bot` agent component.
    literalValues:
      - name: Human
        value: human
      - name: Bot
        value: bot
types:
  - name: BotConfigurations
    description: |
      Wrapper element carrying the bot configuration YAML body. Subclasses
      `cognitive:Configurations` purely so moddle serializes it under a distinct
      element name (`<behaverse:botConfigurations>`) - without this, both the
      task `configurations` and `botConfigurations` properties would come out as
      `<cognitive:configurations>` siblings and the next load couldn't tell them
      apart.
    superClass:
      - cognitive:Configurations
  - name: Task
    description: |
      Specialized `CognitiveTask` for the Behaverse battery. It behaves like a
      normal studyflow task, but its `instrument` is fixed to `behaverse` and
      pinned (not editable in the inspector). At runtime, `scene` maps to the
      Behaverse assessment task ID (e.g., `NB`, `UFOV`) and `configurations`
      carries a `GameConfig` as YAML - the modeler parses it to a JSON object and
      sends it nested inside the runtime payload. A timeline listed by name only
      (no body) under `Timelines` runs one shipped with the build (e.g.
      `XCIT_NB_01`); a timeline with its own `blocks` is run inline. Both go
      through the same `configurations` mechanism.
    superClass:
      - cognitive:CognitiveTask
    meta:
      icon: iconify bi--hexagon
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        default: behaverse
        type: String
        isAttr: true
        redefines: cognitive:CognitiveTask#instrument
        meta:
          order: 0
          pinned: true
      - name: scene
        description: |
          Behaverse scene that delivers this task (e.g., `NB`, `UFOV`, `DS`). Maps to a task ID in the Behaverse at runtime.
        isAttr: true
        type: BehaverseSceneEnum
        meta:
          order: 1
          editable: true
          categories:
            - Behaverse
      - name: configurations
        description: |
          `GameConfig` as YAML, embedded in the diagram and parsed to a JSON object on the modeler side. To run a timeline shipped with the build, list it by name only (no body) under `Timelines`, e.g. `Timelines:` then an indented `XCIT_NB_01:`. To run an inline timeline, give it its own `blocks` (plus any diverging `Blocks` and fields); inline definitions are merged at runtime over the per-task baseline shipped in `Resources/<scene>.json` - so the body only needs to carry what differs from the defaults (no need to repeat `Id`, `Scene`, `EnumDefinitions`, `ParameterInfos`, `Rules`, or unchanged blocks/timelines). New blocks should set `Inherits: Default` (or another baseline block from the per-task config) so they pick up HUD/feedback parameters without restating them.
        type: cognitive:Configurations
        redefines: cognitive:CognitiveTask#configurations
        meta:
          order: 2
          categories:
            - Behaverse
          widget: textarea
      - name: agentType
        description: |
          Whether the task is driven by a human participant or by an automated bot. When `bot`, the runtime applies the overrides in the `botConfigurations` body to the loaded task's `Bot` agent component.
        isAttr: true
        type: AgentTypeEnum
        default: human
        meta:
          order: 4
          categories:
            - Behaverse
      - name: botConfigurations
        description: |
          YAML map of bot field overrides applied per task at scene-load time, e.g. `autoResponse: Valid`, `Speed: 100`, `SkipInstructions: true`. Only used when `agentType` is `bot`. Three response sources: `ResponseSource: internal` (default, Unity's in-game bot), `external` (runner picks uniformly at random), `llm` (runner asks an LLM). For `llm`, add `LLM: { Provider: claude|ollama, Model: ... }` to override the global defaults, and `Prompt: |` with a free-form system prompt describing the simulated participant (persona, target accuracy, strategy, mistakes). Set `IncludeScreenshot: true` to make Unity attach a PNG of the current frame to every `AwaitingResponse` so a vision-capable LLM can read visual stimuli (required for WhichOne, PatternComparison, UFOV, etc.). Bump `MaxResponseTime` in `configurations` to give the LLM time to reply.
        type: BotConfigurations
        meta:
          order: 5
          categories:
            - Behaverse
          widget: textarea
          condition:
            language: json
            body:
              agentType: bot
templates:
  - description: N-Back task referencing a built-in timeline shipped with the Behaverse build - listed by name only under `Timelines`.
    object:
      type: Task
      bpmn:name: N-Back (XCIT_NB_01)
      scene: NB
      configurations: |
        Timelines:
          XCIT_NB_01:
  - description: N-Back task with inline overrides - only the diverging Blocks/Timelines need to be authored; everything else is layered on top of `Resources/NB.json` at runtime.
    object:
      type: Task
      bpmn:name: N-Back (inline)
      scene: NB
      configurations: |
        Blocks:
          LabLink_InlineBlock:
            Name: LabLink_InlineBlock
            Inherits: Default
            Parameters:
              NValue: 1
              Feature: Letters
              Streams:
                - Feature:
                    Reference: Feature
                  StimulusValue:
                    Generate: OncePerBlock
                    Sequence:
                      Type: Ordered
                      Values: [3, 1, 2, 1, 3, 2, 3, 2]
              StreamSize: 8
              FeatureValuesCount: 3
              MaxResponseTime: 3
              StimulusDisplayDuration: 0.5
              InterStimulusInterval: 2.2
        Timelines:
          LabLink_Inline:
            Name: LabLink_Inline
            blocks:
              - name: LabLink_InlineBlock
