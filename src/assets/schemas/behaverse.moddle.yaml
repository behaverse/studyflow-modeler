# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Behaverse
prefix: behaverse
description: Studyflow extension for modeling Behaverse cognitive tasks in studyflow diagrams. Defines a `BehaverseTask` type with properties for selecting a Behaverse scene and a timeline.
uri: http://behaverse.org/schemas/studyflow/behaverse
icon: https://raw.githubusercontent.com/behaverse/schemas/main/assets/img/schema_B.png
xml:
  tagAlias: lowerCase
associations: []
enumerations:
  - name: BehaverseSceneEnum
    literalValues:
      - name: Undefined
        value: undefined
      - name: Belval Card Sorting (BCS)
        value: BCS
      - name: Belval Matrices (BM)
        value: BM
      - name: Button Spatial Attention Cueing (BSAC)
        value: BSAC
      - name: Digit Span (DS)
        value: DS
      - name: Monkey Ladder (ML)
        value: ML
      - name: Multiple Object Tracking (MOT)
        value: MOT
      - name: N-Back (NB)
        value: NB
      - name: Ordered Click (OC)
        value: OC
      - name: Odd One Out (OOO)
        value: OOO
      - name: Polygon Comparison (PC)
        value: PC
      - name: Regular Expression (RE)
        value: RE
      - name: Reflexive Spatial Attention Cueing (RSAC)
        value: RSAC
      - name: Sustained Attention to Response Task (SART)
        value: SART
      - name: Symbolic Matrix Comparison (SMC)
        value: SMC
      - name: Self-Ordered Search (SOS)
        value: SOS
      - name: Stimulus-Response Mapping (SRM)
        value: SRM
      - name: Serial Reaction Time (SRT)
        value: SRT
      - name: Spatial Span (SS)
        value: SS
      - name: Target Hit (TH)
        value: TH
      - name: Test of Variable Attention (TOVA)
        value: TOVA
      - name: Useful Field of View (UFOV)
        value: UFOV
      - name: Which One (WO)
        value: WO
  - name: ConfigModeEnum
    description: |
      How a `BehaverseTask` resolves its runtime configuration. `builtin`
      points to a timeline shipped with the Behaverse assessment build (with
      optional parameter overrides). `inline` embeds a full `GameConfig`  in the diagram.
    literalValues:
      - name: Built-in timeline
        value: builtin
      - name: Inline
        value: inline
types:
  - name: BehaverseTask
    description: |
      Specialized `CognitiveTask` for the Behaverse battery. It behaves like a
      normal studyflow task, but its `instrument` is fixed to `behaverse` and
      pinned (not editable in the inspector). At runtime, `scene` maps to the Behaverse
      assessment task ID (e.g., `NB`, `UFOV`) and `timelineId` selects a
      timeline shipped with the build; `configurations` either holds parameter
      overrides (when `configMode` is `builtin`) or a full `GameConfig`
      fragment (when `inline`).
    superClass:
      - studyflow:CognitiveTask
    meta:
      icon: iconify bi--hexagon
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        default: behaverse
        type: String
        isAttr: true
        redefines: studyflow:CognitiveTask#instrument
        meta:
          pinned: true
      - name: scene
        description: |
          Behaverse scene that delivers this task (e.g., `NB`, `UFOV`, `DS`). Maps to a task ID in the Behaverse at runtime.
        isAttr: true
        type: BehaverseSceneEnum
        default: undefined
        meta:
          order: 0
          categories:
            - Behaverse
      - name: configMode
        description: |
          How this task resolves its runtime configuration. `builtin` points to a timeline shipped with the Behaverse assessment build (with optional parameter overrides in `configurations`); `inline` embeds a full `GameConfig` in the studyflow diagram.
        isAttr: true
        type: ConfigModeEnum
        default: builtin
        meta:
          order: 1
          categories:
            - Behaverse
      - name: timelineId
        description: |
          Identifier of a timeline shipped with the Behaverse assessment build
          (e.g., `XCIT_NB_01`, `Demo`). The runtime validates this against the
          build's manifest before starting the study.
        isAttr: true
        type: String
        meta:
          order: 2
          categories:
            - Behaverse
          condition:
            language: json
            body:
              configMode: builtin
      - name: configurations
        description: |
          Inline `GameConfig` fragment for the Behaverse runtime. In `builtin` mode the configuration comes from the named timeline shipped with the build.
        isBody: true
        type: studyflow:YAMLString
        redefines: studyflow:CognitiveTask#configurations
        meta:
          order: 3
          categories:
            - Behaverse
          condition:
            language: json
            body:
              configMode: inline
templates:
  - description: N-Back task referencing a built-in timeline with a single parameter override
    object:
      type: BehaverseTask
      bpmn:name: N-Back (XCIT_NB_01)
      scene: NB
      configMode: builtin
      timelineId: XCIT_NB_01
      configurations: |
        # Optional parameter overrides merged on top of the named timeline.
        StimulusDisplayDuration: 0.6
        InterStimulusInterval: 2.0
  - description: N-Back task with a fully inline GameConfig (tutorial + progressive feature count)
    object:
      type: BehaverseTask
      bpmn:name: N-Back Task
      scene: NB
      configMode: inline
      configurations: |
        NValue: 1
        Streams:
          - Feature: Digits
            StimulusValue:
              Generate: OncePerBlock
              Sequence:
                Type: NBack
                Values: [3, 1, 2, 1, 3, 2, 3, 2, 1]
                NValue:
                  Reference: NValue
                StreamSize:
                  Reference: StreamSize
                MatchCount: 10
                PostLureCount: 10
                PreLureCount: 10
                FeatureValuesCount:
                  Reference: FeatureValuesCount
        StreamSize: 30
        FeatureValuesCount: 9
        UseNonMatchButton: true
        PlayerPaced: false
        MaxResponseTime: 3
        ShowAccuracyOnButtonFeedback: false
        ShowMissedTrialFeedback: false
        ErrorTimeOutDuration: 0
        ShowSequenceComparison: false
        StimulusDisplayDuration: 0.5
        InterStimulusInterval: 2.2
        TrialForeperiod: 0
        StimulusMovingAnimationDuration: 0.3
        RevealBoxContent: StimulusOnly
        RevealNBackBoxContentFeedback: Never
        ShowAccuracyCheckFeedback: Never
        ShowCorrectTrialResponseFeedback: Never
        ScoreLabel_Position: Hidden
        TrialResults_Position: InformationPanel
        TrialResults_Style: ColoredDiscrete
        UserInputTimer_Position: Hidden
        UserInputTimer_Style: Circular
        UserInputTimer_CountUp: true
        UserInputTimer_DisplayTime: false
        BlockCounter_Position: StatusBarLeft
        BlockCounter_Style: Counter
        LevelLabel_Position: Hidden
        TaskName_Position: StatusBarLeft
        TrialCounter_Position: Hidden
        TrialCounter_Style: Counter
        Feature: Digits

        timeline:
          name: ScienceFestival2019
          description: N-back demo timeline with tutorial and progressive feature count.
          exitRules:
            - action: EndTimeline
              type: Failures
              blocks: 3
              successAccuracy: 0.1
          sequence:
            - instructions:
                - content:
                    - text: Tasks.NBack.Instructions.Job
                - content:
                    - text: Tasks.Common.Instructions.TutorialIntro
                  ok: Common.IAmReady
            - block: Tutorial_2Back
            - instructions:
                - content:
                    - text: Tasks.Common.Instructions.TutorialOuttro
                - content:
                    - text: Tasks.Common.Instructions.Ready
                  ok: Common.IAmReady
            - block: ScienceFestival2019
              params:
                FeatureValuesCount: 4
            - block: ScienceFestival2019
              params:
                FeatureValuesCount: 6
            - block: ScienceFestival2019
              params:
                FeatureValuesCount: 8
            - instructions:
                - content:
                    - text: Common.ThankYou
                    - text: Instructions.YourScore
                    - text: Common.Bye
                  ok: Common.Bye

        blocks:
          Tutorial_2Back:
            minAccuracyRequired: 1
            exitRules:
              - action: FailBlock
                type: Failures
                trials: 1
          ScienceFestival2019:
            params:
              FeatureValuesCount: 4
          XCIT_NB_01_Tutorial_A_Intro:
            instructions:
              - content:
                  - text: XCIT_NB_01_Tutorial_A.Job
                    heading: 2
          XCIT_NB_01_Tutorial_A:
            rules:
              - text: XCIT_NB_01_Tutorial_A.RulesTitle
                heading: 2
              - text: XCIT_NB_01_Tutorial_A.GameRules
