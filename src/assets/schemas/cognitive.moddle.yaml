# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Cognitive
prefix: cognitive
description: Studyflow extension for cognitive and behavioral research - cognitive tasks, Behaverse assessment tasks, video-game paradigms, rest periods, questionnaires, instructions, and participant-assignment gateways.
uri: http://behaverse.org/schemas/studyflow/cognitive
icon: iconify tabler--hexagon-letter-c
xml:
  tagAlias: lowerCase
version: 26.0716
associations: []
enumerations:
  - name: InstrumentEnum
    isAbstract: true
    description: |
      Software that delivers a cognitive task. Determines how the
      task's `configurations` YAML is interpreted. Properties typed with this
      enum may also accept custom identifiers when annotated with `meta.editable: true`.
    literalValues:
      - name: PsychoPy
        value: psychopy
      - name: jsPsych
        value: jspsych
      - name: lab.js
        value: labjs
      - name: OpenSesame
        value: opensesame
  - name: QuestionnaireInstrumentEnum
    isAbstract: true
    description: |
      Curated list of standardized questionnaires. This list is a starting
      point for common psychometric instruments; properties typed with this
      enum may also accept custom names when annotated with `meta.editable: true`.
    literalValues:
      - name: PHQ-9
        value: phq-9
      - name: GAD-7
        value: gad-7
      - name: BDI-II
        value: bdi-ii
      - name: STAI
        value: stai
      - name: PSS
        value: pss
      - name: WHO-5
        value: who-5
      - name: Big Five Inventory
        value: bfi
      - name: DASS-21
        value: dass-21
      - name: PANAS
        value: panas
  - name: ActorTypeEnum
    isAbstract: true
    description: |
      Kind of actor represented by a participant pool. Distinguishes human
      participants from artificial agents and from instrumented apparatus.
      Choreography tasks between any combination (human-human, human-llm,
      human-instrument) use the same BPMN choreography primitive.
    literalValues:
      - name: Human
        value: human
      - name: Large Language Model
        value: llm
      - name: Software Agent
        value: agent
        description: Non-LLM software agent (e.g., a reinforcement-learning policy or rule-based bot).
      - name: Instrument
        value: instrument
        description: Apparatus or recording device that participates in the study (e.g., an EEG amplifier triggering events).
  - name: BehaverseSceneEnum
    isAbstract: true
    description: Behaverse assessment scene delivered by a `BehaverseTask`.
    literalValues:
      - name: Belval Card Sorting (BCS)
        value: BCS
      - name: Belval Matrices (BM)
        value: BM
      - name: Button Spatial Attention Cueing (BSAC)
        value: BSAC
      - name: Digit Span (DS)
        value: DS
      - name: Monkey Ladder (ML)
        value: ML
      - name: Multiple Object Tracking (MOT)
        value: MOT
      - name: N-Back (NB)
        value: NB
      - name: Ordered Click (OC)
        value: OC
      - name: Odd One Out (OOO)
        value: OOO
      - name: Polygon Comparison (PC)
        value: PC
      - name: Regular Expression (RE)
        value: RE
      - name: Reflexive Spatial Attention Cueing (RSAC)
        value: RSAC
      - name: Sustained Attention to Response Task (SART)
        value: SART
      - name: Symbolic Matrix Comparison (SMC)
        value: SMC
      - name: Self-Ordered Search (SOS)
        value: SOS
      - name: Stimulus-Response Mapping (SRM)
        value: SRM
      - name: Serial Reaction Time (SRT)
        value: SRT
      - name: Spatial Span (SS)
        value: SS
      - name: Target Hit (TH)
        value: TH
      - name: Test of Variable Attention (TOVA)
        value: TOVA
      - name: Useful Field of View (UFOV)
        value: UFOV
      - name: Which One (WO)
        value: WO
  - name: AgentTypeEnum
    isAbstract: true
    description: |
      Whether a `BehaverseTask` is driven by a human participant or by an automated bot. When `bot`, the runtime applies the overrides in the `botConfigurations` body to the loaded task's `Bot` agent component.
    literalValues:
      - name: Human
        value: human
      - name: Bot
        value: bot
types:
  - name: Configurations
    description: |
      Wrapper element carrying an instrument-specific configuration block (YAML)
      as its text body. Used as a child element on tasks that need to declare
      runtime configuration without polluting parent attributes or the parent's
      own text body.
    properties:
      - name: value
        isBody: true
        type: studyflow:YAMLString
  - name: BotConfigurations
    description: |
      Wrapper element carrying the bot configuration YAML body for a
      `BehaverseTask`. Subclasses `Configurations` purely so moddle serializes it
      under a distinct element name (`<cognitive:botConfigurations>`) - without
      this, both the task `configurations` and `botConfigurations` properties
      would come out as `<cognitive:configurations>` siblings and the next load
      couldn't tell them apart.
    superClass:
      - Configurations
  - name: CognitiveTask
    description: |
      A cognitive test administered to a participant (e.g., a working-memory or
      attention task). Concrete tasks are defined by the  `instrument` (the software used to deliver them) and configured via a YAML `configurations` block whose format depends on that instrument.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify bi--puzzle
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Software used to deliver the task. Determines how `configurations` are interpreted. Pick a listed option or type a custom identifier.
        isAttr: true
        type: InstrumentEnum
        meta:
          editable: true
          categories:
            - Instrument
      - name: configurations
        description: |
          Instrument-specific configuration in YAML format (e.g., number of
          trials, stimulus duration, block structure). The shape of the YAML
          depends on the chosen `instrument`.
        type: Configurations
        meta:
          categories:
            - Instrument
      - name: isDataOperation
        description: CognitiveTask is not a data operation; this pinned property fixes the value so the data-operation marker is never rendered.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: Rest
    description: |
      A rest period of inactivity or minimal activity. Often used for baseline
      measurements or breaks between activities. Can also represent
      resting-state recordings (e.g., resting EEG/fMRI).
    superClass:
      - CognitiveTask
    meta:
      icon: iconify solar--armchair-2-linear
      bpmnType: bpmn:Task
    properties:
      - name: configurations
        description: Rest configuration in YAML format (e.g., duration, eyes-open/closed).
        type: Configurations
        redefines: CognitiveTask#configurations
        meta:
          categories:
            - Instrument
  - name: Questionnaire
    description: |
      A self-report instrument administered to a participant - either a standardized psychometric questionnaire (e.g., PHQ-9, GAD-7) or a custom form. The `instrument` identifies which questionnaire is shown.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify fluent--clipboard-text-edit-32-regular
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Instrument name used for the questionnaire. This can be an identifier for standardized questionnaires (e.g., PHQ-9, BDI-II, GAD-7) or a custom name for non-standardized questionnaires.
        isAttr: true
        type: QuestionnaireInstrumentEnum
        meta:
          editable: true
          categories:
            - Instrument
      - name: isDataOperation
        description: Questionnaire is not a data operation.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: Instruction
    description: |
      A passive information display shown to the participant (e.g., task
      instructions, a briefing or debrief screen). Not a questionnaire and not a
      data operation - just content to read before continuing.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify material-symbols--info-outline-rounded
      bpmnType: bpmn:Task
      categories:
        - Activities
    properties:
      - name: content
        description: Instruction content in markdown format.
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Content
      - name: isDataOperation
        description: Instruction is not a data operation; this pinned property fixes the value so the data-operation marker is never rendered.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: BehaverseTask
    description: |
      Specialized `CognitiveTask` for the Behaverse battery. It behaves like a
      normal studyflow task, but its `instrument` is fixed to `behaverse` and
      pinned (not editable in the inspector). At runtime, `scene` maps to the
      Behaverse assessment task ID (e.g., `NB`, `UFOV`) and `configurations`
      carries a `GameConfig` as YAML - the modeler parses it to a JSON object and
      sends it nested inside the runtime payload. A timeline listed by name only
      (no body) under `Timelines` runs one shipped with the build (e.g.
      `XCIT_NB_01`); a timeline with its own `blocks` is run inline. Both go
      through the same `configurations` mechanism.
    superClass:
      - CognitiveTask
    meta:
      icon: iconify bi--hexagon
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        default: behaverse
        type: String
        isAttr: true
        redefines: CognitiveTask#instrument
        meta:
          order: 0
          pinned: true
      - name: scene
        description: |
          Behaverse scene that delivers this task (e.g., `NB`, `UFOV`, `DS`). Maps to a task ID in the Behaverse at runtime.
        isAttr: true
        type: BehaverseSceneEnum
        meta:
          order: 1
          editable: true
          categories:
            - Behaverse
      - name: configurations
        description: |
          `GameConfig` as YAML, embedded in the diagram and parsed to a JSON object on the modeler side. To run a timeline shipped with the build, list it by name only (no body) under `Timelines`, e.g. `Timelines:` then an indented `XCIT_NB_01:`. To run an inline timeline, give it its own `blocks` (plus any diverging `Blocks` and fields); inline definitions are merged at runtime over the per-task baseline shipped in `Resources/<scene>.json` - so the body only needs to carry what differs from the defaults (no need to repeat `Id`, `Scene`, `EnumDefinitions`, `ParameterInfos`, `Rules`, or unchanged blocks/timelines). New blocks should set `Inherits: Default` (or another baseline block from the per-task config) so they pick up HUD/feedback parameters without restating them.
        type: Configurations
        redefines: CognitiveTask#configurations
        meta:
          order: 2
          categories:
            - Behaverse
          widget: textarea
      - name: agentType
        description: |
          Whether the task is driven by a human participant or by an automated bot. When `bot`, the runtime applies the overrides in the `botConfigurations` body to the loaded task's `Bot` agent component.
        isAttr: true
        type: AgentTypeEnum
        default: human
        meta:
          order: 4
          categories:
            - Behaverse
      - name: botConfigurations
        description: |
          YAML map of bot field overrides applied per task at scene-load time, e.g. `autoResponse: Valid`, `Speed: 100`, `SkipInstructions: true`. Only used when `agentType` is `bot`. Three response sources: `ResponseSource: internal` (default, Unity's in-game bot), `external` (runner picks uniformly at random), `llm` (runner asks an LLM). For `llm`, add `LLM: { Provider: claude|ollama, Model: ... }` to override the global defaults, and `Prompt: |` with a free-form system prompt describing the simulated participant (persona, target accuracy, strategy, mistakes). Set `IncludeScreenshot: true` to make Unity attach a PNG of the current frame to every `AwaitingResponse` so a vision-capable LLM can read visual stimuli (required for WhichOne, PatternComparison, UFOV, etc.). Bump `MaxResponseTime` in `configurations` to give the LLM time to reply.
        type: BotConfigurations
        meta:
          order: 5
          categories:
            - Behaverse
          widget: textarea
          condition:
            language: json
            body:
              agentType: bot
  - name: RandomGateway
    description: |
      Randomly assigns participants to one of the outgoing branches according
      to a probability distribution.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify streamline-flex--dice-5
      bpmnType: bpmn:ExclusiveGateway
      # Runner branching semantics: pick an outgoing branch at random instead
      # of evaluating conditions. Read from the catalog by the runner Session.
      branching: random
    properties:
      - name: algorithm
        description: Algorithm used for the assignment.
        isAttr: true
        type: studyflow:AssignmentAlgorithmEnum
        default: probabilistic
        meta:
          categories:
            - Assignment
      - name: probabilityFunction
        description: |
          Probability mass function that defines the discrete distribution of the random assignment. Defaults to `uniform`. Pick a listed option or type a custom identifier.
        isAttr: true
        type: studyflow:ProbabilityDistributionEnum
        default: uniform
        meta:
          editable: true
          categories:
            - Assignment
          condition:
            language: json
            body:
              algorithm: probabilistic
  - name: StratifiedAllocationGateway
    description: |
      Stratified random assignment of participants. The cohort is partitioned
      into strata based on a stratification variable (e.g., age band, sex,
      baseline score), and assignment is performed independently within each
      stratum to balance allocation across branches.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--layers-outline
      bpmnType: bpmn:ExclusiveGateway
      branching: random
    properties:
      - name: stratificationVariable
        description: |
          Name of the variable used to partition participants into strata
          (e.g., `age_band`, `sex`, `baseline_score`).
        isAttr: true
        type: String
        meta:
          categories:
            - Assignment
      - name: strata
        description: |
          Definition of the strata used for allocation (one entry per stratum),
          formatted in markdown. For example: `age_band: 18-29`.
        isAttr: false
        type: studyflow:MarkdownString
        isMany: true
        meta:
          categories:
            - Assignment
      - name: algorithm
        description: Algorithm used for the assignment within each stratum.
        isAttr: true
        type: studyflow:AssignmentAlgorithmEnum
        default: probabilistic
        meta:
          categories:
            - Assignment
      - name: probabilityFunction
        description: |
          Probability mass function that defines the per-stratum discrete
          distribution. Defaults to `uniform`. Pick a listed option or type a custom identifier.
        isAttr: true
        type: studyflow:ProbabilityDistributionEnum
        default: uniform
        meta:
          editable: true
          categories:
            - Assignment
          condition:
            language: json
            body:
              algorithm: probabilistic
  - name: EligibilityGateway
    description: |
      Decision gateway encoding inclusion and/or exclusion criteria for
      participant eligibility. Participants meeting the inclusion criteria (and
      none of the exclusion criteria) proceed; others are routed to a
      screen-out branch.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--filter-check-outline
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: inclusionCriteria
        description: |
          List of inclusion criteria (one entry per criterion), formatted in
          markdown. Example: `Age between 18 and 65`.
        isAttr: false
        type: studyflow:MarkdownString
        isMany: true
        meta:
          categories:
            - Eligibility
      - name: exclusionCriteria
        description: |
          List of exclusion criteria (one entry per criterion), formatted in
          markdown. Example: `History of neurological disorder`.
        isAttr: false
        type: studyflow:MarkdownString
        isMany: true
        meta:
          categories:
            - Eligibility
  - name: Actor
    description: |
      A participant pool tagged with actor-type metadata so it can be flagged
      as human, LLM, software agent, or instrument. Renders as a standard BPMN
      Pool; choreography tasks continue to use the standard BPMN ParticipantRef.
      Multi-agent cognitive studies use this to disambiguate human-vs-artificial
      pools without redefining the BPMN choreography primitive.
    superClass:
      - bpmn:Participant
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--account-group
      bpmnType: bpmn:Participant
    properties:
      - name: actorType
        description: Kind of actor this pool represents.
        isAttr: true
        type: ActorTypeEnum
        default: human
        meta:
          categories:
            - Actor
      - name: spec
        description: |
          Identifier of the non-human actor: a model id when actorType is `llm`
          (e.g., `gpt-4`, `claude-opus-4-8`, `gemini-2.5-pro`), a software-agent
          specification when `agent` (e.g., a CogEnv profile, a checkpoint hash),
          or an instrument/device id when `instrument` (e.g., an LSL stream name,
          a device serial). Free text so any provider or device can be named.
        isAttr: true
        type: String
        meta:
          categories:
            - Actor
          condition:
            language: json
            body:
              actorType:
                - llm
                - agent
                - instrument
      - name: promptTemplate
        description: |
          Optional prompt template applied to the LLM actor each turn. Use
          markdown; placeholders (e.g. `{{stimulus}}`, `{{history}}`) are
          resolved by the runner adapter at execution time.
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Actor
          condition:
            language: json
            body:
              actorType: llm

templates:
  # A video game paradigm is not its own element type - it is a CognitiveTask
  # whose instrument happens to be a game engine, preset here as a template
  # (parameterize, don't proliferate).
  - description: An interactive video game used as an experimental paradigm or measurement instrument.
    object:
      bpmn:name: Video Game
      type: CognitiveTask
      bpmn:documentation: An interactive video game used as an experimental paradigm or measurement instrument. Set the game engine in `instrument` and its level set / difficulty / scoring in `configurations`.
      icon: iconify bi--controller
      keywords:
        - game
        - videogame
        - paradigm
        - instrument
      configurations: |
        levels:
        difficulty:
        scoring:
  # Behaverse assessment-task presets (a BehaverseTask is a CognitiveTask whose
  # instrument is pinned to `behaverse`).
  - description: N-Back task referencing a built-in timeline shipped with the Behaverse build - listed by name only under `Timelines`.
    object:
      type: BehaverseTask
      bpmn:name: N-Back (XCIT_NB_01)
      scene: NB
      configurations: |
        Timelines:
          XCIT_NB_01:
  - description: N-Back task with inline overrides - only the diverging Blocks/Timelines need to be authored; everything else is layered on top of `Resources/NB.json` at runtime.
    object:
      type: BehaverseTask
      bpmn:name: N-Back (inline)
      scene: NB
      configurations: |
        Blocks:
          LabLink_InlineBlock:
            Name: LabLink_InlineBlock
            Inherits: Default
            Parameters:
              NValue: 1
              Feature: Letters
              Streams:
                - Feature:
                    Reference: Feature
                  StimulusValue:
                    Generate: OncePerBlock
                    Sequence:
                      Type: Ordered
                      Values: [3, 1, 2, 1, 3, 2, 3, 2]
              StreamSize: 8
              FeatureValuesCount: 3
              MaxResponseTime: 3
              StimulusDisplayDuration: 0.5
              InterStimulusInterval: 2.2
        Timelines:
          LabLink_Inline:
            Name: LabLink_Inline
            blocks:
              - name: LabLink_InlineBlock
