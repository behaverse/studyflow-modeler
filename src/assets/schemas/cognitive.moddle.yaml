# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Cognitive
prefix: cognitive
description: Studyflow extension for cognitive and behavioral research - cognitive tasks, video-game paradigms, rest periods, questionnaires, instructions, and participant-assignment gateways.
uri: http://behaverse.org/schemas/studyflow/cognitive
icon: iconify tabler--hexagon-letter-c
xml:
  tagAlias: lowerCase
version: 26.0528
associations: []
enumerations:
  - name: InstrumentEnum
    description: |
      Software that delivers a cognitive task. Determines how the
      task's `configurations` YAML is interpreted. Properties typed with this
      enum may also accept custom identifiers when annotated with `meta.editable: true`.
    literalValues:
      - name: PsychoPy
        value: psychopy
      - name: jsPsych
        value: jspsych
      - name: lab.js
        value: labjs
      - name: OpenSesame
        value: opensesame
  - name: QuestionnaireInstrumentEnum
    description: |
      Curated list of standardized questionnaires. This list is a starting
      point for common psychometric instruments; properties typed with this
      enum may also accept custom names when annotated with `meta.editable: true`.
    literalValues:
      - name: PHQ-9
        value: phq-9
      - name: GAD-7
        value: gad-7
      - name: BDI-II
        value: bdi-ii
      - name: STAI
        value: stai
      - name: PSS
        value: pss
      - name: WHO-5
        value: who-5
      - name: Big Five Inventory
        value: bfi
      - name: DASS-21
        value: dass-21
      - name: PANAS
        value: panas
      - name: Other
        value: other
  - name: ActorTypeEnum
    description: |
      Kind of actor represented by a participant pool. Distinguishes human
      participants from artificial agents and from instrumented apparatus.
      Choreography tasks between any combination (human-human, human-llm,
      human-instrument) use the same BPMN choreography primitive.
    literalValues:
      - name: Human
        value: human
      - name: Large Language Model
        value: llm
      - name: Software Agent
        value: agent
        description: Non-LLM software agent (e.g., a reinforcement-learning policy or rule-based bot).
      - name: Instrument
        value: instrument
        description: Apparatus or recording device that participates in the study (e.g., an EEG amplifier triggering events).
types:
  - name: Configurations
    description: |
      Wrapper element carrying an instrument-specific configuration block (YAML)
      as its text body. Used as a child element on tasks that need to declare
      runtime configuration without polluting parent attributes or the parent's
      own text body.
    properties:
      - name: value
        isBody: true
        type: studyflow:YAMLString
  - name: CognitiveTask
    description: |
      A cognitive test administered to a participant (e.g., a working-memory or
      attention task). Concrete tasks are defined by the  `instrument` (the software used to deliver them) and configured via a YAML `configurations` block whose format depends on that instrument.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify bi--puzzle
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Software used to deliver the task. Determines how `configurations` are interpreted. Pick a listed option or type a custom identifier.
        isAttr: true
        type: InstrumentEnum
        meta:
          editable: true
          categories:
            - Instrument
      - name: configurations
        description: |
          Instrument-specific configuration in YAML format (e.g., number of
          trials, stimulus duration, block structure). The shape of the YAML
          depends on the chosen `instrument`.
        type: Configurations
        meta:
          categories:
            - Instrument
      - name: isDataOperation
        description: CognitiveTask is not a data operation; this pinned property fixes the value so the data-operation marker is never rendered.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: VideoGame
    description: |
      An interactive video game used as an experimental paradigm or measurement
      instrument. Configuration is provided as a YAML `configurations` block whose
      shape depends on the game engine.
    superClass:
      - CognitiveTask
    meta:
      icon: iconify bi--controller
      bpmnType: bpmn:Task
    properties:
      - name: configurations
        description: Game configuration in YAML format (level set, difficulty, scoring, etc.).
        type: Configurations
        redefines: CognitiveTask#configurations
        meta:
          categories:
            - Instrument
  - name: Rest
    description: |
      A rest period of inactivity or minimal activity. Often used for baseline
      measurements or breaks between activities. Can also represent
      resting-state recordings (e.g., resting EEG/fMRI).
    superClass:
      - CognitiveTask
    meta:
      icon: iconify solar--armchair-2-linear
      bpmnType: bpmn:Task
    properties:
      - name: configurations
        description: Rest configuration in YAML format (e.g., duration, eyes-open/closed).
        type: Configurations
        redefines: CognitiveTask#configurations
        meta:
          categories:
            - Instrument
  - name: Questionnaire
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify fluent--clipboard-text-edit-32-regular
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Instrument name used for the questionnaire. This can be an identifier for standardized questionnaires (e.g., PHQ-9, BDI-II, GAD-7) or a custom name for non-standardized questionnaires.
        isAttr: true
        type: QuestionnaireInstrumentEnum
        meta:
          editable: true
          categories:
            - Instrument
      - name: isDataOperation
        description: Questionnaire is not a data operation.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: Instruction
    description: A passive information display.
    superClass:
      - cognitive:Questionnaire
    meta:
      icon: iconify material-symbols--info-outline-rounded
      categories:
        - Activities
    properties:
      - name: instrument
        redefines: cognitive:Questionnaire#instrument
        isAttr: true
        type: String
        default: instruction
      - name: content
        description: Instruction content in markdown format.
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Content
  - name: RandomGateway
    description: |
      Randomly assigns participants to one of the outgoing branches according
      to a probability distribution.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify streamline-flex--dice-5
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: algorithm
        description: Algorithm used for the assignment.
        isAttr: true
        type: studyflow:AssignmentAlgorithmEnum
        default: probabilistic
        meta:
          categories:
            - Assignment
      - name: probabilityFunction
        description: |
          Probability mass function that defines the discrete distribution of the random assignment. Defaults to `uniform`.
        isAttr: true
        type: String
        default: uniform
        meta:
          categories:
            - Assignment
          condition:
            language: json
            body:
              algorithm: probabilistic
  - name: StratifiedAllocationGateway
    description: |
      Stratified random assignment of participants. The cohort is partitioned
      into strata based on a stratification variable (e.g., age band, sex,
      baseline score), and assignment is performed independently within each
      stratum to balance allocation across branches.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--layers-outline
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: stratificationVariable
        description: |
          Name of the variable used to partition participants into strata
          (e.g., `age_band`, `sex`, `baseline_score`).
        isAttr: true
        type: String
        meta:
          categories:
            - Assignment
      - name: strata
        description: |
          Definition of the strata used for allocation (one entry per stratum),
          formatted in markdown. For example: `age_band: 18-29`.
        isAttr: false
        type: studyflow:MarkdownString
        isMany: true
        meta:
          categories:
            - Assignment
      - name: algorithm
        description: Algorithm used for the assignment within each stratum.
        isAttr: true
        type: studyflow:AssignmentAlgorithmEnum
        default: probabilistic
        meta:
          categories:
            - Assignment
      - name: probabilityFunction
        description: |
          Probability mass function that defines the per-stratum discrete
          distribution. Defaults to `uniform`.
        isAttr: true
        type: String
        default: uniform
        meta:
          categories:
            - Assignment
          condition:
            language: json
            body:
              algorithm: probabilistic
  - name: EligibilityGateway
    description: |
      Decision gateway encoding inclusion and/or exclusion criteria for
      participant eligibility. Participants meeting the inclusion criteria (and
      none of the exclusion criteria) proceed; others are routed to a
      screen-out branch.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--filter-check-outline
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: inclusionCriteria
        description: |
          List of inclusion criteria (one entry per criterion), formatted in
          markdown. Example: `Age between 18 and 65`.
        isAttr: false
        type: studyflow:MarkdownString
        isMany: true
        meta:
          categories:
            - Eligibility
      - name: exclusionCriteria
        description: |
          List of exclusion criteria (one entry per criterion), formatted in
          markdown. Example: `History of neurological disorder`.
        isAttr: false
        type: studyflow:MarkdownString
        isMany: true
        meta:
          categories:
            - Eligibility
  - name: Actor
    description: |
      A participant pool tagged with actor-type metadata so it can be flagged
      as human, LLM, software agent, or instrument. Renders as a standard BPMN
      Pool; choreography tasks continue to use the standard BPMN ParticipantRef.
      Multi-agent cognitive studies use this to disambiguate human-vs-artificial
      pools without redefining the BPMN choreography primitive.
    superClass:
      - bpmn:Participant
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--account-group
      bpmnType: bpmn:Participant
    properties:
      - name: actorType
        description: Kind of actor this pool represents.
        isAttr: true
        type: ActorTypeEnum
        default: human
        meta:
          categories:
            - Actor
      - name: model
        description: |
          Model identifier when actorType is llm (e.g., `gpt-4`, `claude-opus-4-7`,
          `gemini-2.5-pro`). Free text so any provider can be named.
        isAttr: true
        type: String
        meta:
          categories:
            - Actor
          condition:
            language: json
            body:
              actorType: llm
      - name: promptTemplate
        description: |
          Optional prompt template applied to the LLM actor each turn. Use
          markdown; placeholders (e.g. `{{stimulus}}`, `{{history}}`) are
          resolved by the runner adapter at execution time.
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Actor
          condition:
            language: json
            body:
              actorType: llm
      - name: agentSpec
        description: |
          Optional URI or identifier of a software-agent specification when
          actorType is agent (e.g., a CogEnv profile, a checkpoint hash).
        isAttr: true
        type: String
        meta:
          categories:
            - Actor
          condition:
            language: json
            body:
              actorType: agent
      - name: instrumentSpec
        description: |
          Optional identifier of an instrument or recording device when
          actorType is instrument (e.g., an LSL stream name, a device serial).
        isAttr: true
        type: String
        meta:
          categories:
            - Actor
          condition:
            language: json
            body:
              actorType: instrument
