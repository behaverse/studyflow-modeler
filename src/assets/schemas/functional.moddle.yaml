# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Functional
prefix: functional
description: >-
  The functional-programming vocabulary of Studyflow - transform, map, reduce,
  and filter over data. These are the generic anchors every domain layer binds
  its verbs onto (an ML fit is a `Reduce` over rows, a preprocessing pass a
  `Map` over subjects); what a step actually does is the real software named
  by `implementation` with its keyword arguments in `arguments`, and the data
  it reads and writes is wired on the canvas. A fan-out is BPMN's own
  multi-instance marker over a wired collection; a hierarchical workflow is
  BPMN's native SubProcess. Domain schemas keep their own terminology and
  root their presets here.
uri: https://w3id.org/studyflow/functional
icon: iconify tabler--hexagon-letter-f
xml:
  tagAlias: lowerCase
version: 26.0717

associations: []

enumerations: []

types:
  # ---------------------------------------------------------------------------
  # The functional core: composing functions over data.
  # ---------------------------------------------------------------------------
  - name: Transform
    description: Apply a function to data - the generic step every operation specializes.
    superClass:
      - bpmn:ServiceTask
      - bpmn:BaseElement
    meta:
      bpmnType: bpmn:ServiceTask
    properties:
      # `implementation` (the versioned function reference) comes from the
      # `exec:Implementation` trait on bpmn:ServiceTask - declared once there.
      - name: operationType
        isAttr: true
        default: transform
        type: String
        meta:
          pinned: true
  - name: Map
    description: Map a function over each element of a data stream, producing a new stream.
    superClass:
      - functional:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: map
        redefines: functional:Transform#operationType
  - name: Reduce
    description: Reduce a data stream to a single value (a statistic, a fitted model, a report).
    superClass:
      - functional:Transform
    meta:
      icon: iconify mdi--sigma
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: reduce
        redefines: functional:Transform#operationType
  - name: Filter
    description: |
      Filter a data stream based on a condition. Elements that satisfy the predicate are kept; those that don't are removed.
    superClass:
      - functional:Transform
    meta:
      icon: iconify mdi--filter-variant
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          pinned: true
        default: filter
        redefines: functional:Transform#operationType
  # (There is no FlatMap or Compose type: both are a `Transform` bound to a
  # different function, which is what `implementation` is for. A record or a
  # collection is BPMN's own `bpmn:DataObjectReference` - with
  # `isCollection: true` for the native collection marker; a hierarchical
  # workflow is BPMN's native `bpmn:SubProcess`.)

  # ---------------------------------------------------------------------------
  # (There is no fan-out trait either: the multi-instance marker is BPMN's own
  # `loopCharacteristics` child, the collection is the wired data element, the
  # per-instance item is named by the input association's `parameter`, and
  # instance outputs assemble in order into the wired output. Joining them
  # differently - concatenating tables, folding to a statistic - is an
  # explicit downstream step, not workflow configuration.)

templates:
  - description: Fan out over a collection - one instance of the body per item, joined when all finish.
    object:
      bpmn:name: For each
      type: bpmn:SubProcess
      bpmn:documentation: |
        A native sub-process with BPMN's own multi-instance marker: one
        instance per element of the wired collection input (the association's
        `parameter` names the current item inside the body), instance outputs
        assembled in order into the wired collection output - the map step of
        a pipeline (per participant, per file, per eval item). Joining the
        outputs differently (concatenate tables, fold to a statistic) is an
        explicit downstream step.
      icon: iconify mdi--arrow-split-vertical
      keywords:
        - foreach
        - map
        - fanout
        - items
        - parallel
      loopCharacteristics:
        type: bpmn:MultiInstanceLoopCharacteristics

  - description: Partition a data stream into named groups by a key (e.g., participant, condition, block).
    object:
      bpmn:name: Group
      type: Map
      bpmn:documentation: |
        Partition a data stream into named groups by a key (e.g., participant,
        condition, block). Bound to Python's own `itertools.groupby(iterable,
        key)` - the stream is sorted by the key first, as groupby requires.
      icon: iconify mdi--group
      keywords:
        - group
        - groupby
        - partition
      operationType: group
      implementation: python://itertools.groupby
      arguments: "key: participant"
