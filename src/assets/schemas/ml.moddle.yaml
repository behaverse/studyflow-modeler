# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: ML
prefix: ml
description: >-
  Statistical and machine-learning pipelines in scikit-learn's own terminology
  (load, split, build, fit, evaluate, cross-validate, save), as presets over
  the generic `functional` operations - this schema declares no element types
  at all. An ML pipeline is a data pipeline the engine can run one Python
  call at a time, and estimators are data: building one is a call
  (`make_pipeline(PCA(16), SVC())` - a `functional:Transform` whose output is
  the unfitted estimator on a wire), fitting is a call
  (`sklearn.pipeline.Pipeline.fit`, the unbound method, its `self` wired in -
  a `functional:Reduce`: rows in, one fitted artifact out). Every
  `implementation` is a real importable callable, `arguments` holds its literal
  keyword arguments, and each wired input binds to the callable parameter
  named on its association (`estimator`, `X`, `y`, `self`), defaulting to
  the wired element's name; `$Element.field` references reach into a wired
  value when a callable needs a field. Cross-validation and
  hyperparameter search are scikit-learn's own `cross_validate` and
  `GridSearchCV` - not workflow constructs; a promotion rule is a native
  gateway's own `conditionExpression`.
uri: https://w3id.org/studyflow/ml
icon: iconify tabler--hexagon-letter-m
xml:
  tagAlias: lowerCase
version: 26.0717

associations: []
enumerations: []
types: []

templates:

  # ===========================================================================
  # Steps - functional operations bound to sklearn functions. `operationType`
  # names the ML verb (load, splitData, build, fit, evaluate, crossValidate,
  # save); `implementation` + `arguments` say what actually runs.
  # ===========================================================================
  - description: Load a bundled sample dataset (scikit-learn's digits) as a table.
    object:
      bpmn:name: Load sample dataset
      type: functional:Transform
      bpmn:documentation: |
        Loads one of scikit-learn's bundled datasets - the standard way to
        make a pipeline runnable before the real data exists. Repoint
        `implementation` at `load_iris`, `fetch_openml`, or your own loader
        (or use a `datatrove:Reader` for files); the step's shape does not
        change. Wire its output to a `studyflow:Table` so downstream steps
        have a typed artifact to read.
      icon: iconify mdi--database-import-outline
      keywords:
        - load
        - dataset
        - sample
        - sklearn
        - digits
        - iris
      operationType: load
      implementation: python://sklearn.datasets.load_digits
      arguments: "as_frame: true"

  - description: Group-aware train/test split - keeps every row from a participant on one side.
    object:
      bpmn:name: Train/test split
      type: functional:Transform
      bpmn:documentation: |
        Holds out 20% for testing, grouped by participant so no subject appears
        in both partitions - the one split parameter that matters in
        human-subjects work. Bound to scikit-learn's
        `GroupShuffleSplit(n_splits, test_size)`; the group labels
        (participant ids) are not configuration - they arrive as a wired data
        input (`parameter: groups`, exactly `split(X, y, groups)`). Repoint `implementation` at
        `train_test_split` or another splitter when grouping does not matter.
      icon: iconify mdi--call-split
      keywords:
        - split
        - train
        - test
        - holdout
        - sklearn
        - leakage
      operationType: splitData
      implementation: python://sklearn.model_selection.GroupShuffleSplit
      arguments: "n_splits: 1\ntest_size: 0.2"

  - description: Project features onto fewer dimensions (PCA) before fitting.
    object:
      bpmn:name: Reduce dimensions
      type: functional:Map
      bpmn:documentation: |
        Builds a PCA projector for mapping rows into a lower-dimensional
        space. Usually it belongs *inside* the estimator -
        `make_pipeline(PCA(...), SVC(...))` - so cross-validation refits it
        per fold without leakage; standalone, fit-and-apply it with a "Fit
        estimator" step bound to `sklearn.decomposition.PCA.fit_transform`.
      icon: iconify mdi--arrow-collapse
      keywords:
        - pca
        - dimensionality
        - reduce
        - projection
        - features
      operationType: project
      implementation: python://sklearn.decomposition.PCA
      arguments: "n_components: 16\nwhiten: false"

  - description: Build an estimator - constructors are calls, and estimators are data.
    object:
      bpmn:name: Build estimator
      type: functional:Transform
      bpmn:documentation: |
        Builds an *unfitted* estimator that flows down a wire like any table:
        `make_pipeline(PCA(n_components=16), SVC(kernel="rbf", C=1.0))`.
        `make_pipeline` takes its steps positionally, so they go under the
        reserved `args` key, and each step is a nested call - a mapping with
        its own `implementation` and `arguments`, which the runner resolves first.
        Wire the result into "Cross-validate" and "Fit estimator" so both
        work on exactly the same specification; bind any constructor the same
        way (`sklearn.ensemble.RandomForestClassifier` with its kwargs in
        `arguments`) when a single estimator is enough.
      icon: iconify mdi--school-outline
      keywords:
        - build
        - estimator
        - pipeline
        - sklearn
        - classifier
        - model
      operationType: build
      implementation: python://sklearn.pipeline.make_pipeline
      arguments: "args:\n  - implementation: python://sklearn.decomposition.PCA\n    arguments:\n      n_components: 16\n  - implementation: python://sklearn.svm.SVC\n    arguments:\n      kernel: rbf\n      C: 1.0"

  - description: Fit an estimator on data - the call that actually trains the model.
    object:
      bpmn:name: Fit estimator
      type: functional:Reduce
      bpmn:documentation: |
        The fitting call. `sklearn.pipeline.Pipeline.fit` is the unbound
        method: wire the estimator in with `parameter: self` and the data
        with `parameter: X` and `parameter: y` - that is exactly
        `pipeline.fit(X, y)`. When an argument is a *field* of a wired
        element, use a scoped reference in `arguments` instead
        (`y: $MyTable.target`). `fit` returns the fitted estimator, which
        binds to the wired output. For a bare estimator,
        bind its own class's method the same way
        (`sklearn.ensemble.RandomForestClassifier.fit`,
        `sklearn.model_selection.GridSearchCV.fit`).
      icon: iconify mdi--sigma
      keywords:
        - fit
        - train
        - estimator
        - sklearn
        - model
      operationType: fit
      implementation: python://sklearn.pipeline.Pipeline.fit

  - description: Build a statistical model from a Wilkinson formula (mixed-effects).
    object:
      bpmn:name: Formula model
      type: functional:Transform
      bpmn:documentation: |
        Model specification in the notation behavioural research already
        speaks: the formula *is* the model, so it belongs on the diagram, not
        in a script. `mixedlm(formula, data, groups)` builds the mixed model
        over the wired table; fit it with a "Fit estimator" step bound to
        `statsmodels.regression.mixed_linear_model.MixedLM.fit`. Repoint
        `implementation` at any formula interface (`lme4::lmer`, `bambi`)
        without changing the shape of the step.
      icon: iconify mdi--math-integral
      keywords:
        - formula
        - wilkinson
        - lmer
        - mixed
        - regression
        - statsmodels
      operationType: build
      implementation: python://statsmodels.formula.api.mixedlm
      arguments: "formula: rt ~ condition\ngroups: participant_id"

  - description: Score a model on held-out data - reduce predictions to a metrics report.
    object:
      bpmn:name: Evaluate
      type: functional:Reduce
      bpmn:documentation: |
        Reduce predictions to a metrics report -
        `classification_report(y_true, y_pred, output_dict=True)`, with the
        true and predicted labels arriving as wired data inputs. For a
        fairness audit, put a Group step (by site, by demographic) upstream
        and this same evaluation runs per subgroup.
      icon: iconify mdi--check-decagram-outline
      keywords:
        - evaluate
        - score
        - metrics
        - report
        - audit
      operationType: evaluate
      implementation: python://sklearn.metrics.classification_report
      arguments: "output_dict: true"

  - description: Cross-validate an estimator in one call (scikit-learn's cross_validate).
    object:
      bpmn:name: Cross-validate
      type: functional:Reduce
      bpmn:documentation: |
        The whole fit-and-score loop as one call -
        `cross_validate(estimator, X, y, cv, scoring)`. Build the estimator
        with "Build estimator", then wire it and the data in, naming the
        callable's parameters on the wires: `parameter: estimator`,
        `parameter: X`, `parameter: y`; the per-fold scores leave as the
        wired output.
        Folds are scikit-learn's business, not the workflow's: put
        preprocessing inside the estimator (`make_pipeline`) and every fold
        refits it without leakage.
      icon: iconify mdi--layers-triple-outline
      keywords:
        - crossvalidation
        - cv
        - kfold
        - sklearn
        - validate
      operationType: crossValidate
      implementation: python://sklearn.model_selection.cross_validate
      arguments: "cv: 5\nscoring: [accuracy, f1_macro]\nreturn_train_score: false"

  - description: Build a hyperparameter grid search (scikit-learn's GridSearchCV).
    object:
      bpmn:name: Grid search
      type: functional:Transform
      bpmn:documentation: |
        Hyperparameter search, scikit-learn style:
        `GridSearchCV(estimator, param_grid, cv, scoring)` wraps the wired
        base estimator in a search object - which is itself an estimator, so
        fit it with a "Fit estimator" step bound to
        `sklearn.model_selection.GridSearchCV.fit`. Fitting runs the sweep
        and keeps the winner (`best_estimator_`, `cv_results_`). The sweep is
        scikit-learn's business, not a workflow construct.
      icon: iconify mdi--tune-variant
      keywords:
        - gridsearch
        - sweep
        - hyperparameter
        - tuning
        - sklearn
      operationType: build
      implementation: python://sklearn.model_selection.GridSearchCV
      arguments: "param_grid:\n  C: [0.1, 1, 10]\n  kernel: [linear, rbf]\ncv: 5\nscoring: accuracy"

  - description: Persist a fitted model to disk.
    object:
      bpmn:name: Save model
      type: functional:Transform
      bpmn:documentation: |
        Lands the fitted model on disk (a file a notebook or a serving job
        can pick up): `joblib.dump(model, filename, compress=3)` - joblib is
        scikit-learn's own recommended persistence - with the wired model as
        the value and `filename` in `arguments`. Often no step is needed at all:
        set `uri` and `codec: joblib` on the model artifact itself and the
        engine persists it when the fitting step writes it.
      icon: iconify mdi--content-save-outline
      keywords:
        - save
        - store
        - persist
        - joblib
        - export
      operationType: save
      implementation: python://joblib.dump
      arguments: "filename: results/model.joblib\ncompress: 3"

  # ===========================================================================
  # Artifacts. Native data objects; `uri` (from the exec Artifact trait) says
  # where the engine loads/saves them.
  # ===========================================================================
  - description: A fitted model as an artifact - a data object the fitting step writes.
    object:
      bpmn:name: Model
      type: bpmn:DataObjectReference
      bpmn:documentation: |
        The artifact a fitting step produces, an evaluation scores, and a
        Writer saves. Set `uri` to keep it on disk - `codec: joblib` is
        scikit-learn's own persistence; the model card (intended use,
        training data, known limitations) goes here in `documentation`;
        hyperparameters live on the fitting step's `arguments`.
      icon: iconify mdi--cube-outline
      codec: joblib
      keywords:
        - model
        - artifact
        - estimator
        - checkpoint

  - description: A measured quantity - name it after the metric.
    object:
      bpmn:name: Metric
      type: bpmn:DataObjectReference
      bpmn:documentation: |
        A native data object whose `bpmn:name` is the metric (`accuracy`,
        `rmse`). The measuring step writes its value at run time; note the
        partition it was computed on (train / validation / test) here, so a
        test score is never read as a training score.
      icon: iconify mdi--gauge
      keywords:
        - metric
        - score
        - measure
        - auc
        - accuracy
