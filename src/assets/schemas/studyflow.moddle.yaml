# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Studyflow
prefix: studyflow
description: BPMN extension for modeling behavioral research processes, including experimental design, data collection, and analysis workflows.
uri: http://behaverse.org/schemas/studyflow
icon: https://raw.githubusercontent.com/behaverse/schemas/main/assets/img/schema_S.png
xml:
  tagAlias: lowerCase
associations: []
enumerations:
  - name: DatasetFormatEnum
    isAbstract: true
    description: Format of the dataset (BDM, BIDS, Psych-DS, etc).
    literalValues:
      - name: BDM (Behaverse Data Model)
        value: bdm
      - name: BIDS (Brain Imaging Data Structure)
        value: bids
        icon: bids-dataset-icon
      - name: Psych-DS
        value: psych-ds
        icon: iconify uil--flask
      - name: Kedro
        value: kedro
      - name: Undefined
        value: undefined
  - name: BDMDataLevelEnum
    isAbstract: true
    description: BDM level of the data (events, trials, models).
    literalValues:
      - name: Events
        value: events
      - name: Trials
        value: trials
      - name: Models
        value: models
  - name: BIDSDataTypeEnum
    isAbstract: true
    description: BIDS data type (e.g., anat, func, etc).
    literalValues:
      - name: anat (anatomical MRI)
        value: anat
      - name: beh (behavioral)
        value: beh
      - name: dwi (diffusion MRI)
        value: dwi
      - name: eeg (electroencephalography)
        value: eeg
      - name: func (functional MRI)
        value: func
      - name: ieeg (intracranial EEG)
        value: ieeg
      - name: meg (magnetoencephalography)
        value: meg
      - name: micr (microscopy)
        value: micr
      - name: motion (motion capture)
        value: motion
      - name: mrs (magnetic resonance spectroscopy)
        value: mrs
      - name: nirs (near-infrared spectroscopy)
        value: nirs
      - name: perf (arterial spin labeling)
        value: perf
      - name: pet (positron emission tomography)
        value: pet
  - name: AssignmentAlgorithmEnum
    isAbstract: true
    description: The scheduling algorithm used for the assignment.
    literalValues:
      - name: Probabilistic
        value: probabilistic
      - name: Round Robin
        value: round-robin
  - name: ProbabilityDistributionEnum
    isAbstract: true
    description: The random statistical distribution used for the assignment.
    literalValues:
      - name: Uniform
        value: uniform
      - name: Normal
        value: normal
      - name: Exponential
        value: exponential
      - name: Poisson
        value: poisson
      - name: Undefined
        value: undefined
  - name: DataOperationTypeEnum
    description: |
      Studyflow data operator marker for tasks. Operators describe how data is manipulated
      as it flows through the process (pure transformations).
    literalValues:
      - name: Transform
        value: transform
      - name: Map
        value: map
      - name: Filter
        value: filter
      - name: Reduce
        value: reduce
      - name: Group
        value: group
      - name: Compose
        value: compose
      - name: FlatMap
        value: flatMap
  - name: CompletionCodeTypeEnum
    isAbstract: true
    description: How the completion code is generated when the study ends.
    literalValues:
      - name: None
        value: none
        description: No completion code is issued.
      - name: Static
        value: static
        description: A fixed code configured by the researcher.
      - name: Dynamic
        value: dynamic
        description: A code extracted from a URL pattern at runtime (e.g. Prolific).
  - name: InstrumentEnum
    description: |
      Software that delivers a cognitive task. Determines how the
      task's `configurations` YAML is interpreted. Pick `other` to use a custom
      identifier set in `customInstrument`.
    literalValues:
      - name: PsychoPy
        value: psychopy
      - name: jsPsych
        value: jspsych
      - name: lab.js
        value: labjs
      - name: OpenSesame
        value: opensesame
      - name: Other
        value: other
types:
  - name: MarkdownString
    description: A string that contains markdown formatting
    superClass:
      - String
  - name: YAMLString
    description: A string that contains YAML-formatted content
    superClass:
      - String
  - name: BaseElement
    description: Extends BPMN's BaseElement to include common properties of the Studyflow.
    extends:
      - bpmn:BaseElement
    isAbstract: true
    properties:
      - name: documentation
        description: Human-readable description for the element (or link to a detailed description).
        redefines: bpmn:BaseElement#documentation
        isAttr: true
        type: MarkdownString
        meta:
          categories:
            - Documentation
      - name: checklist
        description: List of items to be checked off when completing the element, formatted in markdown.
        isAttr: true
        type: MarkdownString
        meta:
          categories:
            - Documentation
  - name: Checklist
    description: A checklist for the element.
    superClass:
      - bpmn:BaseElement
    isAbstract: true
    properties:
      - name: items
        description: Checklist items.
        isAttr: true
        type: MarkdownString
        meta:
          order: 1
        isMany: true
        categories:
          - Documentation
        pinned: false
  - name: Study
    description: Process definition for a Studyflow study.
    superClass:
      - bpmn:Process
    properties:
      - name: authors
        description: Authors of the study.
        isAttr: true
        isMany: true
        type: String
        meta:
      - name: isExecutable
        redefines: bpmn:Process#isExecutable
        isAttr: true
        type: Boolean
        default: true
        meta:
          pinned: true
  - name: DataOperationActivity
    description: |
      Augments any BPMN Activity with the data-operation flag and
      input/output variable lists. Subtypes redefine `isDataOperation`
      to pin it (e.g. CognitiveTask fixes it to false,
      omniprocess:Transform fixes it to true).
    extends:
      - bpmn:Activity
    isAbstract: true
    properties:
      - name: isDataOperation
        description: Marks the activity as a data operation (e.g. transform, filter, reduce).
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - Data
      - name: inputs
        description: Names of variables consumed by this activity.
        isAttr: true
        isMany: true
        type: String
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              isDataOperation: true
      - name: outputs
        description: Names of variables produced by this activity.
        isAttr: true
        isMany: true
        type: String
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              isDataOperation: true
  - name: StartEvent
    extends:
      - bpmn:StartEvent
    meta:
      icon: iconify bpmn--start-event
    properties:
      - name: requiresConsent
        description: User requires to give consent before participating.
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - Privacy
          pinned: false
      - name: consentFormUri
        description: Link to the consent form. Leave empty if you want to use the default consent form.
        isAttr: true
        type: String
        meta:
          pinned: false
          categories:
            - Privacy
          condition:
            language: json
            body:
              requiresConsent: true
  - name: SequenceFlow
    extends:
      - bpmn:SequenceFlow
    properties:
      - name: conditionExpression
        description: |
          Condition for sequence flows (e.g., in gateways). See `bpmn:conditionExpression` for BPMN's built-in expression type.
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:SequenceFlow#conditionExpression
        meta:
          categories:
            - Control
          pinned: false
  - name: EndEvent
    extends:
      - bpmn:EndEvent
    meta:
      icon: iconify bpmn--end-event
    properties:
      - name: hasRedirectUrl
        description: Redirect the user to the given URL after completion.
        isAttr: true
        type: Boolean
        meta:
          categories:
            - Completion
      - name: redirectTo
        description: |
          URL to redirect the user upon completion. Use `{COMPLETION_CODE}` as a
          placeholder that will be replaced with the actual code at runtime
          (e.g. `https://app.prolific.com/submissions/complete?cc={COMPLETION_CODE}`).
        isAttr: true
        type: String
        meta:
          categories:
            - Completion
          condition:
            language: json
            body:
              hasRedirectUrl: true
      - name: completionCodeType
        description: How the completion code is issued when the study ends.
        isAttr: true
        type: CompletionCodeTypeEnum
        default: none
        meta:
          categories:
            - Completion
          condition:
            language: json
            body:
              hasRedirectUrl: true
      - name: completionCode
        description: Fixed completion code to embed in the redirect URL.
        isAttr: true
        type: String
        meta:
          categories:
            - Completion
          condition:
            language: json
            body:
              hasRedirectUrl: true
              completionCodeType: static
  - name: Activity
    description: Base class for all the activities in the Studyflow.
    extends:
      - bpmn:Activity
    isAbstract: true
    meta:
      icon: iconify bpmn--task-none
    properties:
      - name: uri
        description: Link to the activity.
        isAttr: true
        type: String
        meta:
          categories:
            - General
  - name: CognitiveTask
    description: |
      A cognitive test administered to a participant (e.g., a working-memory or
      attention task). Concrete tasks are defined by the  `instrument` (the software used to deliver them) and configured via a YAML `configurations` block whose format depends on that instrument.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify bi--puzzle
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Software used to deliver the task. Determines how `configurations` are interpreted. Pick `other` to specify a custom one.
        isAttr: true
        type: InstrumentEnum
        meta:
          categories:
            - Instrument
      - name: customInstrument
        description: |
          Custom instrument when none of the listed options apply (e.g., an internal framework).
        isAttr: true
        type: String
        meta:
          categories:
            - Instrument
          condition:
            language: json
            body:
              instrument: other
      - name: configurations
        description: |
          Instrument-specific configuration in YAML format (e.g., number of
          trials, stimulus duration, block structure). The shape of the YAML
          depends on the chosen `instrument`.
        isBody: true
        type: YAMLString
        meta:
          categories:
            - Instrument
      - name: isDataOperation
        description: CognitiveTask is not a data operation; this pinned property fixes the value so the data-operation marker is never rendered.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: VideoGame
    description: |
      An interactive video game used as an experimental paradigm or measurement
      instrument. Configuration is provided as a YAML `configurations` block whose
      shape depends on the game engine.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify bi--controller
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Identifier of the engine or library running the game (e.g., `unity`,
          `godot`, `web`, or a custom identifier).
        isAttr: true
        type: String
        meta:
          categories:
            - Instrument
      - name: configurations
        description: Game configuration in YAML format (level set, difficulty, scoring, etc.).
        isBody: true
        type: YAMLString
        meta:
          categories:
            - Instrument
      - name: isDataOperation
        description: VideoGame is not a data operation; this pinned property fixes the value so the data-operation marker is never rendered.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: Rest
    description: |
      A rest period of inactivity or minimal activity. Often used for baseline
      measurements or breaks between activities. Can also represent
      resting-state recordings (e.g., resting EEG/fMRI).
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify solar--armchair-2-linear
      bpmnType: bpmn:Task
    properties:
      - name: configurations
        description: Rest configuration in YAML format (e.g., duration, eyes-open/closed).
        isBody: true
        type: YAMLString
        meta:
          categories:
            - Instrument
      - name: isDataOperation
        description: Rest is not a data operation; this pinned property fixes the value so the data-operation marker is never rendered.
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true
  - name: Questionnaire
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify fluent--clipboard-text-edit-32-regular
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        description: |
          Instrument name used for the questionnaire. This can be an identifier for standardized questionnaires (e.g., PHQ-9, BDI-II, GAD-7) or a custom name for non-standardized questionnaires.
        isAttr: true
        type: String
        meta:
          categories:
            - Instrument
  - name: Instruction
    description: A passive information display.
    superClass:
      - studyflow:Questionnaire
    meta:
      icon: iconify material-symbols--info-outline-rounded
      categories:
        - Activities
    properties:
      - name: instrument
        redefines: studyflow:Questionnaire#instrument
        isAttr: true
        type: String
        default: instruction
      - name: content
        description: Instruction content in markdown format.
        isAttr: true
        type: MarkdownString
        meta:
          categories:
            - Content
  - name: RandomGateway
    description: |
      Randomly assigns participants to one of the outgoing branches according
      to a probability distribution.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify streamline-flex--dice-5
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: algorithm
        description: Algorithm used for the assignment.
        isAttr: true
        type: AssignmentAlgorithmEnum
        default: probabilistic
        meta:
          categories:
            - Assignment
      - name: probabilityFunction
        description: |
          Probability mass function that defines the discrete distribution of the random assignment. Defaults to `uniform`.
        isAttr: true
        type: String
        default: uniform
        meta:
          categories:
            - Assignment
          condition:
            language: json
            body:
              algorithm: probabilistic
  - name: StratifiedAllocationGateway
    description: |
      Stratified random assignment of participants. The cohort is partitioned
      into strata based on a stratification variable (e.g., age band, sex,
      baseline score), and assignment is performed independently within each
      stratum to balance allocation across branches.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--layers-outline
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: stratificationVariable
        description: |
          Name of the variable used to partition participants into strata
          (e.g., `age_band`, `sex`, `baseline_score`).
        isAttr: true
        type: String
        meta:
          categories:
            - Assignment
      - name: strata
        description: |
          Definition of the strata used for allocation (one entry per stratum),
          formatted in markdown. For example: `age_band: 18-29`.
        isAttr: true
        type: MarkdownString
        isMany: true
        meta:
          categories:
            - Assignment
      - name: algorithm
        description: Algorithm used for the assignment within each stratum.
        isAttr: true
        type: AssignmentAlgorithmEnum
        default: probabilistic
        meta:
          categories:
            - Assignment
      - name: probabilityFunction
        description: |
          Probability mass function that defines the per-stratum discrete
          distribution. Defaults to `uniform`.
        isAttr: true
        type: String
        default: uniform
        meta:
          categories:
            - Assignment
          condition:
            language: json
            body:
              algorithm: probabilistic
  - name: EligibilityGateway
    description: |
      Decision gateway encoding inclusion and/or exclusion criteria for
      participant eligibility. Participants meeting the inclusion criteria (and
      none of the exclusion criteria) proceed; others are routed to a
      screen-out branch.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--filter-check-outline
      bpmnType: bpmn:ExclusiveGateway
    properties:
      - name: inclusionCriteria
        description: |
          List of inclusion criteria (one entry per criterion), formatted in
          markdown. Example: `Age between 18 and 65`.
        isAttr: true
        type: MarkdownString
        isMany: true
        meta:
          categories:
            - Eligibility
      - name: exclusionCriteria
        description: |
          List of exclusion criteria (one entry per criterion), formatted in
          markdown. Example: `History of neurological disorder`.
        isAttr: true
        type: MarkdownString
        isMany: true
        meta:
          categories:
            - Eligibility
  - name: Schema
    description: |
      A formal description of the structure of a named collection of types.
      Typically used as column definitions for tables (CSVW), or dimensions/types for arrays.
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: format
        description: Schema format identifier (e.g., csvw, linkml, jsonschema).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
      - name: body
        description: Schema content as a string (e.g., JSON, YAML). This can also be a URL/path to the schema definition.
        isAttr: true
        type: YAMLString
        meta:
          categories:
            - Data
  - name: Dataset
    description: Collection of data registered in a `DataCatalog` and stored in a `DataStore`. This can represent a table, array, or any structured dataset. The structure can be defined using an optional `Schema`.
    superClass:
      - bpmn:DataStoreReference
      - bpmn:BaseElement
    isAbstract: false
    meta:
      icon: iconify bi--database
      bpmnType: bpmn:DataStoreReference
    properties:
      - name: catalog
        description: Identifier of the `DataCatalog` that registers this dataset.
        isAttr: true
        type: DataCatalog
        meta:
          categories:
            - Data
      - name: storage
        description: Identifier of the `DataStorage` where this dataset is physically stored.
        isAttr: true
        type: DataStorage
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              format: bdm
      - name: schema
        description: |
          Path to the schema describing the dataset structure (e.g., CSVW).
          This can also refer to an optional ontology/vocabulary reference (URL/CURIE) for semantic alignment.
        isAttr: true
        type: Schema
        meta:
          categories:
            - Data
      - name: format
        description: Format of the dataset (BDM, BIDS, Psych-DS, etc).
        isAttr: true
        type: DatasetFormatEnum
        default: undefined
        meta:
          categories:
            - Data
      - name: bdmDataLevel
        description: Level of the data (events, trials, summary, models).
        isAttr: true
        type: BDMDataLevelEnum
        default: events
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              format: bdm
      - name: bidsDataType
        description: BIDS data type (e.g., anat, func, eeg, beh).
        isAttr: true
        type: BIDSDataTypeEnum
        default: beh
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              format: bids
  - name: DataStorage
    description: |
      Persistent physical storage of data (database, filesystem, object store, etc.).
      `DataStore` can be referenced using `DataStoreReference`.
    superClass:
      - bpmn:DataStoreReference
      - bpmn:BaseElement
    meta:
      bpmnType: bpmn:DataStoreReference
  - name: DataObjectReference
    description: |
      Represents data produced/consumed within a process instance. Can be used to model
      internal data nodes in sub-processes and annotate state (e.g., raw/processed).
    extends:
      - bpmn:DataObjectReference
    isAbstract: true
    properties:
      - name: state
        description: Optional state annotation (e.g., raw, processed, validated).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
  - name: DataCatalog
    description: A persistent repository/registry of datasets (e.g., openneuro, behaverse).
    superClass:
      - bpmn:BaseElement
    isAbstract: false
    properties:
      - name: url
        description: Base URL of the catalog.
        isAttr: true
        type: String
        meta:
          categories:
            - Data
  - name: Array
    description: |
      Multi-dimensional array/tensor structure (e.g., images, videos, fMRI). Expects a schema.
    superClass:
      - bpmn:BaseElement
    isAbstract: false
    properties:
      - name: dataset
        description: Identifier of the parent `Dataset`.
        isAttr: true
        type: String
        meta:
          categories:
            - Data
      - name: schema
        description: URL/path/identifier of the array schema (dimensions/types/units).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
  - name: Snapshot
    description: |
      Immutable version of a dataset/table/array associated with a point in the workflow
      or a version control commit.
    superClass:
      - bpmn:BaseElement
    isAbstract: false
    properties:
      - name: source
        description: Identifier of the dataset/table/array being snapshotted.
        isAttr: true
        type: String
        meta:
          categories:
            - Data
      - name: version
        description: Version identifier (e.g., tag, checksum, commit hash).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
