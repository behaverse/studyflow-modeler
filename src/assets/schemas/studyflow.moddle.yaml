# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Studyflow
prefix: studyflow
description: Core BPMN extension for modeling research processes - the study container, events, flows, generic activities, and the data-infrastructure types shared by every use case.
uri: http://behaverse.org/schemas/studyflow
icon: https://raw.githubusercontent.com/behaverse/schemas/main/assets/img/schema_S.png
xml:
  tagAlias: lowerCase
associations: []
enumerations:
  - name: DatasetFormatEnum
    isAbstract: true
    description: Format of the dataset (BDM, BIDS, Psych-DS, etc).
    literalValues:
      - name: BDM (Behaverse Data Model)
        value: bdm
      - name: BIDS (Brain Imaging Data Structure)
        value: bids
        icon: bids-dataset-icon
      - name: Psych-DS
        value: psych-ds
        icon: iconify uil--flask
      - name: Kedro
        value: kedro
      - name: Undefined
        value: undefined
  - name: BDMDataLevelEnum
    isAbstract: true
    description: BDM level of the data (events, trials, models).
    literalValues:
      - name: Events
        value: events
      - name: Trials
        value: trials
      - name: Models
        value: models
  - name: BIDSDataTypeEnum
    isAbstract: true
    description: BIDS data type (e.g., anat, func, etc).
    literalValues:
      - name: anat (anatomical MRI)
        value: anat
      - name: beh (behavioral)
        value: beh
      - name: dwi (diffusion MRI)
        value: dwi
      - name: eeg (electroencephalography)
        value: eeg
      - name: func (functional MRI)
        value: func
      - name: ieeg (intracranial EEG)
        value: ieeg
      - name: meg (magnetoencephalography)
        value: meg
      - name: micr (microscopy)
        value: micr
      - name: motion (motion capture)
        value: motion
      - name: mrs (magnetic resonance spectroscopy)
        value: mrs
      - name: nirs (near-infrared spectroscopy)
        value: nirs
      - name: perf (arterial spin labeling)
        value: perf
      - name: pet (positron emission tomography)
        value: pet
  - name: DataOperationTypeEnum
    description: |
      Studyflow data operator marker for tasks. Operators describe how data is manipulated
      as it flows through the process (pure transformations).
    literalValues:
      - name: Transform
        value: transform
      - name: Map
        value: map
      - name: Filter
        value: filter
      - name: Reduce
        value: reduce
      - name: Group
        value: group
      - name: Compose
        value: compose
      - name: FlatMap
        value: flatMap
  - name: CompletionCodeTypeEnum
    isAbstract: true
    description: How the completion code is generated when the study ends.
    literalValues:
      - name: None
        value: none
        description: No completion code is issued.
      - name: Static
        value: static
        description: A fixed code configured by the researcher.
      - name: Dynamic
        value: dynamic
        description: A code extracted from a URL pattern at runtime (e.g. Prolific).
  - name: RuntimeEnum
    isAbstract: true
    description: Execution environment in which the study runs.
    literalValues:
      - name: Cloud
        value: cloud
      - name: Local
        value: local
      - name: HPC
        value: hpc
  - name: AssignmentAlgorithmEnum
    isAbstract: true
    description: The scheduling algorithm used for the assignment.
    literalValues:
      - name: Probabilistic
        value: probabilistic
      - name: Round Robin
        value: round-robin
  - name: ProbabilityDistributionEnum
    isAbstract: true
    description: The random statistical distribution used for the assignment.
    literalValues:
      - name: Uniform
        value: uniform
      - name: Normal
        value: normal
      - name: Exponential
        value: exponential
      - name: Poisson
        value: poisson
      - name: Undefined
        value: undefined
types:
  - name: MarkdownString
    description: A string that contains markdown formatting
    superClass:
      - String
  - name: YAMLString
    description: A string that contains YAML-formatted content
    superClass:
      - String
  - name: BaseElement
    description: Extends BPMN's BaseElement to include common properties of the Studyflow.
    extends:
      - bpmn:BaseElement
    isAbstract: true
    properties:
      - name: documentation
        description: Human-readable description for the element (or link to a detailed description).
        redefines: bpmn:BaseElement#documentation
        isAttr: true
        type: MarkdownString
        meta:
          categories:
            - Documentation
      - name: checklist
        description: List of items to be checked off when completing the element, formatted in markdown.
        isAttr: true
        type: MarkdownString
        meta:
          categories:
            - Documentation
  - name: Checklist
    description: A checklist for the element.
    superClass:
      - bpmn:BaseElement
    isAbstract: true
    properties:
      - name: items
        description: Checklist items.
        isAttr: false
        type: MarkdownString
        meta:
          order: 1
        isMany: true
        categories:
          - Documentation
        pinned: false
  - name: Study
    description: Process definition for a Studyflow study.
    superClass:
      - bpmn:Process
    meta:
      bpmnType: bpmn:Process
    properties:
      - name: runtime
        description: Execution runtime in which the study runs (e.g., cloud, local, HPC).
        isAttr: true
        type: RuntimeEnum
        default: cloud
        meta:
          categories:
            - Environment
      - name: authors
        description: Authors of the study.
        isAttr: false
        isMany: true
        type: String
        meta:
      - name: isExecutable
        redefines: bpmn:Process#isExecutable
        isAttr: true
        type: Boolean
        default: true
        meta:
          pinned: true
  - name: DataOperationActivity
    description: |
      Augments any BPMN Activity with the data-operation flag and
      input/output variable lists. Subtypes redefine `isDataOperation`
      to pin it (e.g. CognitiveTask fixes it to false,
      omniprocess:Transform fixes it to true).
    extends:
      - bpmn:Activity
    isAbstract: true
    properties:
      - name: isDataOperation
        description: Marks the activity as a data operation (e.g. transform, filter, reduce).
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - Data
      - name: inputs
        description: Names of variables consumed by this activity.
        isAttr: false
        isMany: true
        type: String
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              isDataOperation: true
      - name: outputs
        description: Names of variables produced by this activity.
        isAttr: false
        isMany: true
        type: String
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              isDataOperation: true
  - name: StartEvent
    extends:
      - bpmn:StartEvent
    meta:
      icon: iconify bpmn--start-event
    properties:
      - name: consentFormUri
        description: Link to the consent form. Untick to skip the consent step entirely.
        isAttr: true
        type: String
        meta:
          pinned: false
          optional: true
          categories:
            - Privacy
  - name: SequenceFlow
    extends:
      - bpmn:SequenceFlow
    properties:
      - name: conditionExpression
        description: |
          Condition for sequence flows (e.g., in gateways). See `bpmn:conditionExpression` for BPMN's built-in expression type.
        isAttr: true
        type: bpmn:Expression
        redefines: bpmn:SequenceFlow#conditionExpression
        meta:
          categories:
            - Control
          pinned: false
  - name: EndEvent
    extends:
      - bpmn:EndEvent
    meta:
      icon: iconify bpmn--end-event
    properties:
      - name: redirectTo
        description: |
          URL to redirect the user upon completion. Untick to skip the redirect.
          Use `{COMPLETION_CODE}` as a placeholder that will be replaced with
          the actual code at runtime
          (e.g. `https://app.prolific.com/submissions/complete?cc={COMPLETION_CODE}`).
        isAttr: true
        type: String
        meta:
          optional: true
          categories:
            - Completion
      - name: completionCodeType
        description: How the completion code is issued when the study ends.
        isAttr: true
        type: CompletionCodeTypeEnum
        default: none
        meta:
          categories:
            - Completion
          condition:
            language: json
            body:
              redirectTo: $set
      - name: completionCode
        description: Fixed completion code to embed in the redirect URL.
        isAttr: true
        type: String
        meta:
          categories:
            - Completion
          condition:
            language: json
            body:
              redirectTo: $set
              completionCodeType: static
  - name: Activity
    description: Base class for all the activities in the Studyflow.
    extends:
      - bpmn:Activity
    isAbstract: true
    meta:
      icon: iconify bpmn--task-none
    properties:
      - name: uri
        description: Link to the activity.
        isAttr: true
        type: String
        meta:
          categories:
            - General
  - name: Schema
    description: |
      A formal description of the structure of a named collection of types.
      Typically used as column definitions for tables (CSVW), or dimensions/types for arrays.
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: format
        description: Schema format identifier (e.g., csvw, linkml, jsonschema).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
      - name: body
        description: Schema content as a string (e.g., JSON, YAML). This can also be a URL/path to the schema definition.
        isAttr: true
        type: YAMLString
        meta:
          categories:
            - Data
  - name: Dataset
    description: Collection of data registered in a `DataCatalog` and stored in a `DataStore`. This can represent a table, array, or any structured dataset. The structure can be defined using an optional `Schema`.
    superClass:
      - bpmn:DataStoreReference
      - bpmn:BaseElement
    isAbstract: false
    meta:
      icon: iconify bi--database
      bpmnType: bpmn:DataStoreReference
    properties:
      - name: catalog
        description: Identifier of the `DataCatalog` that registers this dataset.
        isAttr: true
        type: DataCatalog
        meta:
          categories:
            - Data
      - name: storage
        description: Identifier of the `DataStorage` where this dataset is physically stored.
        isAttr: true
        type: DataStorage
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              format: bdm
      - name: schema
        description: |
          Path to the schema describing the dataset structure (e.g., CSVW).
          This can also refer to an optional ontology/vocabulary reference (URL/CURIE) for semantic alignment.
        isAttr: true
        type: Schema
        meta:
          categories:
            - Data
      - name: format
        description: Format of the dataset (BDM, BIDS, Psych-DS, etc).
        isAttr: true
        type: DatasetFormatEnum
        default: undefined
        meta:
          categories:
            - Data
      - name: bdmDataLevel
        description: Level of the data (events, trials, summary, models).
        isAttr: true
        type: BDMDataLevelEnum
        default: events
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              format: bdm
      - name: bidsDataType
        description: BIDS data type (e.g., anat, func, eeg, beh).
        isAttr: true
        type: BIDSDataTypeEnum
        default: beh
        meta:
          categories:
            - Data
          condition:
            language: json
            body:
              format: bids
  - name: DataStorage
    description: |
      Persistent physical storage of data (database, filesystem, object store, etc.).
      `DataStore` can be referenced using `DataStoreReference`.
    superClass:
      - bpmn:DataStoreReference
      - bpmn:BaseElement
    meta:
      bpmnType: bpmn:DataStoreReference
  - name: DataObjectReference
    description: |
      Represents data produced/consumed within a process instance. Can be used to model
      internal data nodes in sub-processes and annotate state (e.g., raw/processed).
    extends:
      - bpmn:DataObjectReference
    isAbstract: true
    properties:
      - name: state
        description: Optional state annotation (e.g., raw, processed, validated).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
  - name: DataCatalog
    description: A persistent repository/registry of datasets (e.g., openneuro, behaverse).
    superClass:
      - bpmn:BaseElement
    isAbstract: false
    properties:
      - name: url
        description: Base URL of the catalog.
        isAttr: true
        type: String
        meta:
          categories:
            - Data
  - name: Array
    description: |
      Multi-dimensional array/tensor structure (e.g., images, videos, fMRI). Expects a schema.
    superClass:
      - bpmn:BaseElement
    isAbstract: false
    properties:
      - name: dataset
        description: Identifier of the parent `Dataset`.
        isAttr: true
        type: String
        meta:
          categories:
            - Data
      - name: schema
        description: URL/path/identifier of the array schema (dimensions/types/units).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
  - name: Snapshot
    description: |
      Immutable version of a dataset/table/array associated with a point in the workflow
      or a version control commit.
    superClass:
      - bpmn:BaseElement
    isAbstract: false
    properties:
      - name: source
        description: Identifier of the dataset/table/array being snapshotted.
        isAttr: true
        type: String
        meta:
          categories:
            - Data
      - name: version
        description: Version identifier (e.g., tag, checksum, commit hash).
        isAttr: true
        type: String
        meta:
          categories:
            - Data
