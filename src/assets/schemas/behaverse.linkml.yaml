# yaml-language-server: $schema=https://linkml.io/linkml-model/linkml_model/jsonschema/meta.schema.json

id: http://behaverse.org/schemas/studyflow/behaverse
name: behaverse
title: Behaverse Schema
description: LinkML schema for Behaverse Studyflow
version: 25.1217.dev2
license: MIT


prefixes:
  studyflow: http://w3id.org/studyflow/
  linkml: https://w3id.org/linkml/
  bpmn: http://www.omg.org/spec/BPMN/20100524/MODEL# 
imports:
  - linkml:types
  - bpmn.linkml
  - studyflow.linkml
default_prefix: behaverse
default_range: string

enums:
  InstrumentEnum:
    description: The type of instrument used to measure cognitive performance.
    permissible_values:
      behaverse:
        title: Behaverse
        description: Behaverse
        annotations:
          icon: iconify bi--hexagon

  BehaverseSceneEnum:
    permissible_values:
      BCS:
        title: Belval Card Sorting (BCS)
        description: Belval Card Sorting (BCS)
      BM:
        title: Belval Matrices (BM)
        description: Belval Matrices (BM)
      BSAC:
        title: Button Spatial Attention Cueing (BSAC)
        description: Button Spatial Attention Cueing (BSAC)
      DS:
        title: Digit Span (DS)
        description: Digit Span (DS)
      ML:
        title: Monkey Ladder (ML)
        description: Monkey Ladder (ML)
      MOT:
        title: Multiple Object Tracking (MOT)
        description: Multiple Object Tracking (MOT)
      NB:
        title: N-Back (NB)
        description: N-Back (NB)
      OC:
        title: Ordered Click (OC)
        description: Ordered Click (OC)
      OOO:
        title: Odd One Out (OOO)
        description: Odd One Out (OOO)
      PC:
        title: Polygon Comparison (PC)
        description: Polygon Comparison (PC)
      RE:
        title: Regular Expression (RE)
        description: Regular Expression (RE)
      SART:
        title: Sustained Attention to Response Task (SART)
        description: Sustained Attention to Response Task (SART)
      SMC:
        title: Symbolic Matrix Comparison (SMC)
        description: Symbolic Matrix Comparison (SMC)
      SOS:
        title: Self-Ordered Search (SOS)
        description: Self-Ordered Search (SOS)
      SRM:
        title: Stimulus-Response Mapping (SRM)
        description: Stimulus-Response Mapping (SRM)
      SRT:
        title: Serial Reaction Time (SRT)
        description: Serial Reaction Time (SRT)
      SS:
        title: Spatial Span (SS)
        description: Spatial Span (SS)
      TH:
        title: Target Hit (TH)
        description: Target Hit (TH)
      TOVA:
        title: Test of Variable Attention (TOVA)
        description: Test of Variable Attention (TOVA)
      UFOV:
        title: Useful Field of View (UFOV)
        description: Useful Field of View (UFOV)
      WO:
        title: Which One (WO)
        description: Which One (WO)
      undefined:
        title: Undefined
        description: Undefined

classes:

  BehaverseTask:
    is_a: CognitiveTask
    description: A cognitive task from the Behaverse battery.
    annotations:
      icon: iconify bi--hexagon
    attributes:
      instrument:
        annotations:
          moddle.default: behaverse
          # moddle.redefines: studyflow:CognitiveTask#instrument
          studyflow.hidden: true
      scene:
        range: BehaverseSceneEnum
        ifabsent: string(undefined)
        description: Behaverse instrument used for the test.
        categories:
          - Behaverse
        annotations:
          studyflow.condition.language: json
          studyflow.condition.body: '{"instrument": "behaverse"}'
        comments:
          - Conditional on instrument being "behaverse"
      parameters:
        range: studyflow:YAMLString
        description: Optional parameters for the task (e.g., number of trials, stimulus duration) in YAML format.
        categories:
          - Behaverse
        annotations:
          moddle.redefines: studyflow:CognitiveTask#parameters
          studyflow.condition.language: json
          studyflow.condition.body: '{"instrument": "behaverse"}'
        comments:
          - Conditional on instrument being "behaverse"

examples:
  - description: N-Back task with tutorial
    object:
      type: BehaverseTask
      bpmn:name: N-Back Task
      instrument: behaverse
      scene: NB
      parameters: |
        NValue: 1
        Streams:
          - Feature: Digits
            StimulusValue:
              Generate: OncePerBlock
              Sequence:
                Type: NBack
                Values: [3, 1, 2, 1, 3, 2, 3, 2, 1]
                NValue:
                  Reference: NValue
                StreamSize:
                  Reference: StreamSize
                MatchCount: 10
                PostLureCount: 10
                PreLureCount: 10
                FeatureValuesCount:
                  Reference: FeatureValuesCount
        StreamSize: 30
        FeatureValuesCount: 9
        UseNonMatchButton: true
        PlayerPaced: false
        MaxResponseTime: 3
        ShowAccuracyOnButtonFeedback: false
        ShowMissedTrialFeedback: false
        ErrorTimeOutDuration: 0
        ShowSequenceComparison: false
        StimulusDisplayDuration: 0.5
        InterStimulusInterval: 2.2
        TrialForeperiod: 0
        StimulusMovingAnimationDuration: 0.3
        RevealBoxContent: StimulusOnly
        RevealNBackBoxContentFeedback: Never
        ShowAccuracyCheckFeedback: Never
        ShowCorrectTrialResponseFeedback: Never
        ScoreLabel_Position: Hidden
        TrialResults_Position: InformationPanel
        TrialResults_Style: ColoredDiscrete
        UserInputTimer_Position: Hidden
        UserInputTimer_Style: Circular
        UserInputTimer_CountUp: true
        UserInputTimer_DisplayTime: false
        BlockCounter_Position: StatusBarLeft
        BlockCounter_Style: Counter
        LevelLabel_Position: Hidden
        TaskName_Position: StatusBarLeft
        TrialCounter_Position: Hidden
        TrialCounter_Style: Counter
        Feature: Digits

        timeline:
          name: ScienceFestival2019
          description: N-back demo timeline with tutorial and progressive feature count.
          exitRules:
            - action: EndTimeline
              type: Failures
              blocks: 3
              successAccuracy: 0.1
          sequence:
            - instructions:
                - content:
                    - text: Tasks.NBack.Instructions.Job
                - content:
                    - text: Tasks.Common.Instructions.TutorialIntro
                  ok: Common.IAmReady
            - block: Tutorial_2Back
            - instructions:
                - content:
                    - text: Tasks.Common.Instructions.TutorialOuttro
                - content:
                    - text: Tasks.Common.Instructions.Ready
                  ok: Common.IAmReady
            - block: ScienceFestival2019
              params:
                FeatureValuesCount: 4
            - block: ScienceFestival2019
              params:
                FeatureValuesCount: 6
            - block: ScienceFestival2019
              params:
                FeatureValuesCount: 8
            - instructions:
                - content:
                    - text: Common.ThankYou
                    - text: Instructions.YourScore
                    - text: Common.Bye
                  ok: Common.Bye

        blocks:
          Tutorial_2Back:
            minAccuracyRequired: 1
            exitRules:
              - action: FailBlock
                type: Failures
                trials: 1
          ScienceFestival2019:
            params:
              FeatureValuesCount: 4
          XCIT_NB_01_Tutorial_A_Intro:
            instructions:
              - content:
                  - text: XCIT_NB_01_Tutorial_A.Job
                    heading: 2
          XCIT_NB_01_Tutorial_A:
            rules:
              - text: XCIT_NB_01_Tutorial_A.RulesTitle
                heading: 2
              - text: XCIT_NB_01_Tutorial_A.GameRules
