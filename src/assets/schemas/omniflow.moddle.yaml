name: omniflow
uri: https://w3id.org/omniflow
prefix: omniflow
icon: iconify tabler--hexagon-letter-o
xml:
  tagAlias: lowerCase
associations: []
enumerations: []
types:
  - name: TransformData
    description: Apply a function to each element in a data stream.
    superClass:
      - bpmn:Task
    properties:
      - name: isDataOperation
        isAttr: true
        type: String
        meta:
          order: 1
          hidden: true
        default: true
      - name: operationType
        isAttr: true
        type: String
        meta:
          order: 2
          hidden: true
        default: transform
  - name: MapData
    description: Map a function over a data stream, producing a new data stream.
    superClass:
      - TransformData
    properties:
      - name: isDataOperation
        isAttr: true
        type: String
        meta:
          order: 1
          hidden: true
        default: true
        redefines: omniflow:TransformData#isDataOperation
      - name: operationType
        isAttr: true
        type: String
        meta:
          order: 2
          hidden: true
        default: map
        redefines: omniflow:TransformData#operationType
  - name: ReduceData
    description: Reduce a data stream to a single value.
    superClass:
      - TransformData
    properties:
      - name: isDataOperation
        isAttr: true
        type: String
        meta:
          order: 1
          hidden: true
        default: true
        redefines: omniflow:TransformData#isDataOperation
      - name: operationType
        isAttr: true
        type: String
        meta:
          order: 2
          hidden: true
        default: map
        redefines: omniflow:TransformData#operationType
  - name: FilterData
    description: >-
      Filter a data stream based on a condition. Elements that satisfy the predicate are kept; those that don't are
      removed.
    superClass:
      - TransformData
    properties:
      - name: isDataOperation
        isAttr: true
        type: String
        meta:
          order: 1
          hidden: true
        default: true
        redefines: omniflow:TransformData#isDataOperation
      - name: operationType
        isAttr: true
        type: String
        meta:
          order: 2
          hidden: true
        default: filter
        redefines: omniflow:TransformData#operationType
  - name: EEGPrep
    description: Preprocess EEG data, including filtering, artifact removal, and normalization.
    superClass:
      - MapData
    properties:
      - name: isDataOperation
        isAttr: true
        type: String
        meta:
          order: 1
          hidden: true
        default: true
        redefines: omniflow:MapData#isDataOperation
      - name: operationType
        isAttr: true
        type: String
        meta:
          order: 2
          hidden: true
        default: map
        redefines: omniflow:MapData#operationType
      - name: name
        isAttr: true
        type: String
        meta:
          order: 3
          hidden: false
        default: EEGPrep.clean_artifacts
      - name: documentation
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          order: 4
          hidden: false
        default: >-
          Remove artifacts from EEG data using the clean_artifacts function from the MNE library. This function applies
          a combination of flatline detection, high-pass and low-pass filtering, ASR, ICA, and ICLabel classification to
          identify and remove artifacts from the EEG signal.
        categories:
          - Documentation
      - name: flatline_criterion
        description: Flatline detection threshold, passed to clean_artifacts
        isAttr: true
        type: number
        meta:
          order: 5
          hidden: false
        default: 5
        categories:
          - EEGPrep
      - name: highpass
        description: High-pass filter at 1 Hz, passed to clean_artifacts
        isAttr: true
        type: number
        meta:
          order: 6
          hidden: false
        default: 1
        categories:
          - EEGPrep
      - name: lowpass
        description: Low-pass filter at 100 Hz, passed to clean_artifacts
        isAttr: true
        type: number
        meta:
          order: 7
          hidden: false
        default: 100
        categories:
          - EEGPrep
      - name: asr_criterion
        description: ASR threshold passed to clean_artifacts
        isAttr: true
        type: number
        meta:
          order: 8
          hidden: false
        default: 20
        categories:
          - EEGPrep
      - name: ica
        description: Enable ICA, passed to clean_artifacts
        isAttr: true
        type: Boolean
        meta:
          order: 9
          hidden: false
        default: true
        categories:
          - EEGPrep
      - name: iclabel
        description: Enable ICLabel classification, passed to clean_artifacts
        isAttr: true
        type: Boolean
        meta:
          order: 10
          hidden: false
        default: true
        categories:
          - EEGPrep
    icon: iconify fluent--pulse-20-filled
examples:
  - description: Preprocess EEG data for a single subject.
    object:
      bpmn:name: EEGPrep
      type: MapData
      bpmn:documentation: Preprocess EEG data, including filtering, artifact removal, and normalization.
      isDataOperation: true
      icon: iconify fluent--pulse-20-filled
      mixins:
        - bpmn:SubProcess
      flowElements:
        - id: eeg_start
          type: bpmn:StartEvent
          bpmn:name: Start
          x: 140
          y: 162
        - id: eeg_filter
          type: MapData
          bpmn:name: Filter signal
          icon: iconify bi--funnel
          isDataOperation: true
          x: 240
          y: 140
        - id: eeg_clean
          type: MapData
          bpmn:name: Remove artifacts
          icon: iconify bi--eraser
          isDataOperation: true
          x: 390
          y: 140
        - id: eeg_end
          type: bpmn:EndEvent
          bpmn:name: End
          x: 540
          y: 162
        - type: bpmn:SequenceFlow
          sourceRef: eeg_start
          targetRef: eeg_filter
        - type: bpmn:SequenceFlow
          sourceRef: eeg_filter
          targetRef: eeg_clean
        - type: bpmn:SequenceFlow
          sourceRef: eeg_clean
          targetRef: eeg_end
  - description: Preprocess fMRI data for a single subject.
    object:
      bpmn:name: fMRIPrep
      type: MapData
      bpmn:documentation: Preprocess fMRI data, including filtering, artifact removal, and normalization. Requires BIDS-formatted input.
      isDataOperation: true
      icon: iconify streamline--brain
