name: omniflow
uri: https://w3id.org/omniflow
prefix: omniflow
icon: iconify tabler--hexagon-letter-o
xml:
  tagAlias: lowerCase
associations: []
enumerations: []
types:
  - name: Transform
    description: Apply a function to each element in a data stream.
    superClass:
      - bpmn:Task
    properties:
      - name: isDataOperation
        isAttr: true
        type: Boolean
        default: true
        redefines: studyflow:Activity#isDataOperation
        meta:
          hidden: true
      - name: operationType
        isAttr: true
        default: transform
        redefines: studyflow:Activity#operationType
        type: String
        meta:
          hidden: true
  - name: Map
    description: Map a function over a data stream, producing a new data stream.
    superClass:
      - omniflow:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniflow:Transform#operationType
  - name: Reduce
    description: Reduce a data stream to a single value.
    superClass:
      - omniflow:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: map
        redefines: omniflow:Transform#operationType
  - name: Filter
    description: |
      Filter a data stream based on a condition. Elements that satisfy the predicate are kept; those that don't are removed.
    superClass:
      - omniflow:Transform
    properties:
      - name: operationType
        isAttr: true
        type: String
        meta:
          hidden: true
        default: filter
        redefines: omniflow:Transform#operationType
  - name: EEGPrep
    description: Preprocess EEG data, including filtering, artifact removal, and normalization.
    superClass:
      - omniflow:Map
      - bpmn:SubProcess
    meta:
      icon: iconify fluent--pulse-20-filled
      flowElements:
        - id: eeg_start
          type: bpmn:StartEvent
          bpmn:name: Start
          x: 140
          y: 162
        - id: eeg_filter
          type: omniflow:Map
          bpmn:name: Filter signal
          icon: iconify bi--funnel
          isDataOperation: true
          x: 240
          y: 140
        - id: eeg_clean
          type: omniflow:Map
          bpmn:name: Remove artifacts
          icon: iconify bi--eraser
          isDataOperation: true
          x: 390
          y: 140
        - id: eeg_end
          type: bpmn:EndEvent
          bpmn:name: End
          x: 540
          y: 162
        - type: bpmn:SequenceFlow
          sourceRef: eeg_start
          targetRef: eeg_filter
        - type: bpmn:SequenceFlow
          sourceRef: eeg_filter
          targetRef: eeg_clean
        - type: bpmn:SequenceFlow
          sourceRef: eeg_clean
          targetRef: eeg_end
    properties:
      - name: name
        isAttr: true
        type: String
        default: EEGPrep
        redefines: bpmn:Task#name
      - name: documentation
        redefines: bpmn:Task#documentation
        isAttr: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Documentation
        default: |
          Remove artifacts from EEG data using the clean_artifacts function from the MNE library. This function applies a combination of flatline detection, high-pass and low-pass filtering, ASR, ICA, and ICLabel classification to identify and remove artifacts from the EEG signal.
      - name: flatline_criterion
        description: Flatline detection threshold, passed to clean_artifacts
        isAttr: true
        type: Number
        default: 5
        meta:
          categories:
            - EEGPrep
      - name: highpass
        description: High-pass filter at 1 Hz, passed to clean_artifacts
        isAttr: true
        type: Number
        default: 1
        meta:
          categories:
            - EEGPrep
      - name: lowpass
        description: Low-pass filter at 100 Hz, passed to clean_artifacts
        isAttr: true
        type: Number
        default: 100
        meta:
          categories:
            - EEGPrep
      - name: asr_criterion
        description: ASR threshold passed to clean_artifacts
        isAttr: true
        type: Number
        default: 20
        meta:
          categories:
            - EEGPrep
      - name: ica
        description: Enable ICA, passed to clean_artifacts
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - EEGPrep
      - name: iclabel
        description: Enable ICLabel classification, passed to clean_artifacts
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - EEGPrep
examples:
  - description: Preprocess fMRI data for a single subject.
    object:
      bpmn:name: fMRIPrep
      type: Map
      bpmn:documentation: Preprocess fMRI data, including filtering, artifact removal, and normalization. Requires BIDS-formatted input.
      isDataOperation: true
      icon: iconify streamline--brain
