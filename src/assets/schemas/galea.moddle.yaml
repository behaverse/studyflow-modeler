# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Galea
prefix: galea
description: |
  Studyflow extension for experiments on the OpenBCI Galea VR headset. It adds
  only the two nouns BPMN has no equivalent for - `GaleaSession` (device-level
  configuration: HMD, streaming protocol, active modalities, electrode type) and
  `GaleaRecording` (the multimodal biosignal + VR dataset a session produces).
  The phases of a session - mount, signal-quality check, calibration, resting
  baseline, VR task, unmount, export - are not element types: they are ordinary
  BPMN tasks preset by the `Galea VR session` template, each carrying its
  parameters in `configurations` or `documentation`. This is the same
  "parameterize, don't proliferate" rule the exec/ml/agentic layers follow.
uri: http://behaverse.org/schemas/studyflow/galea
icon: iconify mdi--virtual-reality
xml:
  tagAlias: lowerCase
version: 26.0715
associations: []

enumerations:
  - name: GaleaModalityEnum
    isAbstract: true
    description: Biosignal/sensor modality recorded by the Galea headset.
    literalValues:
      - name: EEG (electroencephalography)
        value: eeg
      - name: EMG (facial electromyography)
        value: emg
      - name: EOG (electrooculography)
        value: eog
      - name: EDA (electrodermal activity)
        value: eda
      - name: PPG (photoplethysmography / heart rate)
        value: ppg
      - name: Eye tracking (camera-based gaze and pupil)
        value: eye_tracking
      - name: Head IMU
        value: head_imu
      - name: Audio
        value: audio

  - name: GaleaElectrodeTypeEnum
    isAbstract: true
    description: EEG electrode contact medium used in the montage.
    literalValues:
      - name: Dry
        value: dry
      - name: Wet (saline / gel)
        value: wet
      - name: Hybrid (dry + wet ring)
        value: hybrid

  - name: VRDeviceEnum
    isAbstract: true
    description: |
      VR head-mounted display. Properties typed with this enum may also accept custom identifiers.
    literalValues:
      - name: Meta Quest Pro
        value: quest_pro
      - name: Meta Quest 3
        value: quest_3
      - name: Valve Index
        value: valve_index
      - name: Varjo XR-3
        value: varjo_xr3

  - name: GaleaStreamProtocolEnum
    isAbstract: true
    description: |
      Streaming protocol used to acquire data from the Galea headset.
      Properties typed with this enum may also accept custom identifiers.
    literalValues:
      - name: LSL (Lab Streaming Layer)
        value: lsl
      - name: BrainFlow
        value: brainflow
      - name: OpenBCI GUI
        value: openbci_gui

types:
  - name: GaleaSession
    description: |
      A single session of work with the OpenBCI Galea headset, modeled as a
      BPMN pool. Carries the device-level configuration (VR HMD, streaming
      protocol, active modalities, electrode type) shared by every phase
      inside the session.
    superClass:
      - bpmn:Participant
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--virtual-reality
      bpmnType: bpmn:Participant
    properties:
      - name: vrDevice
        description: VR head-mounted display paired with the Galea biosensor module. Pick a listed option or type a custom identifier.
        isAttr: true
        type: VRDeviceEnum
        default: quest_pro
        meta:
          editable: true
          categories:
            - Galea
      - name: streamProtocol
        description: Streaming protocol used to acquire data from the Galea headset. Pick a listed option or type a custom identifier.
        isAttr: true
        type: GaleaStreamProtocolEnum
        default: lsl
        meta:
          editable: true
          categories:
            - Galea
      - name: modalities
        description: Biosignal/sensor modalities active in this session.
        isAttr: false
        isMany: true
        type: GaleaModalityEnum
        meta:
          categories:
            - Galea
      - name: electrodeType
        description: EEG electrode contact medium used in the headset's montage.
        isAttr: true
        type: GaleaElectrodeTypeEnum
        default: hybrid
        meta:
          categories:
            - Galea

  # ---------- Recording dataset variant ----------
  - name: GaleaRecording
    description: |
      Multimodal biosignal + VR recording produced by a Galea session.
      Specializes `studyflow:Dataset` to carry the active modality list and the
      EEG channel count / sampling rate that downstream data-operation
      activities need without re-discovering the layout. Per-stream details
      (e.g. eye-tracking rate) belong on the wired `studyflow:Timeseries`
      elements, which already carry `samplingRate`, `channelCount`, and `units`.
    superClass:
      - studyflow:Dataset
    meta:
      icon: iconify mdi--database
      bpmnType: bpmn:DataStoreReference
    properties:
      - name: modalities
        description: Biosignal/sensor modalities included in this recording.
        isAttr: false
        isMany: true
        type: GaleaModalityEnum
        meta:
          categories:
            - Galea
      - name: eegChannels
        description: Number of EEG channels recorded (typically 8-10 on Galea).
        isAttr: true
        type: Integer
        default: 10
        meta:
          categories:
            - Galea
      - name: eegSamplingRateHz
        description: EEG sampling rate, in Hz (e.g., 250, 500, 1000).
        isAttr: true
        type: Real
        default: 250
        meta:
          categories:
            - Galea

templates:
  - description: A typical Galea session - mount -> impedance -> calibration -> baseline -> VR task -> unmount -> export. Each phase is a generic BPMN task; edit its `configurations`/documentation for the specifics.
    object:
      type: GaleaSession
      bpmn:name: Galea VR session
      bpmn:documentation: A typical Galea VR/EEG session covering the full subject lifecycle from headset fitting through data export. Phases are ordinary tasks - repoint or reconfigure any of them without a Galea-specific element type.
      icon: iconify mdi--virtual-reality
      keywords:
        - galea
        - vr
        - eeg
        - openbci
        - session
      vrDevice: quest_pro
      streamProtocol: lsl
      modalities:
        - eeg
        - emg
        - eog
        - eda
        - ppg
        - eye_tracking
        - head_imu
      electrodeType: hybrid
      flowElements:
        - id: galea_start
          type: bpmn:StartEvent
          bpmn:name: Start
          x: 100
          y: 200
        - id: galea_mount
          type: bpmn:ManualTask
          bpmn:name: Mount headset
          icon: iconify mdi--head-plus-outline
          bpmn:documentation: |
            Fit the Galea headset: adjust the VR HMD straps and position the EEG
            electrode array. Apply conductive gel or saline first for a wet/hybrid
            montage. Estimated duration ~10 min.
          x: 200
          y: 178
        - id: galea_impedance
          type: bpmn:ManualTask
          bpmn:name: Impedance check
          icon: iconify mdi--resistor
          bpmn:documentation: |
            Verify electrode contact before recording. Default gate: per-channel
            impedance below 50 kΩ, at most 2 channels allowed to fail. On failure,
            route back to Mount. (Alternatives: RMS amplitude, spectral profile,
            or visual inspection.)
          x: 360
          y: 178
        - id: galea_calibration
          type: bpmn:ManualTask
          bpmn:name: Calibrate sensors
          icon: iconify mdi--target
          bpmn:documentation: |
            Per-sensor calibration before the experimental block: VR eye-tracker
            (5- or 9-point), optional EOG saccade calibration (look L/R/U/D), and
            an optional EDA tonic baseline. The runtime persists the calibration
            profile for downstream phases.
          x: 520
          y: 178
        - id: galea_baseline
          type: cognitive:Rest
          bpmn:name: Resting baseline
          icon: iconify mdi--brain
          configurations: |
            condition: eyes_closed   # eyes_open | eyes_closed | alternating
            durationSeconds: 120
            alternatingBlockSeconds: 30
          x: 680
          y: 178
        - id: galea_task
          type: cognitive:CognitiveTask
          bpmn:name: VR task
          icon: iconify mdi--virtual-reality
          instrument: galea
          configurations: |
            sceneId: MOT_VR          # VR scene shipped with the Galea build
            locomotion: seated       # seated | room_scale | teleport | smooth
            triggerChannel: markers  # stimulus marker stream sent with biosignals
          x: 840
          y: 178
        - id: galea_unmount
          type: bpmn:ManualTask
          bpmn:name: Unmount and clean
          icon: iconify mdi--head-minus-outline
          bpmn:documentation: |
            Remove the headset, clean the electrodes, and stop streams. The
            runtime closes any open recording handles before this task completes.
          x: 1000
          y: 178
        - id: galea_export
          type: datatrove:Writer
          bpmn:name: Export recording
          icon: iconify mdi--database-arrow-down-outline
          path: bids/
          bpmn:documentation: |
            Persist the multimodal recording to a structured dataset (BIDS, BDM,
            or custom). Include the raw broadband recording (EEG .bdf/.edf) and
            the eye-tracking gaze/pupil stream alongside derivatives as needed.
          x: 1160
          y: 178
        - id: galea_end
          type: bpmn:EndEvent
          bpmn:name: End
          x: 1320
          y: 200
        - type: bpmn:SequenceFlow
          sourceRef: galea_start
          targetRef: galea_mount
        - type: bpmn:SequenceFlow
          sourceRef: galea_mount
          targetRef: galea_impedance
        - type: bpmn:SequenceFlow
          sourceRef: galea_impedance
          targetRef: galea_calibration
        - type: bpmn:SequenceFlow
          sourceRef: galea_calibration
          targetRef: galea_baseline
        - type: bpmn:SequenceFlow
          sourceRef: galea_baseline
          targetRef: galea_task
        - type: bpmn:SequenceFlow
          sourceRef: galea_task
          targetRef: galea_unmount
        - type: bpmn:SequenceFlow
          sourceRef: galea_unmount
          targetRef: galea_export
        - type: bpmn:SequenceFlow
          sourceRef: galea_export
          targetRef: galea_end
