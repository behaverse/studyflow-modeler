# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Galea
prefix: galea
description: |
  Studyflow extension for modeling experiments using the OpenBCI Galea VR headset. Defines a `GaleaSession` container plus per-phase activities (donning, impedance check, sensor calibration, resting baseline, VR task, doffing, export) and a `GaleaRecording` dataset variant carrying multimodal acquisition metadata (EEG, EMG, EOG, EDA, PPG, eye-tracking, head IMU).
uri: http://behaverse.org/schemas/studyflow/galea
icon: iconify mdi--virtual-reality
xml:
  tagAlias: lowerCase
associations: []

enumerations:
  - name: GaleaModalityEnum
    description: Biosignal/sensor modality recorded by the Galea headset.
    literalValues:
      - name: EEG (electroencephalography)
        value: eeg
      - name: EMG (facial electromyography)
        value: emg
      - name: EOG (electrooculography)
        value: eog
      - name: EDA (electrodermal activity)
        value: eda
      - name: PPG (photoplethysmography / heart rate)
        value: ppg
      - name: Eye tracking (camera-based gaze and pupil)
        value: eye_tracking
      - name: Head IMU
        value: head_imu
      - name: Audio
        value: audio

  - name: GaleaElectrodeTypeEnum
    description: EEG electrode contact medium used in the montage.
    literalValues:
      - name: Dry
        value: dry
      - name: Wet (saline / gel)
        value: wet
      - name: Hybrid (dry + wet ring)
        value: hybrid

  - name: VRDeviceEnum
    description: VR head-mounted display.
    literalValues:
      - name: Meta Quest Pro
        value: quest_pro
      - name: Meta Quest 3
        value: quest_3
      - name: Valve Index
        value: valve_index
      - name: Varjo XR-3
        value: varjo_xr3
      - name: Other / custom
        value: other

  - name: GaleaStreamProtocolEnum
    description: Streaming protocol used to acquire data from the Galea headset.
    literalValues:
      - name: LSL (Lab Streaming Layer)
        value: lsl
      - name: BrainFlow
        value: brainflow
      - name: OpenBCI GUI
        value: openbci_gui
      - name: Custom
        value: custom

  - name: BaselineConditionEnum
    description: Resting-state baseline condition.
    literalValues:
      - name: Eyes open
        value: eyes_open
      - name: Eyes closed
        value: eyes_closed
      - name: Eyes open / closed alternating blocks
        value: alternating

  - name: SignalQualityCheckEnum
    description: How signal quality is verified before recording starts.
    literalValues:
      - name: Per-channel impedance (kΩ threshold)
        value: impedance
      - name: RMS amplitude check
        value: rms
      - name: Spectral profile (alpha bump)
        value: spectral
      - name: Manual visual inspection
        value: visual
      - name: Skip (no check)
        value: skip

types:
  - name: GaleaSession
    description: |
      A single session of work with the OpenBCI Galea headset, modeled as a
      BPMN pool. Carries the device-level configuration (VR HMD, streaming
      protocol, active modalities, electrode type) shared by every phase
      inside the session.
    superClass:
      - bpmn:Participant
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--virtual-reality
      bpmnType: bpmn:Participant
    properties:
      - name: vrDevice
        description: VR head-mounted display paired with the Galea biosensor module.
        isAttr: true
        type: VRDeviceEnum
        default: quest_pro
        meta:
          categories:
            - Galea
      - name: customVRDevice
        description: Custom VR device identifier when none of the listed options apply.
        isAttr: true
        type: String
        meta:
          categories:
            - Galea
          condition:
            language: json
            body:
              vrDevice: other
      - name: streamProtocol
        description: Streaming protocol used to acquire data from the Galea headset.
        isAttr: true
        type: GaleaStreamProtocolEnum
        default: lsl
        meta:
          categories:
            - Galea
      - name: modalities
        description: Biosignal/sensor modalities active in this session.
        isAttr: false
        isMany: true
        type: GaleaModalityEnum
        meta:
          categories:
            - Galea
      - name: electrodeType
        description: EEG electrode contact medium used in the headset's montage.
        isAttr: true
        type: GaleaElectrodeTypeEnum
        default: hybrid
        meta:
          categories:
            - Galea

  # ---------- Phase 1: fitting ----------
  - name: Donning
    description: |
      Fit the Galea headset on the participant. Includes adjusting the VR HMD
      straps, and positioning the EEG electrode array.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--head-plus-outline
      bpmnType: bpmn:Task
    properties:
      - name: usesGel
        description: Apply conductive gel or saline before fitting (relevant for wet/hybrid montage).
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - Donning
      - name: estimatedDurationMinutes
        description: Estimated duration of the donning procedure, in minutes.
        isAttr: true
        type: Number
        default: 10
        meta:
          categories:
            - Donning
      - name: instructions
        description: Step-by-step donning instructions in markdown, shown to the experimenter or participant.
        isBody: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Donning
      - name: isDataOperation
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true

  # ---------- Phase 2: signal quality gate ----------
  - name: ImpedanceCheck
    description: |
      Verify that EEG/EMG/EOG electrodes have acceptable contact impedance
      (or pass the chosen quality test) before any recording starts. Fails
      the run, or routes back to `Donning`, when too many channels exceed
      the threshold.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--resistor
      bpmnType: bpmn:Task
    properties:
      - name: method
        description: How signal quality is verified.
        isAttr: true
        type: SignalQualityCheckEnum
        default: impedance
        meta:
          categories:
            - QualityCheck
      - name: impedanceThresholdKOhm
        description: Maximum acceptable per-channel impedance (kΩ). Channels above this fail the check.
        isAttr: true
        type: Number
        default: 50
        meta:
          categories:
            - QualityCheck
          condition:
            language: json
            body:
              method: impedance
      - name: maxFailedChannels
        description: Maximum number of channels allowed to fail before the whole check fails.
        isAttr: true
        type: Number
        default: 2
        meta:
          categories:
            - QualityCheck
      - name: isDataOperation
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true

  # ---------- Phase 3: per-sensor calibration ----------
  - name: SensorCalibration
    description: |
      Per-sensor calibration before the experimental block starts. Typically
      eye-tracker 5/9-point calibration plus optional EOG saccade calibration
      and an EDA tonic baseline. The runtime persists the calibration profile
      for downstream phases.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--target
      bpmnType: bpmn:Task
    properties:
      - name: calibrateEyeTracker
        description: Run the VR HMD eye-tracker calibration (e.g., 5- or 9-point).
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - Calibration
      - name: eyeTrackerPoints
        description: Number of fixation points used for eye-tracker calibration.
        isAttr: true
        type: Number
        default: 9
        meta:
          categories:
            - Calibration
          condition:
            language: json
            body:
              calibrateEyeTracker: true
      - name: calibrateEOG
        description: Run an EOG saccade-based calibration (look L/R/U/D).
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - Calibration
      - name: calibrateEDA
        description: Capture an EDA tonic baseline before the experiment.
        isAttr: true
        type: Boolean
        default: false
        meta:
          categories:
            - Calibration
      - name: configurations
        description: |
          Calibration configuration in YAML (point grid, dwell times,
          accept/reject thresholds, retry policy, etc.).
        isBody: true
        type: studyflow:YAMLString
        meta:
          categories:
            - Calibration
      - name: isDataOperation
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true

  # ---------- Phase 4: resting-state baseline ----------
  - name: BaselineRecording
    description: |
      Resting-state baseline recording (eyes open, closed, or alternating
      blocks). Used as a reference signal for downstream analysis and as a
      post-calibration recording quality check.
    superClass:
      - studyflow:Rest
    meta:
      icon: iconify mdi--brain
      bpmnType: bpmn:Task
    properties:
      - name: condition
        description: Resting-state condition.
        isAttr: true
        type: BaselineConditionEnum
        default: eyes_closed
        meta:
          categories:
            - Baseline
      - name: durationSeconds
        description: Total duration of the baseline recording, in seconds.
        isAttr: true
        type: Number
        default: 120
        meta:
          categories:
            - Baseline
      - name: alternatingBlockSeconds
        description: |
          Length of each eyes-open / eyes-closed block when `condition` is `alternating`.
        isAttr: true
        type: Number
        default: 30
        meta:
          categories:
            - Baseline
          condition:
            language: json
            body:
              condition: alternating

  # ---------- Phase 5: VR experimental task ----------
  - name: GaleaTask
    description: |
      A VR cognitive task delivered through the Galea headset. Behaves like a
      `studyflow:CognitiveTask` but pins `instrument` to `galea` and adds
      VR-scene specific properties (scene id, locomotion mode, marker channel).
    superClass:
      - studyflow:CognitiveTask
    meta:
      icon: iconify mdi--virtual-reality
      bpmnType: bpmn:Task
    properties:
      - name: instrument
        default: galea
        type: String
        isAttr: true
        redefines: studyflow:CognitiveTask#instrument
        meta:
          pinned: true
      - name: sceneId
        description: |
          Identifier of the VR scene shipped with the Galea-compatible build
          (e.g., `MOT_VR`, `RestingRoom`, `OddballVR`).
        isAttr: true
        type: String
        meta:
          order: 0
          categories:
            - Galea
      - name: locomotion
        description: Locomotion mode in the VR scene (`seated`, `room_scale`, `teleport`, `smooth`).
        isAttr: true
        type: String
        default: seated
        meta:
          order: 1
          categories:
            - Galea
      - name: triggerChannel
        description: |
          Stimulus marker channel sent alongside biosignals (e.g., LSL marker
          stream name, parallel-port code, Unity event tag).
        isAttr: true
        type: String
        meta:
          order: 2
          categories:
            - Galea

  # ---------- Phase 6: doffing & cleanup ----------
  - name: Doffing
    description: |
      Remove the headset, clean the electrodes, and stop streams. The runtime
      closes any open recording handles before this task completes.
    superClass:
      - bpmn:Task
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--head-minus-outline
      bpmnType: bpmn:Task
    properties:
      - name: stopsStreams
        description: |
          Whether the runtime should stop streaming and close recording
          handles when this task starts.
        isAttr: true
        type: Boolean
        default: true
        meta:
          pinned: true
          categories:
            - Doffing
      - name: instructions
        description: Step-by-step doffing and electrode-cleaning instructions, in markdown.
        isBody: true
        type: studyflow:MarkdownString
        meta:
          categories:
            - Doffing
      - name: isDataOperation
        isAttr: true
        type: Boolean
        default: false
        redefines: studyflow:DataOperationActivity#isDataOperation
        meta:
          pinned: true

  # ---------- Phase 7: export to a structured dataset ----------
  - name: GaleaExport
    description: |
      Persist the multimodal Galea recording to a structured dataset (BIDS,
      BDM, or a custom layout). Modeled as a data-operation activity (writer)
      so downstream analysis can consume it as a `Dataset`.
    superClass:
      - omniprocess:Map
    meta:
      icon: iconify mdi--database-arrow-down-outline
    properties:
      - name: format
        description: On-disk dataset format produced by the export.
        isAttr: true
        type: String
        default: bids
        meta:
          categories:
            - Export
      - name: includeRaw
        description: Include the raw broadband recording (e.g., EEG `.bdf` / `.edf`) alongside derivatives.
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - Export
      - name: includeEyeTracking
        description: Export the eye-tracking gaze and pupil stream.
        isAttr: true
        type: Boolean
        default: true
        meta:
          categories:
            - Export
      - name: configurations
        description: |
          Export configuration in YAML (path templates, anonymization rules,
          derivative selection, sidecar JSON content, etc.).
        isBody: true
        type: studyflow:YAMLString
        meta:
          categories:
            - Export

  # ---------- Recording dataset variant ----------
  - name: GaleaRecording
    description: |
      Multimodal biosignal + VR recording produced by a Galea session.
      Specializes `studyflow:Dataset` to carry the active modality list,
      EEG channel count, and per-modality sampling rates so downstream
      data-operation activities can consume it without re-discovering the layout.
    superClass:
      - studyflow:Dataset
    meta:
      icon: iconify mdi--database
      bpmnType: bpmn:DataStoreReference
    properties:
      - name: modalities
        description: Biosignal/sensor modalities included in this recording.
        isAttr: false
        isMany: true
        type: GaleaModalityEnum
        meta:
          categories:
            - Galea
      - name: eegChannels
        description: Number of EEG channels recorded (typically 8-10 on Galea).
        isAttr: true
        type: Number
        default: 10
        meta:
          categories:
            - Galea
      - name: eegSamplingRateHz
        description: EEG sampling rate, in Hz (e.g., 250, 500, 1000).
        isAttr: true
        type: Number
        default: 250
        meta:
          categories:
            - Galea
      - name: eyeTrackingSamplingRateHz
        description: Eye-tracker sampling rate, in Hz (e.g., 90, 120).
        isAttr: true
        type: Number
        default: 90
        meta:
          categories:
            - Galea

templates:
  - description: A typical Galea session - donning → impedance → calibration → baseline → VR task → doffing → export
    object:
      type: GaleaSession
      bpmn:name: Galea VR session
      bpmn:documentation: A typical Galea VR/EEG session covering the full subject lifecycle from headset fitting through data export.
      vrDevice: quest_pro
      streamProtocol: lsl
      modalities:
        - eeg
        - emg
        - eog
        - eda
        - ppg
        - eye_tracking
        - head_imu
      electrodeType: hybrid
      flowElements:
        - id: galea_start
          type: bpmn:StartEvent
          bpmn:name: Start
          x: 100
          y: 200
        - id: galea_donning
          type: galea:Donning
          bpmn:name: Don headset
          x: 200
          y: 178
          usesGel: true
          estimatedDurationMinutes: 10
        - id: galea_impedance
          type: galea:ImpedanceCheck
          bpmn:name: Impedance check
          x: 360
          y: 178
          method: impedance
          impedanceThresholdKOhm: 50
          maxFailedChannels: 2
        - id: galea_calibration
          type: galea:SensorCalibration
          bpmn:name: Calibrate sensors
          x: 520
          y: 178
          calibrateEyeTracker: true
          eyeTrackerPoints: 9
          calibrateEOG: true
          calibrateEDA: true
        - id: galea_baseline
          type: galea:BaselineRecording
          bpmn:name: Resting baseline
          x: 680
          y: 178
          condition: eyes_closed
          durationSeconds: 120
        - id: galea_task
          type: galea:GaleaTask
          bpmn:name: VR task
          x: 840
          y: 178
          sceneId: MOT_VR
          locomotion: seated
        - id: galea_doffing
          type: galea:Doffing
          bpmn:name: Doff and clean
          x: 1000
          y: 178
        - id: galea_export
          type: galea:GaleaExport
          bpmn:name: Export recording
          x: 1160
          y: 178
          format: bids
          includeRaw: true
          includeEyeTracking: true
        - id: galea_end
          type: bpmn:EndEvent
          bpmn:name: End
          x: 1320
          y: 200
        - type: bpmn:SequenceFlow
          sourceRef: galea_start
          targetRef: galea_donning
        - type: bpmn:SequenceFlow
          sourceRef: galea_donning
          targetRef: galea_impedance
        - type: bpmn:SequenceFlow
          sourceRef: galea_impedance
          targetRef: galea_calibration
        - type: bpmn:SequenceFlow
          sourceRef: galea_calibration
          targetRef: galea_baseline
        - type: bpmn:SequenceFlow
          sourceRef: galea_baseline
          targetRef: galea_task
        - type: bpmn:SequenceFlow
          sourceRef: galea_task
          targetRef: galea_doffing
        - type: bpmn:SequenceFlow
          sourceRef: galea_doffing
          targetRef: galea_export
        - type: bpmn:SequenceFlow
          sourceRef: galea_export
          targetRef: galea_end
