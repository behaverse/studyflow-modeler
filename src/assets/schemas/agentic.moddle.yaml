# yaml-language-server: $schema=https://unpkg.com/moddle/resources/schema/moddle.json

name: Agentic
prefix: agentic
description: Studyflow extension for LLM and agent workflows, kept to what an engine calling a model API (Ollama, Claude, OpenAI) actually reads. Two elements are genuinely new - `Agent` (a BPMN ad-hoc sub-process, "activities whose order is decided at run time", which is the line between an agent and a workflow) and `Router` (a gateway whose branch a model picks). `LLMCall` is one model call; `Tool` is a capability an agent may call (an ordinary step - `implementation` + `with`); `HumanApproval` pauses for a person; `Prompt` and `Memory` are the data the calls read and the state they carry.
uri: https://w3id.org/studyflow/agentic
icon: iconify tabler--hexagon-letter-a
xml:
  tagAlias: lowerCase
version: 26.0717

associations: []

enumerations:
  - name: ToolChoiceEnum
    isAbstract: true
    description: How freely the model may call the tools available to it.
    literalValues:
      - name: Auto
        value: auto
        description: The model decides whether and which tool to call.
      - name: Required
        value: required
        description: The model must call a tool on this turn.
      - name: None
        value: none
        description: Tools are visible but may not be called.

  - name: ToolKindEnum
    isAbstract: true
    description: What kind of capability a tool exposes.
    literalValues:
      - name: Function call
        value: function
      - name: Retrieval
        value: retrieval
      - name: Code execution
        value: code
      - name: Web search
        value: search
      - name: MCP server
        value: mcp
      - name: Ask a human
        value: human
        description: A tool whose implementation is a person. Suspends the run until they answer.
      - name: Sub-flow
        value: subflow
        description: A tool whose implementation is another studyflow.

  - name: MemoryScopeEnum
    isAbstract: true
    description: How long a memory store lives.
    literalValues:
      - name: Turn
        value: turn
      - name: Run
        value: run
      - name: Participant
        value: participant
      - name: Global
        value: global

types:

  # ===========================================================================
  # The agent. BPMN's ad-hoc sub-process already means "the activities inside
  # execute in an order determined at run time, not by the diagram". That is the
  # definition of an agent, and it has been in the BPMN spec since 2011. So an
  # Agent is not a new shape: it is that shape, with a model attached. The tools
  # it may call are the activities drawn inside it. The exit test is BPMN's own
  # `completionCondition` (flattened to an attribute by exec); `maxTurns` is the
  # one custom field, because BPMN puts no ceiling on an ad-hoc sub-process.
  # ===========================================================================
  - name: Agent
    description: |
      A model-driven sub-process: the model chooses which contained activity to
      call next, and in what order, until the ad-hoc sub-process's own
      `completionCondition` holds or `maxTurns` is spent. Draw the tools inside
      it - containment is the tool list.

      This is the one element whose control flow is *not* given by the diagram.
      Everything else in a studyflow follows a predefined path; an Agent does
      not. Keeping that distinction visible is the point: a reader can see at a
      glance which parts of a system are steered by a model and which are not.
    superClass:
      - bpmn:AdHocSubProcess
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--robot-outline
      bpmnType: bpmn:AdHocSubProcess
    properties:
      - name: model
        description: Model identifier (e.g. `claude-opus-4-8`, `gpt-5`, `ollama/llama3.3`).
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Agent
      - name: systemPrompt
        description: The agent's standing instructions, in markdown. Wire a `Prompt` element in (a data association) and reference it as `{{name}}` when the wording is itself under study.
        isAttr: false
        type: studyflow:MarkdownString
        meta:
          order: 3
          categories:
            - Agent
          editor: markdown
      - name: toolChoice
        description: How freely the agent may call the tools drawn inside it.
        isAttr: true
        type: ToolChoiceEnum
        default: auto
        meta:
          order: 4
          categories:
            - Agent
      - name: temperature
        description: Sampling temperature.
        isAttr: true
        type: Real
        default: 1
        meta:
          order: 5
          categories:
            - Agent
      - name: maxTurns
        description: |
          Hard ceiling on turns. The one custom loop field: BPMN puts no bound
          on an ad-hoc sub-process, and this is the only guaranteed termination
          bound an agent has. Always set it.
        isAttr: true
        type: Integer
        default: 10
        meta:
          order: 7
          categories:
            - Agent

  # ===========================================================================
  # The model-driven branch. Everything about it is an ordinary exclusive
  # gateway except who picks the branch: a classifier decides. The engine's
  # branch selector reads `meta.branching` (alongside `random` and `condition`).
  # ===========================================================================
  - name: Router
    description: |
      A branch the model decides. The classifier's options are the outgoing
      sequence flows' labels, so the diagram and the model's choices cannot drift
      apart. When the classifier is unsure or fails, the gateway's own default
      flow is taken - BPMN's native escape hatch, so there is no separate
      fallback field.
    superClass:
      - bpmn:ExclusiveGateway
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--sign-direction
      bpmnType: bpmn:ExclusiveGateway
      branching: model
    properties:
      - name: model
        description: Model that classifies the input and picks a branch.
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Routing
      - name: instructions
        description: |
          How to choose, in markdown. The branch names are the outgoing sequence
          flows' labels, so the classifier's options are exactly the drawn branches.
        isAttr: false
        type: studyflow:MarkdownString
        meta:
          order: 2
          categories:
            - Routing
          editor: markdown

  # ===========================================================================
  # Generic anchors. A model call and a tool call are the two atoms of the
  # layer; prompt-chaining and agent loops are built from them. A tool is an
  # ordinary step (`implementation` + `with` + wired data), so anything a
  # studyflow can run, an agent can call.
  # ===========================================================================
  - name: LLMCall
    description: |
      One model call: a prompt in, a response out. The unit prompt-chaining
      workflows are built from - for the engine, one request to the model API.
    superClass:
      - bpmn:ServiceTask
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--message-processing-outline
      bpmnType: bpmn:ServiceTask
    properties:
      - name: model
        description: Model identifier (e.g. `ollama/llama3.3`, `claude-opus-4-8`).
        isAttr: true
        type: String
        meta:
          order: 1
          categories:
            - Model call
      - name: prompt
        description: |
          The prompt, in markdown. `{{name}}` placeholders are filled from the
          data elements wired to the step (by name) and the run's variables.
          Wire a `Prompt` element in instead when the wording is itself under study.
        isAttr: false
        type: studyflow:MarkdownString
        meta:
          order: 3
          categories:
            - Model call
          editor: markdown
      - name: temperature
        description: Sampling temperature. Set 0 for a reproducible call.
        isAttr: true
        type: Real
        default: 0
        meta:
          order: 4
          categories:
            - Model call
      - name: maxTokens
        description: Ceiling on the response length.
        isAttr: true
        type: Integer
        meta:
          order: 5
          categories:
            - Model call
          optional: true

  - name: Tool
    description: |
      A capability an agent may call. A tool is an ordinary step - same `implementation`
      and `with` as any other activity, same wired data elements as its
      interface - so anything a studyflow can run, an agent can call.
    superClass:
      - bpmn:ServiceTask
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--tools
      bpmnType: bpmn:ServiceTask
    properties:
      # `implementation` (the versioned function reference) comes from the
      # `exec:Implementation` trait on bpmn:ServiceTask - declared once there.
      - name: kind
        description: What kind of capability this exposes.
        isAttr: true
        type: ToolKindEnum
        default: function
        meta:
          order: 1
          categories:
            - Tool
      - name: purpose
        description: |
          What the tool does and when to use it, in the words the model will read.
          This is the tool description the model sees - write it for the model, not
          for the reviewer.
        isAttr: false
        type: studyflow:MarkdownString
        meta:
          order: 2
          categories:
            - Tool

  # ===========================================================================
  # Human-in-the-loop. Studyflow has always suspended on human steps: a
  # participant doing a cognitive task is one. HumanApproval is the same
  # suspension with a reviewer instead of a subject.
  # ===========================================================================
  - name: HumanApproval
    description: |
      Stop and wait for a person to approve, reject, or edit before continuing.
      The engine pauses the run here and resumes on the reviewer's answer. Put
      one in front of every side-effecting tool call you would not want a
      model to make alone.
    superClass:
      - bpmn:UserTask
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--account-check-outline
      bpmnType: bpmn:UserTask
    properties:
      - name: question
        description: What the reviewer is being asked, in markdown. Shown with the artifact under review.
        isAttr: false
        type: studyflow:MarkdownString
        meta:
          order: 1
          categories:
            - Approval
          editor: markdown

  # ===========================================================================
  # Artifacts.
  # ===========================================================================
  - name: Prompt
    description: |
      A prompt as an artifact rather than a string in a script - wired into the
      calls that read it, so "the same pipeline" really is the same pipeline
      and a wording change is a visible edit to one data element.
    superClass:
      - bpmn:DataObjectReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--text-box-outline
      bpmnType: bpmn:DataObjectReference
    properties:
      - name: template
        description: The prompt text, in markdown, with `{{name}}` placeholders.
        isAttr: false
        type: studyflow:MarkdownString
        meta:
          order: 1
          categories:
            - Prompt
          editor: markdown

  - name: Memory
    description: |
      State an agent carries across turns - conversation history, scratchpad,
      retrieved facts. `scope` says how long it lives, so per-participant
      memory in a study and per-run memory in a pipeline are one mechanism.
      Where it is kept goes in `documentation`.
    superClass:
      - bpmn:DataStoreReference
      - bpmn:BaseElement
    meta:
      icon: iconify mdi--memory
      bpmnType: bpmn:DataStoreReference
    properties:
      - name: scope
        description: How long the memory lives.
        isAttr: true
        type: MemoryScopeEnum
        default: run
        meta:
          order: 1
          categories:
            - Memory

templates:

  - description: An autonomous agent with tools - the model decides what to call and when.
    object:
      bpmn:name: Agent (tool loop)
      type: Agent
      bpmn:documentation: |
        An ad-hoc sub-process: the model chooses which of the contained tools to
        call on each turn, until it decides it is done or the turn budget runs
        out. Contrast with the workflow templates, where the diagram decides the
        order and the model only fills in the steps.

        Add tools by drawing them inside - each is an ordinary step bound to a
        real callable. The side-effecting ones belong behind a Human approval.
      icon: iconify mdi--robot-outline
      keywords:
        - agent
        - autonomous
        - tools
        - loop
        - adhoc
      model: ollama/llama3.3
      systemPrompt: |
        You are a research assistant. Use the available tools to answer the
        question. Stop as soon as you can answer it.
      toolChoice: auto
      maxTurns: 12
      completionCondition: answer is not null
      flowElements:
        - id: agent_search
          type: Tool
          bpmn:name: Search Wikipedia
          kind: search
          purpose: |
            Look up background facts. Use it when the question needs knowledge
            you do not already have.
          implementation: python://wikipedia.search
          with: "results: 5"
          x: 200
          y: 140

  - description: Evaluator-optimizer - generate, judge, revise until the score clears the bar.
    object:
      bpmn:name: Evaluator-optimizer
      type: bpmn:SubProcess
      bpmn:documentation: |
        The loop a plain DAG cannot express: a generator produces a draft, a
        judge scores it against a rubric, and the loop re-enters with the
        critique until the score clears the bar or the turn budget is spent -
        BPMN's own `loopCondition` and `loopMaximum` carry the loop.
      icon: iconify mdi--autorenew
      keywords:
        - evaluator
        - optimizer
        - critique
        - refine
        - loop
      loopCharacteristics:
        type: bpmn:StandardLoopCharacteristics
        loopCondition: score < 4
        loopMaximum: 4
      flowElements:
        - id: eo_generate
          type: LLMCall
          bpmn:name: Draft
          model: ollama/llama3.3
          temperature: 0.7
          x: 200
          y: 140
        - id: eo_judge
          type: LLMCall
          bpmn:name: Judge the draft
          model: claude-opus-4-8
          prompt: |
            Score the draft 1-5 against the rubric and name the deciding
            criterion. Reply as `score: <n>` on the first line.
          x: 380
          y: 140
        - type: bpmn:SequenceFlow
          sourceRef: eo_generate
          targetRef: eo_judge

  - description: Model-decided routing - a classifier picks the branch, and its reason is logged.
    object:
      bpmn:name: Route by intent
      type: Router
      bpmn:documentation: |
        The classifier's options are the outgoing branch labels, so the diagram and
        the prompt cannot drift apart. Mark one outgoing flow as the gateway's
        default - BPMN's own mechanism - and it is taken when the classifier is
        unsure or fails.
      icon: iconify mdi--sign-direction
      keywords:
        - router
        - routing
        - classify
        - dispatch
        - handoff
      model: claude-haiku-4-5
      instructions: |
        Read the request and route it to exactly one branch, using the branch
        labels on the outgoing flows. If none clearly applies, say so; the
        default branch is taken.

  - description: Human approval gate - stop, show the artifact, wait for a person.
    object:
      bpmn:name: Human approval
      type: HumanApproval
      bpmn:documentation: |
        Pauses the run until the reviewer answers. Put one of these in front
        of every side-effecting tool call you would not want a model to make
        alone.
      icon: iconify mdi--account-check-outline
      keywords:
        - approval
        - human
        - hitl
        - review
        - interrupt
      question: |
        Review the proposed action and approve, edit, or reject it.

  - description: Prompt chain with a quality gate between the steps.
    object:
      bpmn:name: Prompt chain
      type: bpmn:SubProcess
      bpmn:documentation: |
        The simplest compound pattern: decompose the task into fixed steps and
        check the intermediate result before spending the next call on it. The
        diagram decides the order - this is a workflow, not an agent.
      icon: iconify mdi--link-variant
      keywords:
        - chain
        - prompt
        - sequential
        - workflow
      flowElements:
        - id: chain_a
          type: LLMCall
          bpmn:name: Extract
          model: claude-haiku-4-5
          temperature: 0
          x: 180
          y: 140
        - id: chain_gate
          type: bpmn:ExclusiveGateway
          icon: iconify mdi--gate-arrow-right
          bpmn:name: Complete?
          x: 340
          y: 145
        - id: chain_b
          type: LLMCall
          bpmn:name: Summarize
          model: ollama/llama3.3
          temperature: 0
          x: 460
          y: 140
        - type: bpmn:SequenceFlow
          sourceRef: chain_a
          targetRef: chain_gate
        - type: bpmn:SequenceFlow
          sourceRef: chain_gate
          targetRef: chain_b
