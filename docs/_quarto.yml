project:
  type: website
  output-dir: ../dist/docs

website:
  title: "Studyflow Modeler"
  description: "Documentation for Studyflow and Studyflow Modeler"
  site-url: https://behaverse.org/studyflow-modeler/docs/
  favicon: assets/img/favicon.ico
  llms-txt: true
  search: true
  navbar: false
  bread-crumbs: true
  page-navigation: true
  sidebar:
    id: default
    title: Studyflow Docs
    logo: assets/img/logo.png
    alignment: center
    style: docked
    pinned: true
    collapse-level: 1
    search: true
    footer:  "&copy; 2025 xCIT"
    tools:
      - icon: clock-history
        text: Roadmap
        href: roadmap.qmd
      - icon: github
        href: https://github.com/behaverse/studyflow-modeler
        text: GitHub
    contents:
      - text: Introduction
        href: index.qmd
      - text: FAQ
        href: faq.qmd
      - section: Get started
        contents:
          - text: Read a studyflow
            href: get-started/index.qmd
      - section: Guides
        contents:
          - text: Modeler app
            href: guides/modeler-app.qmd
          - text: Save, share, and version-control
            href: guides/save-share-version.qmd
          - text: Read someone else's studyflow
            href: guides/read-a-studyflow.qmd
          - text: Counterbalancing and randomization
            href: guides/counterbalancing.qmd
          - text: Publish to Behaverse Data Server
            href: guides/publish.qmd
          - text: Preprocessing pipelines
            href: guides/preprocessing-pipelines.qmd
          - text: Attach a schema to a dataset
            href: guides/attach-schema.qmd
      - section: Reference
        contents:
          - text: Why Studyflow
            href: reference/why-studyflow.qmd
          - text: Studyflow vs BPMN
            href: reference/studyflow-vs-bpmn.qmd
          - text: Elements
            href: reference/elements.qmd
          - text: Data
            href: reference/data.qmd
          - text: Views
            href: reference/views.qmd
          - text: Specification
            href: reference/spec.qmd
          - text: Extensions
            href: reference/extensions.qmd
          - text: Glossary
            href: reference/glossary.qmd
      - section: Examples
        contents:
          - text: Gallery
            href: examples/index.qmd
          - auto: examples/*.qmd
      - text: ---
      - text: <i>Modeler App</i>
        href: https://behaverse.org/studyflow-modeler/app.html
        icon: box-arrow-up-right
        target: _blank
  open-graph: true

format:
  html:
    theme: default
    css:
      - assets/css/custom.css
      - assets/css/figures.css
    toc: true
    mainfont: "IBM Plex Sans"
    highlight-style: github
